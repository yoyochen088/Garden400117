<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>競賽成績辨識 - 璀璨</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌸</text></svg>" />
  <script src="config.js"></script>
  <style>
    :root {
      --orange:#e96a1e; --orange-light:#fef0e7; --orange-mid:#f4a46a;
      --orange-dark:#c2510b; --bg:#fff8f5; --card-bg:#fff;
      --text:#3d1a2e; --text-muted:#9e6b7e; --border:#f8d5b0;
      --shadow:0 2px 12px rgba(233,106,30,.10); --radius:14px;
    }
    * { box-sizing:border-box; margin:0; padding:0; }
    body { font-family:'Segoe UI','Microsoft JhengHei',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; padding-bottom:80px; }
    main { max-width:800px; margin:0 auto; padding:24px 16px; }
    h1 { text-align:center; color:var(--orange-dark); font-size:1.3rem; margin-bottom:4px; }
    .subtitle { text-align:center; color:var(--text-muted); font-size:0.85rem; margin-bottom:24px; }

    .card { background:var(--card-bg); border-radius:var(--radius); border:1px solid var(--border); box-shadow:var(--shadow); padding:20px; margin-bottom:16px; }
    .card-title { font-size:0.9rem; font-weight:700; color:var(--orange-dark); margin-bottom:14px; display:flex; align-items:center; gap:8px; }

    /* 上傳區 */
    .drop-zone {
      border:2.5px dashed var(--orange-mid); border-radius:var(--radius);
      background:var(--orange-light); padding:40px 20px;
      text-align:center; cursor:pointer; transition:all .2s; margin-bottom:16px;
    }
    .drop-zone.drag-over { border-color:var(--orange); background:#fde8d4; }
    .drop-zone .dz-icon { font-size:2.4rem; margin-bottom:10px; }
    .drop-zone .dz-text { font-size:0.95rem; font-weight:700; color:var(--orange-dark); margin-bottom:4px; }
    .drop-zone .dz-sub { font-size:0.8rem; color:var(--text-muted); }
    #file-input { display:none; }

    /* 預覽列表在 JS 動態產生 */

    /* 進度 */
    .progress-wrap { margin:12px 0; display:none; }
    .progress-bar { background:#f0e0d0; border-radius:8px; height:10px; overflow:hidden; }
    .progress-fill { height:100%; background:linear-gradient(90deg,#c2510b,#e96a1e); border-radius:8px; transition:width .3s; width:0%; }
    .progress-text { font-size:0.82rem; color:var(--text-muted); text-align:center; margin-top:6px; }

    /* 結果表格 */
    .result-table { width:100%; border-collapse:collapse; font-size:0.9rem; }
    .result-table thead tr { background:linear-gradient(135deg,#c2510b,#e96a1e); color:#fff; }
    .result-table th { padding:10px 12px; text-align:left; font-weight:600; }
    .result-table td { padding:8px 12px; border-bottom:1px solid var(--border); }
    .result-table tbody tr:hover { background:var(--orange-light); }
    .result-table input { padding:5px 8px; border:1.5px solid var(--orange-mid); border-radius:6px; font-size:0.88rem; background:var(--bg); color:var(--text); outline:none; width:100%; }
    .result-table input:focus { border-color:var(--orange); }

    .title-divider { background:var(--orange-light); font-weight:700; color:var(--orange-dark); font-size:0.85rem; }
    .title-divider td { padding:8px 12px !important; }

    /* 按鈕 */
    .btn { display:inline-flex; align-items:center; gap:7px; padding:10px 22px; border-radius:10px; font-size:.92rem; font-weight:700; cursor:pointer; border:none; transition:all .2s; }
    .btn-primary { background:linear-gradient(135deg,#c2510b,#e96a1e); color:#fff; box-shadow:0 3px 12px rgba(233,106,30,.3); }
    .btn-primary:hover { transform:translateY(-1px); box-shadow:0 5px 16px rgba(233,106,30,.4); }
    .btn-primary:disabled { opacity:.5; cursor:not-allowed; transform:none; }
    .btn-secondary { background:var(--orange-light); color:var(--orange-dark); border:1.5px solid var(--border); }
    .btn-secondary:hover { background:#fde8d4; }

    .btn-row { display:flex; gap:10px; flex-wrap:wrap; margin-top:14px; }

    /* 期數設定 */
    .period-input { display:flex; gap:10px; align-items:center; margin-bottom:14px; }
    .period-input label { font-size:0.85rem; font-weight:600; color:var(--orange-dark); white-space:nowrap; }
    .period-input input { padding:8px 12px; border:1.5px solid var(--orange-mid); border-radius:8px; font-size:0.9rem; background:var(--bg); color:var(--text); outline:none; width:140px; }

    .empty-state { text-align:center; padding:40px; color:var(--text-muted); font-size:0.9rem; }
    .lbl { font-size:0.75rem; color:var(--text-muted); font-weight:600; margin-bottom:3px; display:block; }
    #summaryResult input { padding:7px 10px; border:1.5px solid var(--orange-mid); border-radius:7px; font-size:0.88rem; background:var(--bg); color:var(--text); outline:none; }
    #summaryResult input:focus { border-color:var(--orange); }
  </style>
</head>
<body>
<div id="site-header"></div>
<main>
  <h1>📸 競賽成績辨識</h1>
  <p class="subtitle">上傳遊戲內競賽功勳截圖，自動辨識成員與分數</p>

  <!-- 設定 -->
  <div class="card">
    <div class="card-title">📅 期數設定</div>
    <div class="period-input">
      <label>競賽期數：</label>
      <input type="date" id="periodInput" />
    </div>
  </div>

  <!-- 總結截圖 -->
  <div class="card">
    <div class="card-title">📊 公會總結（選填）</div>
    <div style="display:flex;gap:10px;align-items:flex-end;flex-wrap:wrap;">
      <div class="drop-zone" id="summaryDropZone" onclick="document.getElementById('summary-file').click()" style="flex:1;min-width:200px;padding:20px 16px;margin-bottom:0;">
        <div class="dz-icon" style="font-size:1.6rem;">📊</div>
        <div class="dz-text" style="font-size:0.85rem;">上傳總結截圖</div>
      </div>
      <input type="file" id="summary-file" accept="image/*" style="display:none;" onchange="handleSummaryFile(this.files[0])" />
      <div id="summaryResult" style="flex:2;min-width:200px;">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
          <div><label class="lbl">成員數</label><input type="number" id="sumMembers" placeholder="" style="width:100%;" /></div>
          <div><label class="lbl">總分</label><input type="number" id="sumTotal" placeholder="" style="width:100%;" /></div>
          <div><label class="lbl">名次</label><input type="text" id="sumRank" placeholder="" style="width:100%;" /></div>
          <div><label class="lbl">評級</label><input type="text" id="sumGrade" placeholder="" style="width:100%;" /></div>
        </div>
      </div>
    </div>
    <div id="summaryStatus" style="display:none;margin-top:8px;font-size:0.82rem;"></div>
  </div>

  <!-- 對手排名截圖 -->
  <div class="card">
    <div class="card-title">⚔️ 對手排名（選填）</div>
    <div style="display:flex;gap:10px;align-items:flex-start;flex-wrap:wrap;">
      <div class="drop-zone" id="opponentDropZone" onclick="document.getElementById('opponent-file').click()" style="flex:1;min-width:200px;padding:20px 16px;margin-bottom:0;">
        <div class="dz-icon" style="font-size:1.6rem;">⚔️</div>
        <div class="dz-text" style="font-size:0.85rem;">上傳對手排名截圖</div>
        <div class="dz-sub">排名畫面，辨識公會名稱與分數</div>
      </div>
      <input type="file" id="opponent-file" accept="image/*" style="display:none;" onchange="handleOpponentFile(this.files[0])" />
      <div id="opponentResult" style="flex:2;min-width:260px;">
        <table class="result-table" id="opponentTable" style="display:none;">
          <thead><tr><th>#</th><th>公會名稱</th><th>分數</th><th></th></tr></thead>
          <tbody id="opponentBody"></tbody>
        </table>
        <div class="btn-row" id="opponentBtnRow" style="display:none;">
          <button class="btn btn-secondary" onclick="addOpponentRow()">＋ 手動新增</button>
          <button class="btn btn-primary" onclick="saveOpponents()">💾 儲存對手排名</button>
        </div>
      </div>
    </div>
    <div id="opponentStatus" style="display:none;margin-top:8px;font-size:0.82rem;"></div>
  </div>

  <!-- 上傳 -->
  <div class="card">
    <div class="card-title">📷 上傳成員截圖</div>
    <div class="drop-zone" id="dropZone" onclick="document.getElementById('file-input').click()">
      <div class="dz-icon">📂</div>
      <div class="dz-text">點擊或拖曳截圖到這裡</div>
      <div class="dz-sub">支援 JPG、PNG，可多張（多頁截圖）</div>
    </div>
    <input type="file" id="file-input" accept="image/*" multiple onchange="handleFiles(this.files)" />
    <div id="previewList" style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;"></div>

    <div class="progress-wrap" id="progressWrap">
      <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
      <div class="progress-text" id="progressText">準備辨識中...</div>
    </div>

    <div class="btn-row">
      <button class="btn btn-primary" id="ocrBtn" onclick="startOCR()" disabled>🔍 開始辨識</button>
      <button class="btn btn-secondary" onclick="clearAll()">🗑️ 清除</button>
    </div>
  </div>

  <!-- 結果 -->
  <div class="card" id="resultCard" style="display:none;">
    <div class="card-title">📋 辨識結果（可修正）</div>

    <!-- 缺少成員提示 -->
    <div id="missingAlert" style="display:none;background:#fff3e0;border:1px solid #ffcc80;border-radius:10px;padding:12px 16px;margin-bottom:14px;font-size:0.85rem;color:#e65100;">
      <strong>⚠️ 以下成員未辨識到：</strong>
      <div id="missingList" style="margin-top:6px;display:flex;flex-wrap:wrap;gap:6px;"></div>
    </div>

    <div style="overflow-x:auto;">
      <table class="result-table">
        <thead><tr><th>#</th><th>伺服器</th><th>暱稱</th><th>職稱</th><th>分數</th><th>稱號</th><th></th></tr></thead>
        <tbody id="resultBody"></tbody>
      </table>
    </div>
    <div class="btn-row">
      <button class="btn btn-secondary" onclick="addManualRow()">＋ 手動新增</button>
      <button class="btn btn-primary" id="saveBtn" onclick="saveToSheet()">💾 儲存到 Sheet</button>
    </div>
    <div class="progress-wrap" id="saveProgressWrap" style="display:none;">
      <div class="progress-bar"><div class="progress-fill" id="saveProgressFill"></div></div>
      <div class="progress-text" id="saveProgressText"></div>
    </div>
  </div>
</main>

<script>
let uploadedFiles = [];
let parsedData = [];

// ── 預設日期為最近的週日 ──
(function() {
  const today = new Date();
  const day = today.getDay(); // 0=週日, 1=週一, ...
  const diff = day === 0 ? 0 : day; // 如果今天是週日就用今天，否則回推到上週日
  const lastSunday = new Date(today);
  lastSunday.setDate(today.getDate() - diff);
  document.getElementById('periodInput').valueAsDate = lastSunday;
})();

// ── 總結截圖 OCR ──
const summaryDz = document.getElementById('summaryDropZone');
summaryDz.addEventListener('dragover', e => { e.preventDefault(); summaryDz.classList.add('drag-over'); });
summaryDz.addEventListener('dragleave', () => summaryDz.classList.remove('drag-over'));
summaryDz.addEventListener('drop', e => { e.preventDefault(); summaryDz.classList.remove('drag-over'); handleSummaryFile(e.dataTransfer.files[0]); });

async function handleSummaryFile(file) {
  if (!file || !file.type.startsWith('image/')) return;
  const status = document.getElementById('summaryStatus');
  status.style.display = 'block';
  status.style.color = '#1565c0';
  status.textContent = '⏳ 辨識總結中...';

  try {
    const base64 = await new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = e => resolve(e.target.result.split(',')[1]);
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });

    const res = await fetch(`https://vision.googleapis.com/v1/images:annotate?key=${API_KEY}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ requests: [{ image: { content: base64 }, features: [{ type: 'TEXT_DETECTION' }] }] })
    });
    const data = await res.json();
    const text = data.responses?.[0]?.fullTextAnnotation?.text || '';

    // 解析總結資訊
    const membersMatch = text.match(/在\s*(\d+)\s*名/);
    const totalMatch = text.match(/總獲得\s*([\d,]+)\s*積分/) || text.match(/([\d,]{4,})\s*積分/);
    const rankMatch = text.match(/位列\s*(.+?名)/) || text.match(/(甲級|乙級|丙級).{0,4}(第.名)/);
    const gradeMatch = text.match(/(甲級|乙級|丙級)\s*公會/);

    if (membersMatch) document.getElementById('sumMembers').value = membersMatch[1];
    if (totalMatch) document.getElementById('sumTotal').value = totalMatch[1].replace(/,/g, '');
    if (rankMatch) document.getElementById('sumRank').value = rankMatch[1] || (rankMatch[1] + rankMatch[2]);
    if (gradeMatch) document.getElementById('sumGrade').value = gradeMatch[1] + '公會';

    status.style.color = '#2e7d32';
    status.textContent = '✅ 辨識完成，請確認數據';
  } catch(e) {
    status.style.color = '#c62828';
    status.textContent = '❌ 辨識失敗：' + e.message;
  }
}

// ── 拖放 ──
const dz = document.getElementById('dropZone');
dz.addEventListener('dragover', e => { e.preventDefault(); dz.classList.add('drag-over'); });
dz.addEventListener('dragleave', () => dz.classList.remove('drag-over'));
dz.addEventListener('drop', e => { e.preventDefault(); dz.classList.remove('drag-over'); handleFiles(e.dataTransfer.files); });

function handleFiles(fileList) {
  const newFiles = [...fileList].filter(f => f.type.startsWith('image/'));
  uploadedFiles = uploadedFiles.concat(newFiles);
  if (!uploadedFiles.length) return;
  renderPreviews();
  document.getElementById('ocrBtn').disabled = false;
}

function renderPreviews() {
  const list = document.getElementById('previewList');
  list.innerHTML = uploadedFiles.map((f, i) =>
    `<div style="position:relative;">
      <img src="${URL.createObjectURL(f)}" style="width:80px;height:80px;object-fit:cover;border-radius:10px;border:1px solid var(--border);" />
      <button onclick="removeFile(${i})" style="position:absolute;top:-6px;right:-6px;width:20px;height:20px;border-radius:50%;background:#e65100;color:#fff;border:none;font-size:0.7rem;cursor:pointer;display:flex;align-items:center;justify-content:center;">✕</button>
      <div style="font-size:0.65rem;color:var(--text-muted);text-align:center;margin-top:2px;max-width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${i+1}</div>
    </div>`
  ).join('');
}

function removeFile(idx) {
  uploadedFiles.splice(idx, 1);
  renderPreviews();
  if (!uploadedFiles.length) document.getElementById('ocrBtn').disabled = true;
}

function clearAll() {
  uploadedFiles = [];
  parsedData = [];
  document.getElementById('previewList').innerHTML = '';
  document.getElementById('ocrBtn').disabled = true;
  document.getElementById('resultCard').style.display = 'none';
  document.getElementById('rawCard').style.display = 'none';
  document.getElementById('progressWrap').style.display = 'none';
}

// ── OCR（Google Cloud Vision API）──
async function startOCR() {
  if (!uploadedFiles.length) return;
  const btn = document.getElementById('ocrBtn');
  btn.disabled = true; btn.textContent = '⏳ 辨識中...';
  const pw = document.getElementById('progressWrap');
  const pf = document.getElementById('progressFill');
  const pt = document.getElementById('progressText');
  pw.style.display = 'block';
  pf.style.width = '10%';
  pt.textContent = '上傳圖片至 Google Vision...';

  let allText = '';

  for (let i = 0; i < uploadedFiles.length; i++) {
    pt.textContent = `辨識第 ${i+1}/${uploadedFiles.length} 張...`;
    pf.style.width = Math.round(10 + (i / uploadedFiles.length) * 80) + '%';

    // 讀取圖片為 base64
    const base64 = await new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = e => resolve(e.target.result.split(',')[1]);
      reader.onerror = reject;
      reader.readAsDataURL(uploadedFiles[i]);
    });

    // 呼叫 Google Cloud Vision API（用 DOCUMENT_TEXT_DETECTION 取得座標）
    const res = await fetch(`https://vision.googleapis.com/v1/images:annotate?key=${API_KEY}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        requests: [{
          image: { content: base64 },
          features: [{ type: 'DOCUMENT_TEXT_DETECTION' }]
        }]
      })
    });

    if (!res.ok) {
      const err = await res.json();
      pt.textContent = `❌ API 錯誤：${err.error?.message || res.status}`;
      btn.disabled = false; btn.textContent = '🔍 開始辨識';
      return;
    }

    const data = await res.json();
    // 使用完整文字標記，按座標重建行
    const pages = data.responses?.[0]?.fullTextAnnotation?.pages || [];
    let reconstructed = '';
    for (const page of pages) {
      // 收集所有 word 和其 Y 座標
      const words = [];
      for (const block of (page.blocks || [])) {
        for (const para of (block.paragraphs || [])) {
          for (const word of (para.words || [])) {
            const text = word.symbols.map(s => s.text).join('');
            const vertices = word.boundingBox?.vertices || [];
            const y = vertices[0]?.y || 0;
            const x = vertices[0]?.x || 0;
            words.push({ text, x, y });
          }
        }
      }
      // 按 Y 座標分行（Y 差距 < 20px 視為同一行）
      words.sort((a, b) => a.y - b.y || a.x - b.x);
      const lines = [];
      let currentLine = [];
      let lastY = -999;
      for (const w of words) {
        if (w.y - lastY > 20 && currentLine.length) {
          lines.push(currentLine.sort((a, b) => a.x - b.x).map(w => w.text).join(' '));
          currentLine = [];
        }
        currentLine.push(w);
        lastY = w.y;
      }
      if (currentLine.length) {
        lines.push(currentLine.sort((a, b) => a.x - b.x).map(w => w.text).join(' '));
      }
      reconstructed += lines.join('\n') + '\n';
    }

    allText += reconstructed;
  }

  pf.style.width = '95%';
  pt.textContent = '解析結果中...';

  // 解析文字
  parsedData = parseOCRText(allText);

  // 用 members 資料比對補正暱稱和職位
  await matchWithMembers(parsedData);

  // 根據分數自動填入稱號
  parsedData.forEach(d => {
    if (d.score >= 1400)      d.title = '王者花匠';
    else if (d.score >= 1300) d.title = '大師花匠';
    else if (d.score >= 1000) d.title = '黃金花匠';
    else if (d.score >= 700)  d.title = '白銀花匠';
    else if (d.score >= 500)  d.title = '青銅花匠';
    else                      d.title = '無稱號';
  });

  // 按分數高→低排序
  parsedData.sort((a, b) => b.score - a.score);

  // 去除重複（同暱稱+同分數視為重複，保留第一筆）
  const seen = new Set();
  parsedData = parsedData.filter(d => {
    const key = `${d.nickname}_${d.score}`;
    if (seen.has(key)) return false;
    seen.add(key);
    return true;
  });

  renderResult();

  pf.style.width = '100%';
  btn.disabled = false; btn.textContent = '🔍 開始辨識';
  pt.textContent = `✅ 辨識完成！共 ${parsedData.length} 筆`;
}

// ── 從 Sheet 讀取成員資料，比對暱稱並補正職位 ──
let membersCache = null;
async function loadMembers() {
  if (membersCache) return membersCache;
  try {
    const res = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/members!A1:E?key=${API_KEY}`);
    const data = await res.json();
    const rows = (data.values || []).slice(1);
    membersCache = rows
      .filter(r => (r[3] || '').toLowerCase() !== 'true') // 排除已離開
      .map(r => ({ gameId: r[0]||'', nickname: r[1]||'', role: r[2]||'成員', server: r[4]||'' }));
    return membersCache;
  } catch(e) { return []; }
}

// ── 編輯距離（Levenshtein） ──
function levenshtein(a, b) {
  const m = a.length, n = b.length;
  const dp = Array.from({length: m+1}, () => Array(n+1).fill(0));
  for (let i = 0; i <= m; i++) dp[i][0] = i;
  for (let j = 0; j <= n; j++) dp[0][j] = j;
  for (let i = 1; i <= m; i++)
    for (let j = 1; j <= n; j++)
      dp[i][j] = a[i-1] === b[j-1] ? dp[i-1][j-1] : 1 + Math.min(dp[i-1][j-1], dp[i-1][j], dp[i][j-1]);
  return dp[m][n];
}

async function matchWithMembers(data) {
  const members = await loadMembers();
  if (!members.length) return;

  // 清除 emoji 和特殊符號的輔助函式
  const stripSymbols = s => s.replace(/\s/g, '').replace(/[\u{1F000}-\u{1FFFF}]|[\u{2600}-\u{27FF}]|[\u{FE00}-\u{FEFF}]|[❤♡♥☆★●○◎◇◆□■△▲▽▼♪♫✿❀✦✧☀️⭐️❤️💕💖💗💙💚💛🧡💜🖤🤍🤎💝💞💟❣️💔🌸🌺🌷🌹🌻💐🌼🍀☘️🍃🌿🎀✨⚡️🔥💫⭕️❌⬆️⬇️❗️❓]/gu, '');

  for (const d of data) {
    const ocrClean = stripSymbols(d.nickname);

    // 精確匹配（去空格+符號後）
    let match = members.find(m => stripSymbols(m.nickname) === ocrClean);

    // 模糊匹配：互相包含（至少2字）
    if (!match) {
      match = members.find(m => {
        const mClean = stripSymbols(m.nickname);
        if (mClean.length < 2 || ocrClean.length < 2) return false;
        return ocrClean.includes(mClean) || mClean.includes(ocrClean);
      });
    }

    // 編輯距離匹配：差 1 個字以內
    if (!match && ocrClean.length >= 2) {
      let bestDist = 999, bestMatch = null;
      for (const m of members) {
        const mClean = stripSymbols(m.nickname);
        if (Math.abs(mClean.length - ocrClean.length) > 1) continue;
        const dist = levenshtein(ocrClean, mClean);
        if (dist <= 1 && dist < bestDist) { bestDist = dist; bestMatch = m; }
      }
      if (bestMatch) match = bestMatch;
    }

    if (match) {
      d.nickname = match.nickname;
      d.role = match.role;
      if (match.server && !d.server) d.server = match.server;
    } else {
      if (!d.role) d.role = '成員';
    }
  }
}

// ── 解析 OCR 文字 ──
function parseOCRText(text) {
  const results = [];
  let currentTitle = '';

  const TITLES = ['王者花匠', '大師花匠', '黃金花匠', '白銀花匠', '青銅花匠'];
  const ROLES = ['副會長', '會長', '理事', '菁英', '成員', '分會成員'];

  // 先清除空格對解析的干擾：把 "s 24" 合成 "s24"，"$ 10" 合成 "$10"
  const cleaned = text
    .replace(/商店\s*/g, '')  // 移除背景「商店」文字
    .replace(/[sS$]\s*(\d+)\s*[.\s·．、]\s*/g, (m, num) => `s${num}.`)  // 統一 s{num}. 格式
    .replace(/副\s*會\s*長/g, '副會長')
    .replace(/會\s*長/g, '會長')
    .replace(/理\s*事/g, '理事')
    .replace(/菁\s*英/g, '菁英')
    .replace(/成\s*員/g, '成員')
    .replace(/分\s*會\s*成\s*員/g, '分會成員');

  const lines = cleaned.split('\n').map(l => l.trim()).filter(l => l);

  // 合併斷行：分數獨立在下一行的情況
  const merged = [];
  for (let i = 0; i < lines.length; i++) {
    if (/^\d{3,4}$/.test(lines[i]) && merged.length > 0 && /s\d+\./.test(merged[merged.length - 1])) {
      merged[merged.length - 1] += ' ' + lines[i];
    } else {
      merged.push(lines[i]);
    }
  }

  for (const line of merged) {
    // 偵測稱號
    const titleMatch = TITLES.find(t => line.includes(t));
    if (titleMatch && !line.match(/s\d+\./)) { currentTitle = titleMatch; continue; }

    // 主要匹配模式：s{num}.{任意文字}{分數}
    const match = line.match(/s(\d+)\.(.+?)(\d{3,4})\s*$/);
    if (!match) continue;

    const server = 's' + match[1];
    let middle = match[2].trim();
    const score = parseInt(match[3]);

    // 從 middle 提取職位
    let role = '';
    for (const r of ROLES) {
      if (middle.includes(r)) {
        role = r;
        middle = middle.replace(r, '').trim();
        break;
      }
    }

    // 清除常見 OCR 雜訊
    let nickname = middle
      .replace(/^[.\s·．、]+/, '')           // 開頭的點號
      .replace(/^菜\s*米\s*/g, '')          // 開頭的「菜米」（emoji 誤判）只清開頭
      .replace(/^米果\s*/g, '')             // 開頭的「米果」
      .replace(/[書与與]\s*[書与與]?\s*$/g, '')  // 結尾的「書與」「書」
      .replace(/[()（）]/g, '')             // 括號
      .replace(/商店\s*/g, '')              // 背景文字殘留
      .replace(/\s+/g, '')                  // 移除中間多餘空格
      .trim();

    if (!nickname || score < 100) continue;

    results.push({ server, nickname, role, score, title: currentTitle });
  }

  return results;
}

// ── 顯示結果 ──
function renderResult() {
  const card = document.getElementById('resultCard');
  const tbody = document.getElementById('resultBody');

  if (!parsedData.length) {
    card.style.display = 'block';
    tbody.innerHTML = '<tr><td colspan="7" class="empty-state">⚠️ 未能辨識到成員資料，請確認截圖清晰度</td></tr>';
    checkMissing();
    return;
  }

  card.style.display = 'block';
  let lastTitle = '';
  tbody.innerHTML = parsedData.map((d, i) => {
    let titleRow = '';
    if (d.title && d.title !== lastTitle) {
      lastTitle = d.title;
      titleRow = `<tr class="title-divider"><td colspan="7">🏆 ${d.title}</td></tr>`;
    }
    return titleRow + `<tr>
      <td>${i+1}</td>
      <td><input value="${d.server}" onchange="updateRow(${i},'server',this.value)" style="width:60px;" /></td>
      <td><input value="${d.nickname}" onchange="updateRow(${i},'nickname',this.value)" /></td>
      <td><select onchange="updateRow(${i},'role',this.value)">
        ${['會長','副會長','理事','菁英','成員','分會成員',''].map(r => `<option ${d.role===r?'selected':''}>${r}</option>`).join('')}
      </select></td>
      <td><input type="number" value="${d.score}" onchange="updateScore(${i},this.value)" style="width:70px;" /></td>
      <td>${d.title}</td>
      <td><button onclick="removeRow(${i})" style="background:none;border:none;color:#e65100;cursor:pointer;font-size:1rem;" title="刪除">✕</button></td>
    </tr>`;
  }).join('');

  checkMissing();
}

function updateRow(idx, field, value) {
  parsedData[idx][field] = value;
}

function updateScore(idx, value) {
  parsedData[idx].score = Number(value);
  // 重新計算稱號
  const s = parsedData[idx].score;
  if (s >= 1400)      parsedData[idx].title = '王者花匠';
  else if (s >= 1300) parsedData[idx].title = '大師花匠';
  else if (s >= 1000) parsedData[idx].title = '黃金花匠';
  else if (s >= 700)  parsedData[idx].title = '白銀花匠';
  else if (s >= 500)  parsedData[idx].title = '青銅花匠';
  else                parsedData[idx].title = '無稱號';
}

function removeRow(idx) {
  parsedData.splice(idx, 1);
  resortAndRender();
}

function addManualRow() {
  parsedData.push({ server: '', nickname: '', role: '成員', score: 0, title: '無稱號' });
  resortAndRender();
  // 滾到最底部讓使用者填寫（新增的分數是 0 會排最後）
  setTimeout(() => {
    const tbody = document.getElementById('resultBody');
    tbody.lastElementChild?.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }, 100);
}

function resortAndRender() {
  // 重新計算所有稱號
  parsedData.forEach(d => {
    const s = d.score;
    if (s >= 1400)      d.title = '王者花匠';
    else if (s >= 1300) d.title = '大師花匠';
    else if (s >= 1000) d.title = '黃金花匠';
    else if (s >= 700)  d.title = '白銀花匠';
    else if (s >= 500)  d.title = '青銅花匠';
    else                d.title = '無稱號';
  });
  // 按分數排序
  parsedData.sort((a, b) => b.score - a.score);
  renderResult();
}

// ── 檢查缺少的成員 ──
async function checkMissing() {
  const members = await loadMembers();
  if (!members.length) return;

  const foundNames = new Set(parsedData.map(d => d.nickname));
  const missing = members.filter(m => !foundNames.has(m.nickname));

  const alert = document.getElementById('missingAlert');
  const list = document.getElementById('missingList');

  if (missing.length > 0 && missing.length < members.length) {
    alert.style.display = '';
    list.innerHTML = missing.map(m =>
      `<button onclick="addMissingMember('${m.nickname.replace(/'/g,"\\'")}','${m.role}')" style="padding:3px 10px;border-radius:8px;border:1px solid #ffcc80;background:#fff;color:#e65100;font-size:0.8rem;cursor:pointer;font-weight:600;">＋ ${m.nickname}</button>`
    ).join('');
  } else {
    alert.style.display = 'none';
  }
}

function addMissingMember(nickname, role) {
  // 從 members 找伺服器資訊（如果有的話）
  const score = parseInt(prompt(`請輸入 ${nickname} 的分數：`));
  if (isNaN(score) || score <= 0) return;

  parsedData.push({ server: '', nickname, role, score, title: '' });
  resortAndRender();
}

// ── 儲存到 Sheet（整批） ──
async function saveToSheet() {
  const period = document.getElementById('periodInput').value.trim();
  if (!period) { alert('請填入競賽期數'); return; }
  if (!parsedData.length) { alert('沒有資料可儲存'); return; }

  const btn = document.getElementById('saveBtn');
  btn.disabled = true; btn.textContent = '⏳ 儲存中...';

  const pw = document.getElementById('saveProgressWrap');
  const pf = document.getElementById('saveProgressFill');
  const pt = document.getElementById('saveProgressText');
  pw.style.display = 'block';
  pf.style.width = '0%';
  pt.textContent = `準備儲存 ${parsedData.length} 筆...`;

  try {
    // 分批傳送，每批 10 筆
    const BATCH_SIZE = 10;
    const total = parsedData.length;
    let done = 0;

    for (let i = 0; i < total; i += BATCH_SIZE) {
      const batch = parsedData.slice(i, i + BATCH_SIZE);
      const records = batch.map(d => ([period, d.server, d.nickname, d.role, d.score, d.title]));
      const params = encodeURIComponent(JSON.stringify({
        action: 'addContestBatch',
        records: records
      }));

      await new Promise(resolve => {
        const img = new Image();
        img.onload = img.onerror = () => resolve();
        img.src = `${APPS_SCRIPT_URL}?data=${params}`;
      });

      done += batch.length;
      pf.style.width = Math.round(done / total * 100) + '%';
      pt.textContent = `儲存中 ${done}/${total}...`;
    }

    pf.style.width = '100%';
    pt.textContent = `✅ 已儲存 ${total} 筆！`;

    // 儲存公會總結（如果有填）
    const sumMembers = document.getElementById('sumMembers').value.trim();
    const sumTotal = document.getElementById('sumTotal').value.trim();
    const sumRank = document.getElementById('sumRank').value.trim();
    const sumGrade = document.getElementById('sumGrade').value.trim();
    if (sumTotal) {
      await new Promise(resolve => {
        const params = encodeURIComponent(JSON.stringify({
          action: 'addContestSummary',
          period, members: sumMembers, total: sumTotal, rank: sumRank, grade: sumGrade
        }));
        const img = new Image();
        img.onload = img.onerror = () => resolve();
        img.src = `${APPS_SCRIPT_URL}?data=${params}`;
      });
    }

    alert(`✅ 已儲存 ${total} 筆成績到 Sheet！`);
  } catch(e) {
    pt.textContent = '❌ 儲存失敗';
    alert('❌ 儲存失敗：' + e.message);
  } finally {
    btn.disabled = false; btn.textContent = '💾 儲存到 Sheet';
  }
}
// ── 對手排名辨識 ──
let opponentData = [];
const oppDz = document.getElementById('opponentDropZone');
oppDz.addEventListener('dragover', e => { e.preventDefault(); oppDz.classList.add('drag-over'); });
oppDz.addEventListener('dragleave', () => oppDz.classList.remove('drag-over'));
oppDz.addEventListener('drop', e => { e.preventDefault(); oppDz.classList.remove('drag-over'); handleOpponentFile(e.dataTransfer.files[0]); });

async function handleOpponentFile(file) {
  if (!file || !file.type.startsWith('image/')) return;
  const status = document.getElementById('opponentStatus');
  status.style.display = 'block';
  status.style.color = '#1565c0';
  status.textContent = '⏳ 辨識對手排名中...';

  try {
    const base64 = await new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = e => resolve(e.target.result.split(',')[1]);
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });

    const res = await fetch(`https://vision.googleapis.com/v1/images:annotate?key=${API_KEY}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ requests: [{ image: { content: base64 }, features: [{ type: 'TEXT_DETECTION' }] }] })
    });
    const data = await res.json();
    const text = data.responses?.[0]?.fullTextAnnotation?.text || '';

    // 解析對手排名
    opponentData = parseOpponentText(text);
    renderOpponentTable();

    status.style.color = '#2e7d32';
    status.textContent = `✅ 辨識完成！共 ${opponentData.length} 筆`;
  } catch(e) {
    status.style.color = '#c62828';
    status.textContent = '❌ 辨識失敗：' + e.message;
  }
}

function parseOpponentText(text) {
  const results = [];
  const lines = text.split('\n').map(l => l.trim()).filter(l => l);

  // 嘗試匹配：數字(名次) + 文字(公會名) + 數字(分數)
  for (const line of lines) {
    // 模式1: "1 璀璨 14012" 或 "2 愛戀櫻花雨 11859"
    const m = line.match(/^(\d{1,2})\s+(.+?)\s+(\d{4,6})$/);
    if (m) {
      results.push({ rank: parseInt(m[1]), name: m[2].trim(), score: parseInt(m[3]) });
      continue;
    }
    // 模式2: 只有公會名+分數（沒名次）
    const m2 = line.match(/^(.{2,10})\s+(\d{4,6})$/);
    if (m2 && !m2[1].match(/^\d+$/)) {
      results.push({ rank: results.length + 1, name: m2[1].trim(), score: parseInt(m2[2]) });
    }
  }

  // 如果沒解析到，試逐行找分數
  if (!results.length) {
    const scoreLines = lines.filter(l => /\d{4,6}/.test(l));
    const nameLines = lines.filter(l => !(/^\d+$/.test(l)) && !(/\d{4,6}/.test(l)) && l.length >= 2 && l.length <= 10);
    for (let i = 0; i < Math.min(scoreLines.length, nameLines.length); i++) {
      const score = parseInt(scoreLines[i].match(/(\d{4,6})/)[1]);
      results.push({ rank: i + 1, name: nameLines[i], score });
    }
  }

  // 按分數排序
  results.sort((a, b) => b.score - a.score);
  results.forEach((d, i) => d.rank = i + 1);

  return results;
}

function renderOpponentTable() {
  const table = document.getElementById('opponentTable');
  const tbody = document.getElementById('opponentBody');
  const btnRow = document.getElementById('opponentBtnRow');
  table.style.display = '';
  btnRow.style.display = '';

  tbody.innerHTML = opponentData.map((d, i) =>
    `<tr${d.name === '璀璨' ? ' style="background:#fef0e7;font-weight:700;"' : ''}>
      <td>${d.rank}</td>
      <td><input value="${d.name}" onchange="opponentData[${i}].name=this.value" /></td>
      <td><input type="number" value="${d.score}" onchange="opponentData[${i}].score=Number(this.value)" style="width:80px;" /></td>
      <td><button onclick="opponentData.splice(${i},1);renderOpponentTable();" style="background:none;border:none;color:#e65100;cursor:pointer;">✕</button></td>
    </tr>`
  ).join('');
}

function addOpponentRow() {
  opponentData.push({ rank: opponentData.length + 1, name: '', score: 0 });
  renderOpponentTable();
}

async function saveOpponents() {
  const period = document.getElementById('periodInput').value.trim();
  if (!period) { alert('請填入競賽期數'); return; }
  if (!opponentData.length) { alert('沒有對手資料可儲存'); return; }

  try {
    const records = opponentData.map(d => ([period, d.rank, d.name, d.score]));
    const params = encodeURIComponent(JSON.stringify({
      action: 'addContestOpponents',
      records: records
    }));
    await new Promise(resolve => {
      const img = new Image();
      img.onload = img.onerror = () => resolve();
      img.src = `${APPS_SCRIPT_URL}?data=${params}`;
    });
    alert(`✅ 已儲存 ${opponentData.length} 筆對手排名！`);
  } catch(e) {
    alert('❌ 儲存失敗：' + e.message);
  }
}

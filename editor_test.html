<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>管理編輯器</title>
  <script>
  const APPS_SCRIPT_URL='https://script.google.com/macros/s/AKfycbxFNC3q4JJFdxLnlQ2M2OgD8qVTIXrN1tZ6Y6rZQiUs2ku-Es9DkbWrlr-XT_3Rsgfu4Q/exec';
  const SHEET_ID='1hKW9-wVYfZAjP4YIGJY6ngK8cFWuhDn1OxGvPnHLGDg';
  const API_KEY='AIzaSyALI8OL0bN4yg4PTV3q_hwIsdrkkpcJ0Tg';
  </script>
  <style>
    :root{--pink:#e96a1e;--pink-light:#fef0e7;--pink-mid:#f4a46a;--pink-dark:#c2510b;--bg:#fff8f5;--border:#f8d5b0;--radius:10px;--shadow:0 2px 10px rgba(233,106,30,.1);}
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Microsoft JhengHei',sans-serif;background:var(--bg);color:#3d1a2e;padding:24px 16px 100px;}
    h1{text-align:center;color:var(--pink-dark);font-size:1.3rem;margin-bottom:4px;}
    .subtitle{text-align:center;color:#9e6b7e;font-size:.85rem;margin-bottom:16px;}
    .tabs{display:flex;gap:8px;margin-bottom:16px;}
    .tab{padding:8px 22px;border-radius:20px;font-size:.92rem;font-weight:600;cursor:pointer;border:1.5px solid var(--pink-mid);background:var(--pink-light);color:var(--pink-dark);transition:all .2s;}
    .tab.active{background:var(--pink);color:#fff;border-color:var(--pink);}
    .panel{display:none;}.panel.active{display:block;}
    .card{background:#fff;border-radius:var(--radius);border:1px solid var(--border);box-shadow:var(--shadow);padding:14px 16px;margin-bottom:10px;}
    .mrow{display:grid;grid-template-columns:1fr 1fr 1fr auto;gap:10px;align-items:center;}
    .lbl{font-size:.75rem;color:#9e6b7e;margin-bottom:3px;}
    input[type=text],input[type=number],select{padding:7px 10px;border:1.5px solid var(--pink-mid);border-radius:7px;font-size:.9rem;background:var(--bg);color:#3d1a2e;outline:none;width:100%;}
    input:focus,select:focus{border-color:var(--pink);}
    .btn-rm{background:#fff3e0;color:#e65100;border:1.5px solid #ffcc80;border-radius:7px;padding:7px 12px;cursor:pointer;font-size:.85rem;font-weight:600;white-space:nowrap;}
    .btn-rm:hover{background:#ffe0b2;}
    .btn-add{display:flex;align-items:center;gap:6px;padding:9px 18px;background:var(--pink-light);color:var(--pink-dark);border:1.5px dashed var(--pink-mid);border-radius:var(--radius);font-size:.92rem;font-weight:600;cursor:pointer;width:100%;justify-content:center;transition:background .2s;margin-top:4px;}
    .btn-add:hover{background:var(--pink-mid);color:#fff;}
    .fbar{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap;}
    .twrap{overflow-x:auto;background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);border:1px solid var(--border);}
    table{width:100%;border-collapse:collapse;min-width:700px;}
    thead tr{background:linear-gradient(135deg,#c2510b,#e96a1e);color:#fff;}
    th{padding:11px 12px;font-size:.88rem;white-space:nowrap;text-align:left;}
    td{padding:7px 8px;border-bottom:1px solid var(--border);vertical-align:middle;}
    tbody tr:last-child td{border-bottom:none;}
    tbody tr:hover{background:var(--pink-light);}
    .thumb{width:52px;height:52px;object-fit:cover;border-radius:8px;border:1px solid var(--border);background:#fef0e7;display:block;}
    .fname{font-weight:600;font-size:.9rem;color:var(--pink-dark);}
    .cs{position:relative;width:90px;user-select:none;}
    .cst{display:flex;align-items:center;justify-content:space-between;padding:6px 10px;border-radius:7px;cursor:pointer;font-size:.9rem;font-weight:700;color:#fff;border:none;width:100%;}
    .cst::after{content:'\25be';font-size:.75rem;margin-left:4px;}
    .csd{display:none;position:absolute;top:calc(100% + 4px);left:0;background:#fff;border:1.5px solid var(--border);border-radius:8px;overflow:hidden;box-shadow:0 4px 16px rgba(0,0,0,.15);z-index:50;min-width:100%;}
    .csd.open{display:block;}
    .cso{display:flex;align-items:center;gap:8px;padding:7px 12px;cursor:pointer;font-size:.88rem;font-weight:600;transition:filter .15s;}
    .cso:hover{filter:brightness(.92);}
    .q-仙{background:linear-gradient(135deg,#ff4e8a,#ff8c42);}
    .q-華{background:linear-gradient(135deg,#ff8c00,#ffb347);}
    .q-珍{background:linear-gradient(135deg,#9b59b6,#c39bd3);}
    .q-普{background:linear-gradient(135deg,#4a90d9,#74b9ff);}
    .q-凡{background:linear-gradient(135deg,#7f8c6e,#a8b89a);}
    .cso.q-仙{background:linear-gradient(135deg,#ff4e8a,#ff8c42);color:#fff;}
    .cso.q-華{background:linear-gradient(135deg,#ff8c00,#ffb347);color:#fff;}
    .cso.q-珍{background:linear-gradient(135deg,#9b59b6,#c39bd3);color:#fff;}
    .cso.q-普{background:linear-gradient(135deg,#4a90d9,#74b9ff);color:#fff;}
    .cso.q-凡{background:linear-gradient(135deg,#7f8c6e,#a8b89a);color:#fff;}
    .loading{text-align:center;padding:40px;color:#9e6b7e;}
    .bbar{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--border);padding:10px 12px;display:flex;gap:8px;justify-content:center;flex-wrap:wrap;box-shadow:0 -2px 10px rgba(233,106,30,.08);}
    .btn{padding:9px 18px;border-radius:8px;font-size:.9rem;font-weight:600;cursor:pointer;border:none;transition:opacity .2s;}
    .btn:hover{opacity:.85;}.btn:disabled{opacity:.5;cursor:not-allowed;}
    .btn-sec{background:var(--pink-light);color:var(--pink-dark);border:1.5px solid var(--pink-mid);}
  </style>
</head>
<body>
<h1>&#9881;&#65039; 管理編輯器</h1>
<p class="subtitle">成員管理 / 花卉資料編輯</p>
<div class="tabs">
  <button class="tab active" onclick="switchTab('tm',this)">&#128101; 成員管理</button>
  <button class="tab" onclick="switchTab('tf',this)">&#127800; 花卉資料</button>
</div>
<div id="tm" class="panel active">
  <div id="mlist"><div class="loading">載入中...</div></div>
  <button class="btn-add" onclick="addM()">＋ 新增成員</button>
</div>
<div id="tf" class="panel">
  <div class="fbar">
    <label style="font-size:.9rem;font-weight:600;color:var(--pink-dark);">品質：</label>
    <select id="qf" onchange="renderT()" style="width:auto;">
      <option value="">全部</option><option>仙</option><option>華</option><option>珍</option><option>普</option><option>凡</option>
    </select>
    <label style="font-size:.9rem;font-weight:600;color:var(--pink-dark);">取得方式：</label>
    <select id="of" onchange="renderT()" style="width:auto;">
      <option value="">全部</option><option>等級</option><option>活動</option><option>花圃</option><option>花坊</option>
      <option>VIP</option><option>週花</option><option>星河映蕊</option><option>花靈商店</option>
      <option>精靈花</option><option>卡冊</option><option>心聯盟</option><option>累積儲值</option>
    </select>
    <span id="fc" style="font-size:.85rem;color:#9e6b7e;"></span>
  </div>
  <div class="twrap">
    <table><thead><tr><th>縮圖</th><th>花名</th><th>顯示順序</th><th>品質</th><th>競賽分</th><th>取得方式</th></tr></thead>
    <tbody id="tb"></tbody></table>
  </div>
</div>
<div class="bbar">
  <button class="btn" style="background:#4a90d9;color:#fff;" id="smBtn" onclick="saveM()">&#128190; 儲存成員</button>
  <button class="btn" style="background:#34a853;color:#fff;display:none;" id="sfBtn" onclick="saveFlowers()">&#128190; 儲存花卉</button>
</div>
<script>
const QL=['仙','華','珍','普','凡'],SL=[14,21,23,25,28,30];
const OL=['等級','活動','花圃','花坊','VIP','週花','星河映蕊','花靈商店','精靈花','卡冊','心聯盟','累積儲値'];
const QO={'仙':0,'華':1,'珍':2,'普':3,'凡':4};
let members=[],origM=[],fd=[],origFd=[];

function switchTab(id,btn){
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById(id).classList.add('active');btn.classList.add('active');
  document.getElementById('smBtn').style.display=id==='tm'?'':'none';
  document.getElementById('sfBtn').style.display=id==='tf'?'':'none';
}

// ── 成員管理 ──
async function loadM(){
  try{
    const r=await fetch('https://sheets.googleapis.com/v4/spreadsheets/'+SHEET_ID+'/values/members!A1:E?key='+API_KEY);
    const d=await r.json();
    members=(d.values||[]).slice(1).map(r=>({gameId:r[0]||'',nickname:r[1]||'',note:r[2]||'成員',left:(r[3]||'').toLowerCase()==='true'}));
    origM=JSON.parse(JSON.stringify(members));
  }catch(e){members=[];origM=[];}
  renderM();
}

function renderM(){
  const el=document.getElementById('mlist');
  const active=members.filter(m=>!m.left);
  if(!active.length){el.innerHTML='<p style="color:#9e6b7e;font-size:.9rem;margin-bottom:12px;">尚無在職成員。</p>';return;}
  el.innerHTML=active.map(m=>{
    const i=members.indexOf(m);
    return '<div class="card"><div class="mrow">'
      +'<div><div class="lbl">遇戲 ID</div><input type="text" value="'+m.gameId+'" oninput="members['+i+'].gameId=this.value" placeholder="遇戲 ID"/></div>'
      +'<div><div class="lbl">昵稱</div><input type="text" value="'+m.nickname+'" oninput="members['+i+'].nickname=this.value" placeholder="昵稱"/></div>'
      +'<div><div class="lbl">職位</div><select onchange="members['+i+'].note=this.value">'
      +['會長','副會長','理事','菁英','成員'].map(r=>'<option '+(m.note===r?'selected':'')+'>'+r+'</option>').join('')
      +'</select></div>'
      +'<div><button class="btn-rm" onclick="members['+i+'].left=true;renderM()">移除</button></div>'
      +'</div></div>';
  }).join('');
}

function addM(){members.push({gameId:'',nickname:'',note:'成員',left:false});renderM();}

async function saveM(){
  const om={};origM.forEach(m=>{om[m.gameId]=m;});
  const ch=members.filter(m=>{
    if(!m.gameId)return false;
    const o=om[m.gameId];
    if(!o&&m.left)return false;if(!o)return true;
    return o.nickname!==m.nickname||o.note!==m.note||!!o.left!==!!m.left;
  });
  if(!ch.length){alert('成員資料沒有變動');return;}
  const btn=document.getElementById('smBtn');
  btn.innerHTML='⏳ 儲存中...';btn.disabled=true;
  try{
    for(const m of ch){
      await new Promise(res=>{
        const p=encodeURIComponent(JSON.stringify({action:'updateMember',gameId:m.gameId,nickname:m.nickname,note:m.note,left:!!m.left}));
        const img=new Image();img.onload=img.onerror=()=>res();
        img.src=APPS_SCRIPT_URL+'?data='+p;
      });
    }
    alert('✅ 成員資料已儲存！（'+ch.length+' 筆變動）');
    origM=JSON.parse(JSON.stringify(members));
  }catch(e){alert('❌ 儲存失敗：'+e.message);}
  finally{btn.innerHTML='💾 儲存成員';btn.disabled=false;}
}

// ── 花卉資料 ──
async function loadF(){
  try{
    const r=await fetch('https://sheets.googleapis.com/v4/spreadsheets/'+SHEET_ID+'/values/flowers!A1:Z?key='+API_KEY);
    const d=await r.json();
    const rows=d.values||[];
    const headers=rows[0]||[];
    fd=rows.slice(1).map(row=>{
      const f={};
      headers.forEach((h,i)=>{f[h]=row[i]||'';});
      f.id=Number(f.id);f.score=Number(f.score);f.order=Number(f.order)||999;
      f.owners=[];
      return f;
    });
    origFd=JSON.parse(JSON.stringify(fd));
  }catch(e){fd=[];origFd=[];}
  renderT();
}

function buildQS(idx,cur){
  const id='qs'+idx;
  return '<div class="cs" id="'+id+'"><button type="button" class="cst q-'+cur+'" onclick="tgQ(\''+id+'\')">'+cur+'</button>'
    +'<div class="csd" id="'+id+'d">'+QL.map(q=>'<div class="cso q-'+q+'" onclick="pkQ('+idx+',\''+q+'\')">'+q+'</div>').join('')+'</div></div>';
}
function tgQ(id){
  document.querySelectorAll('.csd.open').forEach(d=>{if(d.id!==id+'d')d.classList.remove('open');});
  document.getElementById(id+'d').classList.toggle('open');
}
function pkQ(idx,v){
  fd[idx].quality=v;const id='qs'+idx;
  const t=document.querySelector('#'+id+' .cst');t.textContent=v;t.className='cst q-'+v;
  document.getElementById(id+'d').classList.remove('open');
}
document.addEventListener('click',e=>{if(!e.target.closest('.cs'))document.querySelectorAll('.csd.open').forEach(d=>d.classList.remove('open'));});

function renderT(){
  const qf=document.getElementById('qf').value,of=document.getElementById('of').value;
  const fil=fd.map((f,i)=>({f,i})).filter(({f})=>(!qf||f.quality===qf)&&(!of||f.obtain===of))
    .sort((a,b)=>{const qd=(QO[a.f.quality]??9)-(QO[b.f.quality]??9);return qd||((a.f.order??999)-(b.f.order??999));});
  document.getElementById('fc').textContent='顯示 '+fil.length+' / '+fd.length+' 筆';
  document.getElementById('tb').innerHTML=fil.map(({f,i})=>
    '<tr><td><img class="thumb" src="'+f.img+'" alt="'+f.name+'" onerror="this.style.opacity=0.3"></td>'
    +'<td><div class="fname">'+f.name+'</div></td>'
    +'<td><input type="number" min="1" value="'+(f.order||i+1)+'" onchange="fd['+i+'].order=Number(this.value)" style="width:60px;"></td>'
    +'<td>'+buildQS(i,f.quality)+'</td>'
    +'<td><select onchange="fd['+i+'].score=Number(this.value)">'+SL.map(s=>'<option value="'+s+'" '+(f.score===s?'selected':'')+'>'+s+' 分</option>').join('')+'</select></td>'
    +'<td><select onchange="fd['+i+'].obtain=this.value">'+OL.map(o=>'<option value="'+o+'" '+(f.obtain===o?'selected':'')+'>'+o+'</option>').join('')+'</select></td>'
    +'</tr>'
  ).join('');
}

async function saveFlowers(){
  // 找出有變動的花（quality/score/obtain/order）
  const changed=fd.filter((f,i)=>{
    const o=origFd[i];
    if(!o)return true;
    return f.quality!==o.quality||f.score!==o.score||f.obtain!==o.obtain||f.order!==o.order;
  });
  if(!changed.length){alert('花卡資料沒有變動');return;}
  const btn=document.getElementById('sfBtn');
  btn.innerHTML='⏳ 儲存中...';btn.disabled=true;
  try{
    for(const f of changed){
      await new Promise(res=>{
        const p=encodeURIComponent(JSON.stringify({action:'updateFlower',id:f.id,quality:f.quality,score:f.score,obtain:f.obtain,order:f.order}));
        const img=new Image();img.onload=img.onerror=()=>res();
        img.src=APPS_SCRIPT_URL+'?data='+p;
      });
    }
    alert('✅ 花卡資料已儲存！（'+changed.length+' 筆變動）');
    origFd=JSON.parse(JSON.stringify(fd));
  }catch(e){alert('❌ 儲存失敗：'+e.message);}
  finally{btn.innerHTML='💾 儲存花卡';btn.disabled=false;}
}

(async()=>{
  await loadM();
  await loadF();
  document.getElementById('sfBtn').style.display='none';
})();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>花卉擁有管理</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌸</text></svg>" />
  <script src="config.js"></script>
  <script>
  const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxFNC3q4JJFdxLnlQ2M2OgD8qVTIXrN1tZ6Y6rZQiUs2ku-Es9DkbWrlr-XT_3Rsgfu4Q/exec';
  const SHEET_ID = '1hKW9-wVYfZAjP4YIGJY6ngK8cFWuhDn1OxGvPnHLGDg';
  const API_KEY  = 'AIzaSyALI8OL0bN4yg4PTV3q_hwIsdrkkpcJ0Tg';
  </script>
  <style>
    :root {
      --pink:#e96a1e; --pink-light:#fef0e7; --pink-mid:#f4a46a;
      --pink-dark:#c2510b; --bg:#fff8f5; --border:#f8d5b0;
      --radius:10px; --shadow:0 2px 10px rgba(233,106,30,0.10);
    }
    * { box-sizing:border-box; margin:0; padding:0; }
    body { font-family:'Microsoft JhengHei',sans-serif; background:var(--bg); color:#3d1a2e; padding:0 0 100px; }
    h1 { text-align:center; color:var(--pink-dark); font-size:1.3rem; margin-bottom:4px; padding-top:20px; }
    .subtitle { text-align:center; color:#9e6b7e; font-size:0.85rem; margin-bottom:20px; }
    .page-content { padding:0 16px; }
    .member-select { display:flex; gap:10px; align-items:center; margin-bottom:18px; flex-wrap:wrap; background:#fff; border-radius:var(--radius); padding:14px 16px; border:1px solid var(--border); box-shadow:var(--shadow); }
    .member-select label { font-size:0.9rem; font-weight:600; color:var(--pink-dark); white-space:nowrap; }
    .member-select select, .member-select input { padding:7px 12px; border:1.5px solid var(--pink-mid); border-radius:8px; font-size:0.9rem; background:var(--bg); color:#3d1a2e; outline:none; cursor:pointer; }
    #memberPicker { flex:1; min-width:0; }
    .flower-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(160px,1fr)); gap:10px; }
    .flower-check { background:#fff; border:1.5px solid var(--border); border-radius:10px; padding:10px 12px; display:flex; align-items:center; gap:10px; cursor:pointer; transition:border-color 0.2s, background 0.2s; }
    .flower-check:hover { border-color:var(--pink-mid); background:var(--pink-light); }
    .flower-check.owned { border-color:var(--pink); background:var(--pink-light); }
    .flower-check input[type=checkbox] { display:none; }
    .flower-thumb { width:40px; height:40px; object-fit:cover; border-radius:6px; border:1px solid var(--border); background:#fce4ec; flex-shrink:0; }
    .flower-info { flex:1; min-width:0; }
    .flower-info .fname { font-size:0.82rem; font-weight:600; color:#3d1a2e; line-height:1.3; }
    .badge-q { display:inline-block; padding:1px 7px; border-radius:8px; font-size:0.7rem; font-weight:700; color:#fff; margin-top:2px; }
    .q-仙 { background:linear-gradient(135deg,#ff4e8a,#ff8c42); }
    .q-華 { background:linear-gradient(135deg,#ff8c00,#ffb347); }
    .q-珍 { background:linear-gradient(135deg,#9b59b6,#c39bd3); }
    .q-普 { background:linear-gradient(135deg,#4a90d9,#74b9ff); }
    .q-凡 { background:linear-gradient(135deg,#7f8c6e,#a8b89a); }
    .check-icon { font-size:1.1rem; flex-shrink:0; opacity:0; transition:opacity 0.15s; }
    .flower-check.owned .check-icon { opacity:1; }
    .loading { text-align:center; padding:40px; color:#9e6b7e; grid-column: 1 / -1; }
    .bottom-bar { position:fixed; bottom:0; left:0; right:0; background:#fff; border-top:1px solid var(--border); padding:10px 12px; display:flex; gap:8px; justify-content:center; flex-wrap:wrap; box-shadow:0 -2px 10px rgba(233,106,30,0.08); }
    .btn { padding:9px 18px; border-radius:8px; font-size:0.9rem; font-weight:600; cursor:pointer; border:none; transition:opacity 0.2s; }
    .btn:hover { opacity:0.85; }
    .btn:disabled { opacity:0.5; cursor:not-allowed; }

    /* ── Header ── */
    header { background:linear-gradient(135deg,#c2510b 0%,#e96a1e 60%,#f4a46a 100%); color:#fff; padding:0 20px; display:flex; align-items:center; justify-content:space-between; height:60px; position:sticky; top:0; z-index:100; box-shadow:0 2px 8px rgba(194,81,11,0.3); }
    .guild-name { font-size:1.25rem; font-weight:700; letter-spacing:2px; white-space:nowrap; }
    .guild-name small { font-weight:400; opacity:0.8; font-size:0.7rem; }
    a.guild-name { text-decoration:none; color:inherit; cursor:pointer; }
    nav { display:flex; gap:8px; }
    nav a { color:#fff; text-decoration:none; padding:6px 14px; border-radius:20px; font-size:0.9rem; font-weight:600; transition:background 0.2s; border:1.5px solid rgba(255,255,255,0.5); }
    nav a:hover, nav a.active { background:rgba(255,255,255,0.25); }
    .hamburger { display:none; flex-direction:column; gap:5px; cursor:pointer; padding:6px; background:none; border:none; }
    .hamburger span { display:block; width:22px; height:2px; background:#fff; border-radius:2px; transition:all 0.3s; }
    #nav-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.4); z-index:150; }
    #nav-overlay.show { display:block; }
    #mobile-nav { position:fixed; top:0; right:-260px; width:240px; height:100vh; background:linear-gradient(160deg,#c2510b,#e96a1e); z-index:200; padding:70px 20px 30px; display:flex; flex-direction:column; gap:8px; transition:right 0.3s cubic-bezier(0.4,0,0.2,1); box-shadow:-4px 0 20px rgba(0,0,0,0.2); }
    #mobile-nav.open { right:0; }
    #mobile-nav a { color:#fff; text-decoration:none; padding:12px 16px; border-radius:12px; font-size:1rem; font-weight:600; border:1.5px solid rgba(255,255,255,0.3); transition:background 0.2s; display:flex; align-items:center; gap:10px; }
    #mobile-nav a:hover, #mobile-nav a.active { background:rgba(255,255,255,0.2); }
    #mobile-nav .nav-close { position:absolute; top:16px; right:16px; background:none; border:none; color:#fff; font-size:1.5rem; cursor:pointer; }

    @media(max-width:600px) {
      .guild-name { font-size:1rem; }
      nav { display:none; }
      .hamburger { display:flex; }
      .member-select { gap:8px; }
      #memberPicker { width:100%; flex:1 1 100%; }
      #qualityFilter { flex:1; }
      #flowerSearch { flex:2; min-width:0; width:auto !important; }
    }

    /* ── 進度條 ── */
    #save-progress {
      display:none; position:fixed; bottom:60px; left:0; right:0;
      padding:10px 16px; background:#fff; border-top:1px solid var(--border);
      box-shadow:0 -2px 8px rgba(233,106,30,0.08); z-index:200;
    }
    #save-progress.show { display:block; }
    .progress-label { font-size:0.82rem; color:var(--pink-dark); font-weight:600; margin-bottom:6px; text-align:center; }
    .progress-track { background:#f8d5b0; border-radius:8px; height:10px; overflow:hidden; }
    .progress-fill {
      height:100%; border-radius:8px; width:0%;
      background:linear-gradient(90deg,#c2510b,#e96a1e,#f4a46a);
      transition:width 0.3s ease;
    }
  </style>
</head>
<body>
<header>
  <a href="index.html" class="guild-name" style="text-decoration:none;color:inherit;">璀璨 <small>[400117]</small></a>
  <nav>
    <a href="index.html">花卉圖鑑</a>
    <a href="index.html#id-page">公會成員</a>
    <a href="flower-showcase.html">個人花展</a>
    <a href="member-editor.html" class="active">花卉擁有</a>
    <a href="editor.html">管理</a>
  </nav>
  <button class="hamburger" id="hamburger" onclick="toggleMobileNav()" aria-label="選單">
    <span></span><span></span><span></span>
  </button>
</header>

<div id="nav-overlay" onclick="closeMobileNav()"></div>
<div id="mobile-nav">
  <button class="nav-close" onclick="closeMobileNav()">✕</button>
  <a href="index.html">🌸 花卉圖鑑</a>
  <a href="index.html#id-page">👥 公會成員</a>
  <a href="flower-showcase.html">🖼️ 個人花展</a>
  <a href="member-editor.html" class="active">✅ 花卉擁有</a>
  <a href="#" onclick="closeMobileNav();goEditor();">⚙️ 管理</a>
</div>
<div class="page-content">
<h1>🌸 花卉擁有管理</h1>
<p class="subtitle">選擇自己暱稱後勾選擁有的花卉，按儲存更新</p>

<div class="member-select">
  <label>成員：</label>
  <select id="memberPicker" onchange="loadOwned()"></select>
  <label>品質：</label>
  <select id="qualityFilter" onchange="renderFlowers()">
    <option value="">全部</option>
    <option value="仙">仙</option><option value="華">華</option>
    <option value="珍">珍</option><option value="普">普</option><option value="凡">凡</option>
  </select>
  <input id="flowerSearch" type="text" placeholder="🔍 搜尋花名..." oninput="renderFlowers()" style="width:140px;">
  <span id="ownedCount" style="font-size:0.85rem;color:#9e6b7e;"></span>
</div>
<div id="flowerGrid" class="flower-grid"><div class="loading">載入中...</div></div>

<div id="save-progress">
  <div class="progress-label" id="progress-label">準備儲存...</div>
  <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>
</div>

<div class="bottom-bar">
  <button class="btn" style="background:#34a853;color:#fff;" id="saveBtn" onclick="saveToSheet()">💾 儲存</button>
</div>

<script>
const QUALITY_ORDER = {'仙':0,'華':1,'珍':2,'普':3,'凡':4};
let flowers = [];
let members = [];
let owned = new Set();
let originalOwned = new Set();

async function goEditor() {
  const pw = prompt('請輸入管理密碼：');
  if (!pw) return;
  try {
    const payload = encodeURIComponent(JSON.stringify({ action: 'checkPassword', pw: pw }));
    const res = await fetch(`${APPS_SCRIPT_URL}?data=${payload}`);
    const data = await res.json();
    if (data.ok) { location.href = 'editor.html'; }
    else { alert('密碼錯誤'); }
  } catch(e) { alert('驗證失敗，請稍後再試'); }
}

function toggleMobileNav() {
  document.getElementById('mobile-nav').classList.toggle('open');
  document.getElementById('nav-overlay').classList.toggle('show');
  document.getElementById('hamburger').classList.toggle('open');
}
function closeMobileNav() {
  document.getElementById('mobile-nav').classList.remove('open');
  document.getElementById('nav-overlay').classList.remove('show');
  document.getElementById('hamburger').classList.remove('open');
}

async function init() {
  // 從 Sheet 讀取 flowers
  const fRes = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/flowers!A1:Z?key=${API_KEY}`);
  if (!fRes.ok) throw new Error('flowers 讀取失敗');
  const fData = await fRes.json();
  const fRows = fData.values || [];
  const fHeaders = fRows[0] || [];
  flowers = fRows.slice(1).map(row => {
    const f = {};
    fHeaders.forEach((h, i) => { f[h] = row[i] || ''; });
    f.id = Number(f.id); f.score = Number(f.score); f.order = Number(f.order) || 999;
    f.owners = [];
    return f;
  });

  // 從 Sheet 讀取 members（只顯示在職）
  const mRes = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/members!A1:E?key=${API_KEY}`);
  if (!mRes.ok) throw new Error('members 讀取失敗');
  const mData = await mRes.json();
  members = (mData.values || []).slice(1)
    .filter(r => (r[3] || '').toLowerCase() !== 'true')
    .map(r => ({ gameId: r[0]||'', nickname: r[1]||'', note: r[2]||'成員' }));

  const sel = document.getElementById('memberPicker');
  sel.innerHTML = '<option value="">── 請選擇成員 ──</option>' +
    members.map((m, i) =>
      `<option value="${i}">${m.nickname || m.gameId}</option>`
    ).join('');

  // 不自動載入，等使用者主動選擇
  document.getElementById('flowerGrid').innerHTML =
    '<div class="loading" style="color:#9e6b7e;">👆 請先選擇成員，再勾選花卉</div>';
}

async function loadOwned() {
  const mi = parseInt(document.getElementById('memberPicker').value);
  if (isNaN(mi) || !members[mi]) {
    owned = new Set();
    originalOwned = new Set();
    document.getElementById('flowerGrid').innerHTML =
      '<div class="loading" style="color:#9e6b7e;">👆 請先選擇成員，再勾選花卉</div>';
    document.getElementById('ownedCount').textContent = '';
    return;
  }
  const m = members[mi];

  // 從 Sheet 讀取該成員的 ownership
  try {
    const res = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/ownership!A1:B?key=${API_KEY}`);
    const data = await res.json();
    const rows = (data.values || []).slice(1);
    owned = new Set(rows.filter(r => r[0] === m.gameId).map(r => Number(r[1])));
    originalOwned = new Set(owned);
  } catch(e) {
    owned = new Set();
    originalOwned = new Set();
  }

  renderFlowers();
}

function renderFlowers() {
  const qFilter = document.getElementById('qualityFilter').value;
  const searchQ = document.getElementById('flowerSearch').value.trim().toLowerCase();
  const filtered = flowers.slice()
    .sort((a,b) => { const qd=(QUALITY_ORDER[a.quality]??9)-(QUALITY_ORDER[b.quality]??9); return qd||((a.order??999)-(b.order??999)); })
    .filter(f => (!qFilter||f.quality===qFilter) && (!searchQ||f.name.toLowerCase().includes(searchQ)));

  const displayOwned = filtered.filter(f => owned.has(f.id)).length;
  document.getElementById('ownedCount').textContent = qFilter
    ? `已擁有 ${displayOwned} / ${filtered.length} 種${qFilter}品`
    : `已擁有 ${displayOwned} / ${filtered.length} 種`;

  document.getElementById('flowerGrid').innerHTML = filtered.map(f => {
    const isOwned = owned.has(f.id);
    const thumb = f.img
      ? `<img class="flower-thumb" src="${f.img}" alt="${f.name}" onerror="this.style.opacity=0.3">`
      : `<div class="flower-thumb" style="display:flex;align-items:center;justify-content:center;font-size:1.4rem;">🌸</div>`;
    return `<label class="flower-check ${isOwned?'owned':''}">
      <input type="checkbox" ${isOwned?'checked':''} onchange="toggleOwn(${f.id},this)">
      ${thumb}
      <div class="flower-info"><div class="fname">${f.name}</div><span class="badge-q q-${f.quality}">${f.quality}</span></div>
      <span class="check-icon">✓</span></label>`;
  }).join('');
}

function toggleOwn(fid, cb) {
  const el = cb.closest('.flower-check');
  owned.has(fid) ? (owned.delete(fid), el.classList.remove('owned'))
                 : (owned.add(fid),    el.classList.add('owned'));
  const qFilter = document.getElementById('qualityFilter').value;
  const filtered = flowers.filter(f => !qFilter || f.quality === qFilter);
  const displayOwned = filtered.filter(f => owned.has(f.id)).length;
  document.getElementById('ownedCount').textContent = qFilter
    ? `已擁有 ${displayOwned} / ${filtered.length} 種${qFilter}品`
    : `已擁有 ${displayOwned} / ${filtered.length} 種`;
}

async function saveToSheet() {
  const mi = parseInt(document.getElementById('memberPicker').value);
  if (isNaN(mi) || !members[mi]) { alert('請先選擇成員'); return; }
  const m = members[mi];

  const toAdd    = [...owned].filter(fid => !originalOwned.has(fid));
  const toRemove = [...originalOwned].filter(fid => !owned.has(fid));

  if (toAdd.length === 0 && toRemove.length === 0) { alert('沒有任何變動'); return; }

  const btn = document.getElementById('saveBtn');
  const progress = document.getElementById('save-progress');
  const fill = document.getElementById('progress-fill');
  const label = document.getElementById('progress-label');

  btn.innerHTML = '⏳ 儲存中...'; btn.disabled = true;
  progress.classList.add('show');
  fill.style.transition = 'none';
  fill.style.width = '0%';
  label.textContent = `傳送資料中（新增 ${toAdd.length}、移除 ${toRemove.length} 筆）...`;

  // 用 JS interval 從 0 慢慢推到 85%，等待回應
  let pct = 0;
  const progressInterval = setInterval(() => {
    if (pct < 85) {
      pct += 1;
      fill.style.width = pct + '%';
    }
  }, 80);

  try {
    await new Promise((resolve) => {
      const params = encodeURIComponent(JSON.stringify({ action: 'updateOwnership', gameId: m.gameId, toAdd, toRemove }));
      const img = new Image();
      img.onload = img.onerror = () => resolve();
      img.src = `${APPS_SCRIPT_URL}?data=${params}`;
    });

    clearInterval(progressInterval);

    // 完成：直接跳到 100%（加回 transition 讓它順滑）
    fill.style.transition = 'width 0.3s ease';
    fill.style.width = '100%';
    label.textContent = `✅ 儲存完成！`;

    setTimeout(() => {
      progress.classList.remove('show');
      fill.style.transition = 'none';
      fill.style.width = '0%';
    }, 1200);

    originalOwned = new Set(owned);
  } catch(e) {
    clearInterval(progressInterval);
    fill.style.transition = 'width 0.3s ease';
    fill.style.width = '100%';
    fill.style.background = '#e74c3c';
    label.textContent = '❌ 儲存失敗：' + e.message;
    setTimeout(() => {
      progress.classList.remove('show');
      fill.style.transition = 'none';
      fill.style.background = '';
      fill.style.width = '0%';
    }, 2500);
    alert('❌ 儲存失敗：' + e.message);
  } finally {
    btn.innerHTML = '💾 儲存'; btn.disabled = false;
  }
}

document.getElementById('memberPicker').addEventListener('change', loadOwned);
init().catch(e => {
  document.getElementById('flowerGrid').innerHTML = `<div style="text-align:center;padding:40px;color:#c2510b;">⚠️ 資料載入失敗：${e.message}</div>`;
});
</script>
</div>
</body>
</html>

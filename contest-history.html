<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>競賽戰績 - 璀璨</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌸</text></svg>" />
  <script src="config.js"></script>
  <style>
    :root {
      --orange:#e96a1e; --orange-light:#fef0e7; --orange-mid:#f4a46a;
      --orange-dark:#c2510b; --bg:#fff8f5; --card-bg:#fff;
      --text:#3d1a2e; --text-muted:#9e6b7e; --border:#f8d5b0;
      --shadow:0 2px 12px rgba(233,106,30,.10); --radius:14px;
    }
    * { box-sizing:border-box; margin:0; padding:0; }
    body { font-family:'Segoe UI','Microsoft JhengHei',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; padding-bottom:40px; }
    main { max-width:800px; margin:0 auto; padding:24px 16px; }
    h1 { text-align:center; color:var(--orange-dark); font-size:1.3rem; margin-bottom:4px; }
    .subtitle { text-align:center; color:var(--text-muted); font-size:0.85rem; margin-bottom:24px; }

    /* 期數選擇 */
    .period-select { display:flex; align-items:center; gap:10px; margin-bottom:20px; justify-content:center; }
    .period-select label { font-size:0.9rem; font-weight:600; color:var(--orange-dark); }
    .period-select select { padding:8px 14px; border:1.5px solid var(--orange-mid); border-radius:10px; font-size:0.9rem; background:#fff; color:var(--text); outline:none; cursor:pointer; }
    .period-select select:focus { border-color:var(--orange); }

    /* 統計卡片 */
    .stats-row { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; margin-bottom:24px; }
    .stat-card { background:var(--card-bg); border-radius:var(--radius); border:1px solid var(--border); box-shadow:var(--shadow); padding:16px; text-align:center; }
    .stat-value { font-size:1.5rem; font-weight:900; color:var(--orange); }
    .stat-label { font-size:0.78rem; color:var(--text-muted); margin-top:4px; }

    /* 稱號分布 */
    .title-dist { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:24px; justify-content:center; }
    .title-chip { padding:5px 14px; border-radius:20px; font-size:0.82rem; font-weight:700; }
    .tc-王者花匠 { background:linear-gradient(135deg,#e96a1e,#ff4e8a); color:#fff; }
    .tc-大師花匠 { background:linear-gradient(135deg,#9b59b6,#c39bd3); color:#fff; }
    .tc-黃金花匠 { background:linear-gradient(135deg,#f4c430,#ffd700); color:#5a4000; }
    .tc-白銀花匠 { background:linear-gradient(135deg,#9e9e9e,#d4d4d4); color:#fff; }
    .tc-青銅花匠 { background:linear-gradient(135deg,#cd7f32,#e8a96a); color:#fff; }
    .tc-無稱號 { background:#f0f0f0; color:#888; }

    /* 成員排名 */
    .rank-card { background:var(--card-bg); border-radius:var(--radius); border:1px solid var(--border); box-shadow:var(--shadow); overflow:hidden; }
    .rank-header { background:linear-gradient(135deg,#c2510b,#e96a1e); color:#fff; padding:14px 18px; font-size:0.95rem; font-weight:700; }
    .rank-list { padding:0; }
    .rank-item { display:flex; align-items:center; gap:12px; padding:12px 18px; border-bottom:1px solid var(--border); transition:background 0.15s; }
    .rank-item:last-child { border-bottom:none; }
    .rank-item:hover { background:var(--orange-light); }
    .rank-num { width:28px; height:28px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:0.8rem; font-weight:700; flex-shrink:0; }
    .rank-1 { background:linear-gradient(135deg,#f4c430,#ffd700); color:#5a4000; }
    .rank-2 { background:linear-gradient(135deg,#9e9e9e,#d4d4d4); color:#fff; }
    .rank-3 { background:linear-gradient(135deg,#cd7f32,#e8a96a); color:#fff; }
    .rank-default { background:var(--orange-light); color:var(--orange-dark); }
    .rank-info { flex:1; min-width:0; }
    .rank-name { font-size:0.92rem; font-weight:700; color:var(--text); }
    .rank-role { font-size:0.72rem; display:inline-block; padding:1px 8px; border-radius:8px; margin-left:6px; }
    .role-會長   { background:linear-gradient(135deg,#ff4e8a,#ff8c42); color:#fff; }
    .role-副會長 { background:linear-gradient(135deg,#ff8c00,#ffb347); color:#fff; }
    .role-理事   { background:linear-gradient(135deg,#9b59b6,#c39bd3); color:#fff; }
    .role-菁英   { background:linear-gradient(135deg,#4a90d9,#74b9ff); color:#fff; }
    .role-成員   { background:#e8f5e9; color:#2e7d32; }
    .rank-score { font-size:1rem; font-weight:800; color:var(--orange); flex-shrink:0; }
    .rank-title-badge { font-size:0.7rem; color:var(--text-muted); margin-top:2px; }

    /* 稱號分隔 */
    .rank-title-divider { padding:8px 18px; background:var(--orange-light); font-size:0.82rem; font-weight:700; color:var(--orange-dark); border-bottom:1px solid var(--border); scroll-margin-top:80px; }

    .loading { text-align:center; padding:40px; color:var(--text-muted); }
    .empty-state { text-align:center; padding:40px; color:var(--text-muted); font-size:0.9rem; }

    /* 總結卡片 */
    .summary-scroll {
      background: linear-gradient(160deg, #fff8f5, #fef0e7);
      border-radius: 20px; border: 2px solid var(--border);
      box-shadow: 0 8px 32px rgba(233,106,30,0.12);
      padding: 28px 24px; margin-bottom: 24px; text-align: center;
      position: relative; overflow: hidden;
    }
    .summary-scroll::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 5px;
      background: linear-gradient(90deg, #c2510b, #e96a1e, #f4a46a, #e96a1e, #c2510b);
      border-radius: 20px 20px 0 0;
    }
    .scroll-title { font-size: 1.3rem; font-weight: 900; color: var(--orange-dark); margin-bottom: 18px; }
    .scroll-body { display: flex; flex-direction: column; gap: 10px; }
    .scroll-line { font-size: 0.95rem; color: var(--text); line-height: 1.6; }
    .scroll-highlight { font-size: 1.15rem; font-weight: 900; color: var(--orange); }
    .scroll-grade {
      margin-top: 14px; display: inline-block;
      background: linear-gradient(135deg, #c2510b, #e96a1e);
      color: #fff; font-weight: 900; font-size: 1rem;
      padding: 8px 24px; border-radius: 24px;
      box-shadow: 0 3px 12px rgba(233,106,30,0.35);
    }

    @media(max-width:600px) {
      .stats-row { grid-template-columns:1fr 1fr 1fr; gap:8px; }
      .stat-value { font-size:1.2rem; }
      .rank-item { padding:10px 14px; gap:10px; }
    }
  </style>
</head>
<body>
<div id="site-header"></div>
<main>
  <h1>🏆 競賽戰績</h1>
  <p class="subtitle">查看每期公會競賽成績</p>
  <div style="text-align:center;margin-bottom:16px;"><a href="contest-dashboard.html" style="display:inline-block;padding:8px 20px;border-radius:20px;font-size:0.85rem;font-weight:700;background:var(--orange);color:#fff;text-decoration:none;box-shadow:0 3px 12px rgba(233,106,30,.3);">← 返回儀表板</a></div>

  <!-- 期數選擇 -->
  <div class="period-select">
    <label>期數：</label>
    <select id="periodPicker" onchange="loadPeriod()">
      <option value="">載入中...</option>
    </select>
  </div>

  <!-- 總結卡片 -->
  <div id="summaryCard" style="display:none;">
    <div class="summary-scroll">
      <div class="scroll-title">🏆 競賽結果</div>
      <div class="scroll-body">
        <div class="scroll-line">在 <span class="scroll-highlight" id="hMembers">-</span> 名公會成員的共同努力下</div>
        <div class="scroll-line">總獲得 <span class="scroll-highlight" id="hTotal">-</span> 積分</div>
        <div class="scroll-line">位列 <span class="scroll-highlight" id="hRank">-</span></div>
        <div class="scroll-grade" id="hGrade">-</div>
      </div>
    </div>
  </div>

  <!-- 統計卡片 -->
  <div class="stats-row" id="statsRow" style="display:none;">
    <div class="stat-card">
      <div class="stat-value" id="statTotal">-</div>
      <div class="stat-label">公會總分</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="statCount">-</div>
      <div class="stat-label">參賽人數</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="statAvg">-</div>
      <div class="stat-label">平均分數</div>
    </div>
  </div>

  <!-- 稱號分布 -->
  <div class="title-dist" id="titleDist" style="display:none;"></div>

  <!-- 排名列表 -->
  <div class="rank-card" id="rankCard" style="display:none;">
    <div class="rank-header">📋 成員排名</div>
    <div class="rank-list" id="rankList"></div>
  </div>

  <div class="loading" id="loadingState">載入中...</div>
  <div class="empty-state" id="emptyState" style="display:none;">尚無競賽資料</div>
</main>

<script>
let allData = []; // 所有期數資料
let periods = []; // 可選期數清單
let summaryData = []; // 公會總結

async function init() {
  try {
    // 讀取成員成績
    const res = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/contest!A1:G?key=${API_KEY}`);
    if (!res.ok) throw new Error('讀取失敗');
    const data = await res.json();
    const rows = (data.values || []);
    if (rows.length <= 1) { showEmpty(); return; }

    allData = rows.slice(1).map(r => ({
      period: r[0] || '',
      server: r[1] || '',
      nickname: r[2] || '',
      role: r[3] || '',
      score: Number(r[4]) || 0,
      title: r[5] || ''
    }));

    // 讀取公會總結
    try {
      const sRes = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/contest_summary!A1:F?key=${API_KEY}`);
      if (sRes.ok) {
        const sData = await sRes.json();
        const sRows = (sData.values || []).slice(1);
        summaryData = sRows.map(r => ({
          period: r[0] || '', members: r[1] || '', total: r[2] || '',
          rank: r[3] || '', grade: r[4] || ''
        }));
      }
    } catch(e) {}

    // 取得所有期數（去重，按日期排序新→舊）
    periods = [...new Set(allData.map(d => d.period))].sort().reverse();

    const sel = document.getElementById('periodPicker');
    sel.innerHTML = periods.map(p => `<option value="${p}">${p}</option>`).join('');

    document.getElementById('loadingState').style.display = 'none';

    // 支援 URL 帶期數參數：?period=2026-06-15
    const urlParams = new URLSearchParams(location.search);
    const urlPeriod = urlParams.get('period');
    if (urlPeriod && periods.includes(urlPeriod)) {
      document.getElementById('periodPicker').value = urlPeriod;
    }

    loadPeriod();
  } catch(e) {
    document.getElementById('loadingState').textContent = '⚠️ ' + e.message;
  }
}

function loadPeriod() {
  const period = document.getElementById('periodPicker').value;
  if (!period) return;

  const data = allData.filter(d => d.period === period).sort((a, b) => b.score - a.score);

  if (!data.length) { showEmpty(); return; }

  // 顯示公會總結
  const summary = summaryData.find(s => s.period === period);
  const summaryCard = document.getElementById('summaryCard');
  if (summary) {
    summaryCard.style.display = '';
    document.getElementById('hMembers').textContent = summary.members;
    document.getElementById('hTotal').textContent = Number(summary.total).toLocaleString();
    document.getElementById('hRank').textContent = summary.rank;
    document.getElementById('hGrade').textContent = summary.grade;
  } else {
    summaryCard.style.display = 'none';
  }

  // 統計
  const total = data.reduce((s, d) => s + d.score, 0);
  const count = data.length;
  const avg = Math.round(total / count);

  document.getElementById('statTotal').textContent = total.toLocaleString();
  document.getElementById('statCount').textContent = count + ' 人';
  document.getElementById('statAvg').textContent = avg;
  document.getElementById('statsRow').style.display = '';

  // 稱號分布
  const TITLES = ['王者花匠', '大師花匠', '黃金花匠', '白銀花匠', '青銅花匠', '無稱號'];
  const titleCounts = {};
  TITLES.forEach(t => titleCounts[t] = 0);
  data.forEach(d => { if (titleCounts[d.title] !== undefined) titleCounts[d.title]++; });

  document.getElementById('titleDist').style.display = '';
  document.getElementById('titleDist').innerHTML = TITLES
    .filter(t => titleCounts[t] > 0)
    .map(t => `<span class="title-chip tc-${t}" onclick="scrollToTitle('${t}')" style="cursor:pointer;">${t} ${titleCounts[t]} 人</span>`)
    .join('');

  // 排名列表
  document.getElementById('rankCard').style.display = '';
  let lastTitle = '';
  document.getElementById('rankList').innerHTML = data.map((d, i) => {
    let divider = '';
    if (d.title && d.title !== lastTitle) {
      lastTitle = d.title;
      divider = `<div class="rank-title-divider" id="title-${d.title}">🏅 ${d.title}</div>`;
    }
    const rankClass = i === 0 ? 'rank-1' : i === 1 ? 'rank-2' : i === 2 ? 'rank-3' : 'rank-default';
    const roleClass = d.role ? `role-${d.role}` : '';
    return divider + `<div class="rank-item">
      <div class="rank-num ${rankClass}">${i + 1}</div>
      <div class="rank-info">
        <div class="rank-name">${d.nickname}<span class="rank-role ${roleClass}">${d.role}</span></div>
        <div class="rank-title-badge">${d.server}</div>
      </div>
      <div class="rank-score">${d.score}</div>
    </div>`;
  }).join('');

  document.getElementById('emptyState').style.display = 'none';
}

function scrollToTitle(title) {
  const el = document.getElementById('title-' + title);
  if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function showEmpty() {
  document.getElementById('loadingState').style.display = 'none';
  document.getElementById('statsRow').style.display = 'none';
  document.getElementById('titleDist').style.display = 'none';
  document.getElementById('rankCard').style.display = 'none';
  document.getElementById('emptyState').style.display = '';
}

init();
</script>
<script src="header.js"></script>
</body>
</html>

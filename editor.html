<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>管理編輯器</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌸</text></svg>" />
  <script>
  const APPS_SCRIPT_URL='https://script.google.com/macros/s/AKfycbxFNC3q4JJFdxLnlQ2M2OgD8qVTIXrN1tZ6Y6rZQiUs2ku-Es9DkbWrlr-XT_3Rsgfu4Q/exec';
  const SHEET_ID='1hKW9-wVYfZAjP4YIGJY6ngK8cFWuhDn1OxGvPnHLGDg';
  const API_KEY='AIzaSyALI8OL0bN4yg4PTV3q_hwIsdrkkpcJ0Tg';
  const GITHUB_CONFIG = {
    owner: 'yoyochen088',
    repo:   'Garden400117',
    branch: 'main'
  };
  </script>
  <style>
    :root{--pink:#e96a1e;--pink-light:#fef0e7;--pink-mid:#f4a46a;--pink-dark:#c2510b;--bg:#fff8f5;--border:#f8d5b0;--radius:10px;--shadow:0 2px 10px rgba(233,106,30,.1);}
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Microsoft JhengHei',sans-serif;background:var(--bg);color:#3d1a2e;padding:0 0 100px;}
    /* ── Header ── */
    /* 由 header.js 統一注入 */
    h1{text-align:center;color:var(--pink-dark);font-size:1.3rem;margin-bottom:4px;padding-top:20px;}
    .subtitle{text-align:center;color:#9e6b7e;font-size:.85rem;margin-bottom:16px;}
    .page-content{padding:0 16px;}
    .tabs{display:flex;gap:8px;margin-bottom:16px;}
    .tab{padding:8px 22px;border-radius:20px;font-size:.92rem;font-weight:600;cursor:pointer;border:1.5px solid var(--pink-mid);background:var(--pink-light);color:var(--pink-dark);transition:all .2s;display:flex;align-items:center;gap:6px;}
    .tab.active{background:var(--pink);color:#fff;border-color:var(--pink);}
    .panel{display:none;}.panel.active{display:block;}
    .card{background:#fff;border-radius:var(--radius);border:1px solid var(--border);box-shadow:var(--shadow);padding:14px 16px;margin-bottom:10px;}
    .mrow{display:grid;grid-template-columns:140px 55px 1fr auto auto;gap:10px;align-items:center;}
    .lbl{font-size:.75rem;color:#9e6b7e;margin-bottom:3px;}
    input[type=text],input[type=number],select{padding:7px 10px;border:1.5px solid var(--pink-mid);border-radius:7px;font-size:.9rem;background:var(--bg);color:#3d1a2e;outline:none;width:100%;}
    input:focus,select:focus{border-color:var(--pink);}
    .btn-rm{background:#fff3e0;color:#e65100;border:1.5px solid #ffcc80;border-radius:7px;padding:7px 12px;cursor:pointer;font-size:.85rem;font-weight:600;white-space:nowrap;}
    .btn-rm:hover{background:#ffe0b2;}
    .btn-add{display:flex;align-items:center;gap:6px;padding:9px 18px;background:var(--pink-light);color:var(--pink-dark);border:1.5px dashed var(--pink-mid);border-radius:var(--radius);font-size:.92rem;font-weight:600;cursor:pointer;width:100%;justify-content:center;transition:background .2s;margin-top:4px;}
    .btn-add:hover{background:var(--pink-mid);color:#fff;}
    .fbar{display:flex;align-items:center;gap:10px;margin-bottom:14px;flex-wrap:wrap;}
    .twrap{overflow-x:auto;background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);border:1px solid var(--border);}
    table{width:100%;border-collapse:collapse;min-width:700px;}
    thead tr{background:linear-gradient(135deg,#c2510b,#e96a1e);color:#fff;}
    th{padding:11px 12px;font-size:.88rem;white-space:nowrap;text-align:left;}
    td{padding:7px 8px;border-bottom:1px solid var(--border);vertical-align:middle;}
    tbody tr:last-child td{border-bottom:none;}
    tbody tr:hover{background:var(--pink-light);}
    .thumb{width:52px;height:52px;object-fit:cover;border-radius:8px;border:1px solid var(--border);background:#fef0e7;display:block;}
    .fname{font-weight:600;font-size:.9rem;color:var(--pink-dark);}
    .fname-input{font-weight:600;font-size:.9rem;color:var(--pink-dark);border:1.5px solid transparent;background:transparent;padding:4px 6px;border-radius:6px;transition:border-color .2s,background .2s;}
    .fname-input:hover{border-color:var(--pink-mid);background:var(--bg);}
    .fname-input:focus{border-color:var(--pink);background:var(--bg);outline:none;}
    .cs{position:relative;width:90px;user-select:none;}
    .cst{display:flex;align-items:center;justify-content:space-between;padding:6px 10px;border-radius:7px;cursor:pointer;font-size:.9rem;font-weight:700;color:#fff;border:none;width:100%;}
    .cst::after{content:'\25be';font-size:.75rem;margin-left:4px;}
    .csd{display:none;position:absolute;top:calc(100% + 4px);left:0;background:#fff;border:1.5px solid var(--border);border-radius:8px;overflow:hidden;box-shadow:0 4px 16px rgba(0,0,0,.15);z-index:50;min-width:100%;}
    .csd.open{display:block;}
    .cso{display:flex;align-items:center;gap:8px;padding:7px 12px;cursor:pointer;font-size:.88rem;font-weight:600;transition:filter .15s;}
    .cso:hover{filter:brightness(.92);}
    .q-仙{background:linear-gradient(135deg,#ff4e8a,#ff8c42);}
    .q-華{background:linear-gradient(135deg,#ff8c00,#ffb347);}
    .q-珍{background:linear-gradient(135deg,#9b59b6,#c39bd3);}
    .q-普{background:linear-gradient(135deg,#4a90d9,#74b9ff);}
    .q-凡{background:linear-gradient(135deg,#7f8c6e,#a8b89a);}
    .cso.q-仙{background:linear-gradient(135deg,#ff4e8a,#ff8c42);color:#fff;}
    .cso.q-華{background:linear-gradient(135deg,#ff8c00,#ffb347);color:#fff;}
    .cso.q-珍{background:linear-gradient(135deg,#9b59b6,#c39bd3);color:#fff;}
    .cso.q-普{background:linear-gradient(135deg,#4a90d9,#74b9ff);color:#fff;}
    .cso.q-凡{background:linear-gradient(135deg,#7f8c6e,#a8b89a);color:#fff;}
    .loading{text-align:center;padding:40px;color:#9e6b7e;}
    .bbar{position:fixed;bottom:0;left:0;right:0;background:#fff;border-top:1px solid var(--border);padding:10px 12px;display:flex;gap:8px;justify-content:center;flex-wrap:wrap;box-shadow:0 -2px 10px rgba(233,106,30,.08);z-index:90;}
    .btn{padding:9px 18px;border-radius:8px;font-size:.9rem;font-weight:600;cursor:pointer;border:none;transition:opacity .2s;}
    .btn:hover{opacity:.85;}.btn:disabled{opacity:.5;cursor:not-allowed;}
    .btn-sec{background:var(--pink-light);color:var(--pink-dark);border:1.5px solid var(--pink-mid);}
    @media(max-width:600px){
      .guild-name{font-size:1rem;}
      nav{display:none !important;}
      .hamburger{display:flex !important;}
      .mrow {
        grid-template-columns: 1fr 90px 42px !important;
        gap: 6px 8px !important;
        align-items: end !important;
      }
      .mrow .m-id { grid-column:1; grid-row:1; }
      .mrow .m-role { grid-column:2; grid-row:1; }
      .mrow .m-rm { grid-column:3; grid-row:1; align-self:end; }
      .mrow .m-sv { grid-column:1; grid-row:2; width:70px; }
      .mrow .m-nick { grid-column:2 / 4; grid-row:2; }
      .mrow .m-rm .btn-rm { padding:7px 8px; font-size:.78rem; }
      .tabs { gap:6px; }
      .tab { padding:8px 14px; font-size:.82rem; text-align:center; }
    }

    /* nav-dropdown 由 header.js 統一注入 */

    /* ── 競賽紀錄相關樣式 ── */
    .card-title { font-size:0.9rem; font-weight:700; color:var(--pink-dark); margin-bottom:14px; display:flex; align-items:center; gap:8px; }
    .drop-zone {
      border:2.5px dashed var(--pink-mid); border-radius:var(--radius);
      background:var(--pink-light); padding:40px 20px;
      text-align:center; cursor:pointer; transition:all .2s; margin-bottom:16px;
    }
    .drop-zone.drag-over { border-color:var(--pink); background:#fde8d4; }
    .drop-zone .dz-icon { font-size:2.4rem; margin-bottom:10px; }
    .drop-zone .dz-text { font-size:0.95rem; font-weight:700; color:var(--pink-dark); margin-bottom:4px; }
    .drop-zone .dz-sub { font-size:0.8rem; color:#9e6b7e; }
    .progress-wrap { margin:12px 0; display:none; }
    .progress-bar { background:#f0e0d0; border-radius:8px; height:10px; overflow:hidden; }
    .progress-fill { height:100%; background:linear-gradient(90deg,#c2510b,#e96a1e); border-radius:8px; transition:width .3s; width:0%; }
    .progress-text { font-size:0.82rem; color:#9e6b7e; text-align:center; margin-top:6px; }
    .result-table { width:100%; border-collapse:collapse; font-size:0.9rem; }
    .result-table thead tr { background:linear-gradient(135deg,#c2510b,#e96a1e); color:#fff; }
    .result-table th { padding:10px 12px; text-align:left; font-weight:600; }
    .result-table td { padding:8px 12px; border-bottom:1px solid var(--border); }
    .result-table tbody tr:hover { background:var(--pink-light); }
    .result-table input { padding:5px 8px; border:1.5px solid var(--pink-mid); border-radius:6px; font-size:0.88rem; background:var(--bg); color:#3d1a2e; outline:none; width:100%; }
    .result-table input:focus { border-color:var(--pink); }
    .title-divider { background:var(--pink-light); font-weight:700; color:var(--pink-dark); font-size:0.85rem; }
    .title-divider td { padding:8px 12px !important; }
    .btn-row { display:flex; gap:10px; flex-wrap:wrap; margin-top:14px; }
    .period-input { display:flex; gap:10px; align-items:center; margin-bottom:14px; }
    .period-input label { font-size:0.85rem; font-weight:600; color:var(--pink-dark); white-space:nowrap; }
    .period-input input { padding:8px 12px; border:1.5px solid var(--pink-mid); border-radius:8px; font-size:0.9rem; background:var(--bg); color:#3d1a2e; outline:none; width:140px; }
    .btn-primary { background:linear-gradient(135deg,#c2510b,#e96a1e); color:#fff; box-shadow:0 3px 12px rgba(233,106,30,.3); }
    .btn-primary:hover { transform:translateY(-1px); box-shadow:0 5px 16px rgba(233,106,30,.4); }
    .btn-primary:disabled { opacity:.5; cursor:not-allowed; transform:none; }
    .empty-state { text-align:center; padding:40px; color:#9e6b7e; font-size:0.9rem; }
    #summaryResult input { padding:7px 10px; border:1.5px solid var(--pink-mid); border-radius:7px; font-size:0.88rem; background:var(--bg); color:#3d1a2e; outline:none; }
    #summaryResult input:focus { border-color:var(--pink); }
  </style>
</head>
<body>
<div id="site-header"></div>
<div class="page-content">
<h1>⚙️ 管理編輯器</h1>
<p class="subtitle">成員管理 / 花卉資料編輯</p>
<div class="tabs">
  <button class="tab active" onclick="switchTab('tm',this)">&#128101;<br>成員管理</button>
  <button class="tab" onclick="switchTab('tf',this)">&#127800;<br>花卉資料</button>
  <button class="tab" onclick="switchTab('tc',this)">&#127873;<br>兌換碼</button>
  <button class="tab" onclick="switchTab('tr',this)">&#128248;<br>競賽紀錄</button>
</div>
<div id="tm" class="panel active">
  <div id="mlist"><div class="loading">載入中...</div></div>
  <button class="btn-add" onclick="addM()">＋ 新增成員</button>
</div>
<div id="tf" class="panel">
  <!-- 新增花卉區 -->
  <div id="add-flower-area" style="background:#fff;border-radius:var(--radius);border:1.5px dashed var(--pink-mid);padding:14px 16px;margin-bottom:14px;display:none;">
    <div style="font-size:.9rem;font-weight:700;color:var(--pink-dark);margin-bottom:10px;">&#10133; 新增花卉</div>
    <div style="display:flex;gap:10px;align-items:center;flex-wrap:wrap;">
      <div>
        <div class="lbl">品質（決定資料夾）</div>
        <select id="af-quality" style="padding:7px 10px;border:1.5px solid var(--pink-mid);border-radius:7px;font-size:.88rem;background:var(--bg);color:#3d1a2e;outline:none;">
          <option value="仙">仙</option><option value="華">華</option>
          <option value="珍">珍</option><option value="普">普</option><option value="凡">凡</option>
        </select>
      </div>
      <div>
        <div class="lbl">選擇圖片</div>
        <input type="file" id="af-img" accept="image/*" onchange="onFlowerImgSelect(this)"
          style="padding:5px;border:1.5px solid var(--pink-mid);border-radius:7px;font-size:.85rem;background:var(--bg);" />
      </div>
      <img id="af-preview" style="display:none;width:52px;height:52px;object-fit:cover;border-radius:8px;border:2px solid var(--pink-mid);" />
      <div style="flex:1;min-width:200px;">
        <div class="lbl">token（上傳圖片用）</div>
        <input type="password" id="af-token" placeholder="token"
          style="padding:7px 10px;border:1.5px solid var(--pink-mid);border-radius:7px;font-size:.88rem;background:var(--bg);color:#3d1a2e;outline:none;width:100%;" />
      </div>
      <button class="btn" style="background:#9b59b6;color:#fff;align-self:flex-end;" onclick="uploadAndAddFlower()">&#128190; 上傳並新增</button>
    </div>
    <div id="af-status" style="display:none;margin-top:8px;padding:8px 12px;border-radius:8px;font-size:.85rem;"></div>
  </div>
  <button class="btn-add" onclick="toggleAddFlower()" style="margin-bottom:14px;">&#10133; 新增花卉</button>
  <div class="fbar">
    <label style="font-size:.9rem;font-weight:600;color:var(--pink-dark);">品質：</label>
    <select id="qf" onchange="renderT()" style="width:auto;">
      <option value="">全部</option><option>仙</option><option>華</option><option>珍</option><option>普</option><option>凡</option>
    </select>
    <label style="font-size:.9rem;font-weight:600;color:var(--pink-dark);">取得方式：</label>
    <select id="of" onchange="renderT()" style="width:auto;">
      <option value="">全部</option><option>等級</option><option>活動</option><option>花圃</option><option>花坊</option>
      <option>VIP</option><option>週花</option><option>星河映蕊</option><option>花靈商店</option>
      <option>精靈花</option><option>卡冊</option><option>心聯盟</option><option>累積儲值</option>
    </select>
    <span id="fc" style="font-size:.85rem;color:#9e6b7e;"></span>
  </div>
  <div class="twrap">
    <table><thead><tr><th>縮圖</th><th>花名</th><th>顯示順序</th><th>品質</th><th>競賽分</th><th>取得方式</th></tr></thead>
    <tbody id="tb"></tbody></table>
  </div>
</div>
<div id="tc" class="panel">
  <div id="clist"><div class="loading">載入中...</div></div>
  <button class="btn-add" onclick="addCoupon()">＋ 新增兌換碼</button>
</div>
<div id="tr" class="panel">
  <!-- 設定 -->
  <div class="card">
    <div class="card-title">📅 期數設定</div>
    <div class="period-input">
      <label>競賽期數：</label>
      <input type="date" id="periodInput" />
    </div>
  </div>

  <!-- 總結截圖 -->
  <div class="card">
    <div class="card-title">📊 公會總結</div>
    <div style="display:flex;gap:10px;align-items:flex-end;flex-wrap:wrap;">
      <div class="drop-zone" id="summaryDropZone" onclick="document.getElementById('summary-file').click()" style="flex:1;min-width:200px;padding:20px 16px;margin-bottom:0;">
        <div class="dz-icon" style="font-size:1.6rem;">📊</div>
        <div class="dz-text" style="font-size:0.85rem;">上傳總結截圖</div>
      </div>
      <input type="file" id="summary-file" accept="image/*" style="display:none;" onchange="handleSummaryFile(this.files[0])" />
      <div id="summaryResult" style="flex:2;min-width:200px;">
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;">
          <div><label class="lbl">成員數</label><input type="number" id="sumMembers" placeholder="" style="width:100%;" /></div>
          <div><label class="lbl">總分</label><input type="number" id="sumTotal" placeholder="" style="width:100%;" /></div>
          <div><label class="lbl">名次</label><input type="text" id="sumRank" placeholder="" style="width:100%;" /></div>
          <div><label class="lbl">評級</label><input type="text" id="sumGrade" placeholder="" style="width:100%;" /></div>
        </div>
      </div>
    </div>
    <div id="summaryStatus" style="display:none;margin-top:8px;font-size:0.82rem;"></div>
  </div>

  <!-- 對手排名截圖 -->
  <div class="card">
    <div class="card-title">⚔️ 對手排名</div>
    <div style="display:flex;gap:10px;align-items:flex-start;flex-wrap:wrap;">
      <div class="drop-zone" id="opponentDropZone" onclick="document.getElementById('opponent-file').click()" style="flex:1;min-width:200px;padding:20px 16px;margin-bottom:0;">
        <div class="dz-icon" style="font-size:1.6rem;">⚔️</div>
        <div class="dz-text" style="font-size:0.85rem;">上傳對手排名截圖（可多張）</div>
        <div class="dz-sub">排名畫面，辨識公會名稱與分數，多張會合併</div>
      </div>
      <input type="file" id="opponent-file" accept="image/*" multiple style="display:none;" onchange="handleOpponentFiles(this.files)" />
      <div id="opponentResult" style="flex:2;min-width:260px;">
        <table class="result-table" id="opponentTable" style="display:none;">
          <thead><tr><th>#</th><th>公會名稱</th><th>分數</th><th></th></tr></thead>
          <tbody id="opponentBody"></tbody>
        </table>
        <div class="btn-row" id="opponentBtnRow" style="display:none;">
          <button class="btn btn-primary" style="padding:8px 16px;font-size:.85rem;" onclick="addOpponentRow()">＋ 手動新增</button>
          <button class="btn" style="background:linear-gradient(135deg,#c2510b,#e96a1e);color:#fff;padding:8px 16px;font-size:.85rem;" onclick="saveOpponents()">💾 儲存對手排名</button>
        </div>
      </div>
    </div>
    <div id="opponentStatus" style="display:none;margin-top:8px;font-size:0.82rem;"></div>
  </div>

  <!-- 上傳 -->
  <div class="card">
    <div class="card-title">📷 上傳成員截圖</div>
    <div class="drop-zone" id="dropZone" onclick="document.getElementById('file-input').click()">
      <div class="dz-icon">📂</div>
      <div class="dz-text">點擊或拖曳截圖到這裡</div>
      <div class="dz-sub">支援 JPG、PNG，可多張（多頁截圖）</div>
    </div>
    <input type="file" id="file-input" accept="image/*" multiple style="display:none;" onchange="handleFiles(this.files)" />
    <div id="previewList" style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;"></div>

    <div class="progress-wrap" id="progressWrap">
      <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
      <div class="progress-text" id="progressText">準備辨識中...</div>
    </div>

    <div class="btn-row">
      <button class="btn" style="background:linear-gradient(135deg,#c2510b,#e96a1e);color:#fff;" id="ocrBtn" onclick="startOCR()" disabled>🔍 開始辨識</button>
      <button class="btn btn-sec" onclick="clearAll()">🗑️ 清除</button>
    </div>
  </div>

  <!-- 結果 -->
  <div class="card" id="resultCard" style="display:none;">
    <div class="card-title">📋 辨識結果（可修正）</div>

    <!-- 缺少成員提示 -->
    <div id="missingAlert" style="display:none;background:#fff3e0;border:1px solid #ffcc80;border-radius:10px;padding:12px 16px;margin-bottom:14px;font-size:0.85rem;color:#e65100;">
      <strong>⚠️ 以下成員未辨識到：</strong>
      <div id="missingList" style="margin-top:6px;display:flex;flex-wrap:wrap;gap:6px;"></div>
    </div>

    <div style="overflow-x:auto;">
      <table class="result-table">
        <thead><tr><th>#</th><th>伺服器</th><th>暱稱</th><th>職稱</th><th>分數</th><th>稱號</th><th></th></tr></thead>
        <tbody id="resultBody"></tbody>
      </table>
    </div>
    <div class="btn-row">
      <button class="btn btn-sec" onclick="addManualRow()">＋ 手動新增</button>
      <button class="btn" style="background:linear-gradient(135deg,#c2510b,#e96a1e);color:#fff;" id="saveBtn" onclick="saveToSheet()">💾 儲存到 Sheet</button>
    </div>
    <div class="progress-wrap" id="saveProgressWrap" style="display:none;">
      <div class="progress-bar"><div class="progress-fill" id="saveProgressFill"></div></div>
      <div class="progress-text" id="saveProgressText"></div>
    </div>
  </div>
</div>
<div class="bbar">
  <button class="btn" style="background:#4a90d9;color:#fff;" id="smBtn" onclick="saveM()">&#128190; 儲存成員</button>
  <button class="btn" style="background:#34a853;color:#fff;display:none;" id="sfBtn" onclick="saveFlowers()">&#128190; 儲存花卉</button>
  <button class="btn" style="background:#e96a1e;color:#fff;display:none;" id="scBtn" onclick="saveCoupons()">&#128190; 儲存兌換碼</button>
</div>
<script src="contest-record.js"></script>
<script>

const QL=['仙','華','珍','普','凡'],SL=[14,21,23,25,28,30];
const OL=['等級','活動','花圃','花坊','VIP','週花','星河映蕊','花靈商店','精靈花','卡冊','心聯盟','累積儲値'];
const QO={'仙':0,'華':1,'珍':2,'普':3,'凡':4};
let members=[],origM=[],fd=[],origFd=[];

function switchTab(id,btn){
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById(id).classList.add('active');btn.classList.add('active');
  document.getElementById('smBtn').style.display=id==='tm'?'inline-flex':'none';
  document.getElementById('sfBtn').style.display=id==='tf'?'inline-flex':'none';
  document.getElementById('scBtn').style.display=id==='tc'?'inline-flex':'none';
}

// ── 成員管理 ──
async function loadM(){
  try{
    const r=await fetch('https://sheets.googleapis.com/v4/spreadsheets/'+SHEET_ID+'/values/members!A1:E?key='+API_KEY);
    const d=await r.json();
    members=(d.values||[]).slice(1).map(r=>({gameId:r[0]||'',nickname:r[1]||'',note:r[2]||'成員',left:(r[3]||'').toLowerCase()==='true',server:r[4]||''}));
    origM=JSON.parse(JSON.stringify(members));
  }catch(e){members=[];origM=[];}
  renderM();
}

function renderM(){
  const el=document.getElementById('mlist');
  const active=members.filter(m=>!m.left);
  if(!active.length){el.innerHTML='<p style="color:#9e6b7e;font-size:.9rem;margin-bottom:12px;">尚無在職成員。</p>';return;}
  const ROLE_ORDER={'會長':0,'副會長':1,'理事':2,'菁英':3,'成員':4,'分會成員':5};
  const sorted=active.slice().sort((a,b)=>(ROLE_ORDER[a.note]??4)-(ROLE_ORDER[b.note]??4));
  el.innerHTML='<p style="font-size:0.85rem;color:var(--pink-dark);font-weight:600;margin-bottom:12px;">目前公會成員：'+active.length+' 人</p>'
  +sorted.map(m=>{
    const i=members.indexOf(m);
    return '<div class="card"><div class="mrow">'
      +'<div class="m-id"><div class="lbl">遊戲 ID</div><input type="text" value="'+m.gameId+'" oninput="members['+i+'].gameId=this.value" placeholder="遊戲 ID"/></div>'
      +'<div class="m-sv"><div class="lbl">伺服器</div><input type="text" value="'+(m.server||'')+'" oninput="members['+i+'].server=this.value" placeholder=""/></div>'
      +'<div class="m-nick"><div class="lbl">暱稱</div><input type="text" value="'+m.nickname+'" oninput="members['+i+'].nickname=this.value" placeholder="暱稱"/></div>'
      +'<div class="m-role"><div class="lbl">職位</div><select onchange="members['+i+'].note=this.value">'
      +['會長','副會長','理事','菁英','成員','分會成員'].map(r=>'<option '+(m.note===r?'selected':'')+'>'+r+'</option>').join('')
      +'</select></div>'
      +'<div class="m-rm"><button class="btn-rm" onclick="members['+i+'].left=true;renderM()">移除</button></div>'
      +'</div></div>';
  }).join('');
}

function addM(){members.push({gameId:'',nickname:'',note:'成員',left:false,server:''});renderM();}

async function saveM(){
  const om={};origM.forEach(m=>{om[m.gameId]=m;});
  const ch=members.filter(m=>{
    if(!m.gameId)return false;
    const o=om[m.gameId];
    if(!o&&m.left)return false;if(!o)return true;
    return o.nickname!==m.nickname||o.note!==m.note||!!o.left!==!!m.left||(o.server||'')!==(m.server||'');
  });
  if(!ch.length){alert('成員資料沒有變動');return;}
  const btn=document.getElementById('smBtn');
  btn.innerHTML='⏳ 儲存中...';btn.disabled=true;
  try{
    for(const m of ch){
      await new Promise(res=>{
        const p=encodeURIComponent(JSON.stringify({action:'updateMember',gameId:m.gameId,nickname:m.nickname,note:m.note,left:!!m.left,server:m.server||''}));
        const img=new Image();img.onload=img.onerror=()=>res();
        img.src=APPS_SCRIPT_URL+'?data='+p;
      });
    }
    alert('✅ 成員資料已儲存！（'+ch.length+' 筆變動）');
    origM=JSON.parse(JSON.stringify(members));
  }catch(e){alert('❌ 儲存失敗：'+e.message);}
  finally{btn.innerHTML='💾 儲存成員';btn.disabled=false;}
}

// ── 花卉資料 ──
async function loadF(){
  try{
    const r=await fetch('https://sheets.googleapis.com/v4/spreadsheets/'+SHEET_ID+'/values/flowers!A1:Z?key='+API_KEY);
    const d=await r.json();
    const rows=d.values||[];
    const headers=rows[0]||[];
    fd=rows.slice(1).map(row=>{
      const f={};
      headers.forEach((h,i)=>{f[h]=row[i]||'';});
      f.id=Number(f.id);f.score=Number(f.score);f.order=Number(f.order)||999;
      f.owners=[];
      return f;
    });
    origFd=JSON.parse(JSON.stringify(fd));
  }catch(e){fd=[];origFd=[];}
  renderT();
}

function buildQS(idx,cur){
  const id='qs'+idx;
  return '<div class="cs" id="'+id+'"><button type="button" class="cst q-'+cur+'" onclick="tgQ(\''+id+'\')">'+cur+'</button>'
    +'<div class="csd" id="'+id+'d">'+QL.map(q=>'<div class="cso q-'+q+'" onclick="pkQ('+idx+',\''+q+'\')">'+q+'</div>').join('')+'</div></div>';
}
function tgQ(id){
  document.querySelectorAll('.csd.open').forEach(d=>{if(d.id!==id+'d')d.classList.remove('open');});
  document.getElementById(id+'d').classList.toggle('open');
}
function pkQ(idx,v){
  fd[idx].quality=v;const id='qs'+idx;
  const t=document.querySelector('#'+id+' .cst');t.textContent=v;t.className='cst q-'+v;
  document.getElementById(id+'d').classList.remove('open');
}
document.addEventListener('click',e=>{if(!e.target.closest('.cs'))document.querySelectorAll('.csd.open').forEach(d=>d.classList.remove('open'));});

function renderT(){
  const qf=document.getElementById('qf').value,of=document.getElementById('of').value;
  const fil=fd.map((f,i)=>({f,i})).filter(({f})=>(!qf||f.quality===qf)&&(!of||f.obtain===of))
    .sort((a,b)=>{
      // 新增的（有 _localPreview）排最前
      if (a.f._localPreview && !b.f._localPreview) return -1;
      if (!a.f._localPreview && b.f._localPreview) return 1;
      const qd=(QO[a.f.quality]??9)-(QO[b.f.quality]??9);
      return qd||((a.f.order??999)-(b.f.order??999));
    });
  document.getElementById('fc').textContent='顯示 '+fil.length+' / '+fd.length+' 筆';
  document.getElementById('tb').innerHTML=fil.map(({f,i})=>
    '<tr style="'+(f._localPreview?'background:#e8f5e9;':'')+'">'
    +'<td><img class="thumb" src="'+(f._localPreview||f.img)+'" alt="'+f.name+'" onerror="this.style.opacity=0.3">'
    +(f._localPreview?'<div style="font-size:.65rem;color:#2e7d32;font-weight:700;">NEW</div>':'')
    +'</td>'
    +'<td><input type="text" class="fname-input" value="'+f.name+'" onchange="fd['+i+'].name=this.value" style="width:100%;min-width:120px;"></td>'
    +'<td><input type="number" min="1" value="'+(f.order||i+1)+'" onchange="fd['+i+'].order=Number(this.value)" style="width:60px;"></td>'
    +'<td>'+buildQS(i,f.quality)+'</td>'
    +'<td><select onchange="fd['+i+'].score=Number(this.value)">'+SL.map(s=>'<option value="'+s+'" '+(f.score===s?'selected':'')+'>'+s+' 分</option>').join('')+'</select></td>'
    +'<td><select onchange="fd['+i+'].obtain=this.value">'+OL.map(o=>'<option value="'+o+'" '+(f.obtain===o?'selected':'')+'>'+o+'</option>').join('')+'</select></td>'
    +'</tr>'
  ).join('');
}

async function saveFlowers(){
  // 區分新增（origFd 裡沒有）和修改（有但內容不同）
  const origIds = new Set(origFd.map(f => f.id));
  const toAdd = fd.filter(f => !origIds.has(f.id));
  const toUpdate = fd.filter((f, i) => {
    const o = origFd.find(of => of.id === f.id);
    if (!o) return false;
    return f.name!==o.name||f.quality!==o.quality||f.score!==o.score||f.obtain!==o.obtain||f.order!==o.order;
  });

  if (!toAdd.length && !toUpdate.length) { alert('花卡資料沒有變動'); return; }

  const btn = document.getElementById('sfBtn');
  btn.innerHTML = '⏳ 儲存中...'; btn.disabled = true;
  try {
    // 新增的花
    for (const f of toAdd) {
      await new Promise(res => {
        const p = encodeURIComponent(JSON.stringify({
          action: 'addFlower',
          id: f.id, name: f.name, quality: f.quality,
          score: f.score, obtain: f.obtain, order: f.order, img: f.img
        }));
        const img = new Image(); img.onload = img.onerror = () => res();
        img.src = APPS_SCRIPT_URL + '?data=' + p;
      });
    }
    // 修改的花
    for (const f of toUpdate) {
      await new Promise(res => {
        const p = encodeURIComponent(JSON.stringify({
          action: 'updateFlower', id: f.id, name: f.name, quality: f.quality,
          score: f.score, obtain: f.obtain, order: f.order
        }));
        const img = new Image(); img.onload = img.onerror = () => res();
        img.src = APPS_SCRIPT_URL + '?data=' + p;
      });
    }
    alert(`✅ 花卡資料已儲存！（新增 ${toAdd.length} 筆，修改 ${toUpdate.length} 筆）`);
    origFd = JSON.parse(JSON.stringify(fd));
  } catch(e) { alert('❌ 儲存失敗：' + e.message); }
  finally { btn.innerHTML = '💾 儲存花卉'; btn.disabled = false; }
}

// ── 新增花卉 ──
function toggleAddFlower() {
  const area = document.getElementById('add-flower-area');
  area.style.display = area.style.display === 'none' ? '' : 'none';
}

function onFlowerImgSelect(input) {
  const file = input.files[0];
  if (!file) return;
  const preview = document.getElementById('af-preview');
  preview.src = URL.createObjectURL(file);
  preview.style.display = 'block';
}

async function uploadAndAddFlower() {
  const file = document.getElementById('af-img').files[0];
  const token = document.getElementById('af-token').value.trim();
  const status = document.getElementById('af-status');

  if (!file) { showStatus(status, '請選擇圖片', 'err'); return; }
  if (!token) { showStatus(status, '請填入密碼', 'err'); return; }

  // 從表格最後一列取得新花的 id（最大 id + 1）
  const newId = fd.length ? Math.max(...fd.map(f => f.id)) + 1 : 1;
  const name = file.name.replace(/\.[^.]+$/, ''); // 用檔名當花名（去副檔名）
  const quality = document.getElementById('af-quality').value; // 用選擇的品質決定資料夾
  const imgPath = `FlowerImage/${quality}/${file.name}`;

  showStatus(status, '⏳ 上傳圖片中...', 'info');

  try {
    // 讀取圖片為 base64
    const base64 = await new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = e => resolve(e.target.result.split(',')[1]);
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });

    // 上傳到 GitHub
    const { owner, repo, branch } = GITHUB_CONFIG;
    const apiUrl = `https://api.github.com/repos/${owner}/${repo}/contents/${encodeURIComponent(imgPath)}`;

    // 先確認是否已存在
    let sha;
    const getRes = await fetch(apiUrl, {
      headers: { Authorization: `token ${token}`, Accept: 'application/vnd.github.v3+json' }
    });
    if (getRes.ok) sha = (await getRes.json()).sha;

    const body = { message: `add flower image: ${file.name}`, content: base64, branch };
    if (sha) body.sha = sha;

    const putRes = await fetch(apiUrl, {
      method: 'PUT',
      headers: { Authorization: `token ${token}`, Accept: 'application/vnd.github.v3+json', 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    if (!putRes.ok) { const e = await putRes.json(); throw new Error(e.message); }

    showStatus(status, '✅ 圖片上傳成功！正在新增花卉資料...', 'ok');

    // 新增到 fd 陣列第一列（表格最上方顯示）
    // order 取該品質最大值 + 1
    const sameQuality = fd.filter(f => f.quality === quality);
    const newOrder = sameQuality.length > 0 ? Math.max(...sameQuality.map(f => Number(f.order) || 0)) + 1 : 1;

    const newFlower = {
      id: newId, name, quality, score: 25, obtain: '活動',
      order: newOrder,
      img: `../${imgPath}`,
      _localPreview: URL.createObjectURL(file), // 本機預覽用，儲存後移除
      owners: []
    };
    fd.unshift(newFlower); // 放在最前面
    renderT();

    // 同步寫入 Google Sheet
    await new Promise(resolve => {
      const params = encodeURIComponent(JSON.stringify({
        action: 'addFlower',
        id: newId, name, quality, score: 25, obtain: '活動',
        order: newOrder, img: `../${imgPath}`  // 用正確的 newOrder
      }));
      const img = new Image();
      img.onload = img.onerror = () => resolve();
      img.src = `${APPS_SCRIPT_URL}?data=${params}`;
    });

    // 寫入 Sheet 後加入 origFd，避免之後儲存時重複新增
    origFd.unshift({ ...newFlower });

    showStatus(status, `✅ 完成！花卉「${name}」已新增到 Sheet，請在表格中調整品質/分數/取得方式後按儲存更新。`, 'ok');

    // 清空上傳區
    document.getElementById('af-img').value = '';
    document.getElementById('af-preview').style.display = 'none';
    document.getElementById('af-token').value = '';

  } catch(e) {
    showStatus(status, '❌ 失敗：' + e.message, 'err');
  }
}

function showStatus(el, msg, type) {
  el.textContent = msg;
  el.style.background = type === 'ok' ? '#e8f5e9' : type === 'err' ? '#fce4ec' : '#e3f2fd';
  el.style.color = type === 'ok' ? '#2e7d32' : type === 'err' ? '#c2185b' : '#1565c0';
  el.style.display = 'block';
}

// ══════════════════════════════════════
// ── 兌換碼管理 ──
// ══════════════════════════════════════
let coupons = [], origCoupons = [];

async function loadC() {
  try {
    const r = await fetch('https://sheets.googleapis.com/v4/spreadsheets/'+SHEET_ID+'/values/coupon!A1:Z?key='+API_KEY);
    const d = await r.json();
    const rows = d.values || [];
    const headers = rows[0] || [];
    const codeIdx = headers.indexOf('兌換碼');
    const typeIdx = headers.indexOf('類別');
    coupons = rows.slice(1).map(row => ({
      code: (row[codeIdx] || '').trim(),
      type: (row[typeIdx] || '常態').trim(),
      _deleted: false,
      _orig: { code: (row[codeIdx] || '').trim(), type: (row[typeIdx] || '常態').trim() }
    })).filter(c => c.code);
    origCoupons = JSON.parse(JSON.stringify(coupons));
  } catch(e) { coupons = []; origCoupons = []; }
  renderC();
}

function renderC() {
  const el = document.getElementById('clist');
  if (!coupons.filter(c => !c._deleted).length) {
    el.innerHTML = '<p style="color:#9e6b7e;font-size:.9rem;margin-bottom:12px;">尚無兌換碼。</p>';
    return;
  }
  el.innerHTML = coupons.map((c, i) => {
    if (c._deleted) return '';
    return '<div class="card"><div class="mrow" style="grid-template-columns:1fr auto auto;">'
      + '<div><div class="lbl">兌換碼</div><input type="text" value="' + c.code + '" oninput="coupons[' + i + '].code=this.value" placeholder="輸入兌換碼"/></div>'
      + '<div><div class="lbl">類別</div><select onchange="coupons[' + i + '].type=this.value">'
      + ['常態','週期'].map(t => '<option ' + (c.type === t ? 'selected' : '') + '>' + t + '</option>').join('')
      + '</select></div>'
      + '<div><button class="btn-rm" onclick="coupons[' + i + ']._deleted=true;renderC()">移除</button></div>'
      + '</div></div>';
  }).join('');
}

function addCoupon() {
  coupons.push({ code: '', type: '常態', _deleted: false });
  renderC();
}

async function saveCoupons() {
  const active = coupons.filter(c => !c._deleted && c.code.trim());
  const deleted = coupons.filter(c => c._deleted && c._orig); // 原本存在且被刪除的

  // 計算差異
  const origMap = {};
  origCoupons.forEach((c, i) => { origMap[i] = c; });

  const toAdd = [];
  const toUpdate = [];
  const toDelete = [];

  // 找新增與修改
  active.forEach(c => {
    if (!c._orig) {
      // 沒有 _orig 代表新增的
      if (c.code.trim()) toAdd.push(c);
    } else {
      // 有 _orig 代表原本就存在，看有沒有改
      if (c.code.trim() !== c._orig.code || c.type !== c._orig.type) {
        toUpdate.push(c);
      }
    }
  });

  // 找刪除
  deleted.forEach(c => { toDelete.push(c._orig); });

  if (!toAdd.length && !toUpdate.length && !toDelete.length) {
    alert('兌換碼沒有變動');
    return;
  }

  const btn = document.getElementById('scBtn');
  btn.innerHTML = '⏳ 儲存中...'; btn.disabled = true;
  try {
    // 新增
    for (const c of toAdd) {
      await new Promise(resolve => {
        const p = encodeURIComponent(JSON.stringify({
          action: 'addCoupon', code: c.code.trim(), type: c.type
        }));
        const img = new Image(); img.onload = img.onerror = () => resolve();
        img.src = APPS_SCRIPT_URL + '?data=' + p;
      });
    }
    // 修改
    for (const c of toUpdate) {
      await new Promise(resolve => {
        const p = encodeURIComponent(JSON.stringify({
          action: 'updateCoupon', oldCode: c._orig.code, code: c.code.trim(), type: c.type
        }));
        const img = new Image(); img.onload = img.onerror = () => resolve();
        img.src = APPS_SCRIPT_URL + '?data=' + p;
      });
    }
    // 刪除
    for (const c of toDelete) {
      await new Promise(resolve => {
        const p = encodeURIComponent(JSON.stringify({
          action: 'deleteCoupon', code: c.code
        }));
        const img = new Image(); img.onload = img.onerror = () => resolve();
        img.src = APPS_SCRIPT_URL + '?data=' + p;
      });
    }
    alert(`✅ 兌換碼已儲存！（新增 ${toAdd.length}、修改 ${toUpdate.length}、刪除 ${toDelete.length} 筆）`);
    // 重新整理狀態
    coupons = active.map(c => ({ code: c.code.trim(), type: c.type, _deleted: false, _orig: { code: c.code.trim(), type: c.type } }));
    origCoupons = JSON.parse(JSON.stringify(coupons));
    renderC();
  } catch(e) { alert('❌ 儲存失敗：' + e.message); }
  finally { btn.innerHTML = '💾 儲存兌換碼'; btn.disabled = false; }
}

(async()=>{
  // ── 進入驗證 ──
  await new Promise(r => { if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', r); else r(); });
  const pw = prompt('請輸入管理密碼：');
  if (pw === null) { location.href = 'index.html'; return; }
  if (!pw.trim()) { alert('請輸入密碼'); location.href = 'index.html'; return; }
  try {
    const payload = encodeURIComponent(JSON.stringify({ action: 'checkPassword', pw: pw.trim() }));
    const res = await fetch(`${APPS_SCRIPT_URL}?data=${payload}`);
    const data = await res.json();
    if (!data.ok) { alert('密碼錯誤'); location.href = 'index.html'; return; }
  } catch(e) {
    // Apps Script 冷啟動可能失敗，自動重試一次
    try {
      const payload = encodeURIComponent(JSON.stringify({ action: 'checkPassword', pw: pw.trim() }));
      const res = await fetch(`${APPS_SCRIPT_URL}?data=${payload}`);
      const data = await res.json();
      if (!data.ok) { alert('密碼錯誤'); location.href = 'index.html'; return; }
    } catch(e2) { alert('驗證失敗，請稍後再試'); location.href = 'index.html'; return; }
  }
  await loadM();
  await loadF();
  await loadC();
  document.getElementById('sfBtn').style.display='none';
  document.getElementById('smBtn').style.display='inline-flex';
  document.getElementById('scBtn').style.display='none';

  // 初始化競賽紀錄功能
  initContestRecord();
})();
</script>

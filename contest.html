<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>競賽計算機 - 璀璨</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌸</text></svg>" />
  <script src="config.js"></script>
  <style>
    :root {
      --pink:#e96a1e; --pink-light:#fef0e7; --pink-mid:#f4a46a;
      --pink-dark:#c2510b; --bg:#fff8f5; --card-bg:#ffffff;
      --text:#3d1a2e; --text-muted:#9e6b7e; --border:#f8d5b0;
      --shadow:0 2px 12px rgba(233,106,30,0.10); --radius:14px;
    }
    * { box-sizing:border-box; margin:0; padding:0; }
    html, body { margin:0; padding:0; }
    body { font-family:'Segoe UI','Microsoft JhengHei',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; padding-bottom:40px; }

    /* ── Header ── */
    header { background:linear-gradient(135deg,#c2510b 0%,#e96a1e 60%,#f4a46a 100%); color:#fff; padding:0 20px; display:flex; align-items:center; justify-content:space-between; height:60px; position:sticky; top:0; z-index:100; box-shadow:0 2px 8px rgba(194,81,11,0.3); }
    .guild-name { font-size:1.25rem; font-weight:700; letter-spacing:2px; white-space:nowrap; }
    .guild-name small { font-weight:400; opacity:0.8; font-size:0.7rem; }
    a.guild-name { text-decoration:none; color:inherit; cursor:pointer; }
    nav { display:flex; gap:8px; }
    nav a { color:#fff; text-decoration:none; padding:6px 14px; border-radius:20px; font-size:0.9rem; font-weight:600; transition:background 0.2s; border:1.5px solid rgba(255,255,255,0.5); }
    nav a:hover, nav a.active { background:rgba(255,255,255,0.25); }

    /* ── 漢堡選單 ── */
    .hamburger { display:none; flex-direction:column; gap:5px; cursor:pointer; padding:6px; background:none; border:none; }
    .hamburger span { display:block; width:22px; height:2px; background:#fff; border-radius:2px; transition:all 0.3s; }
    .hamburger.open span:nth-child(1) { transform:translateY(7px) rotate(45deg); }
    .hamburger.open span:nth-child(2) { opacity:0; }
    .hamburger.open span:nth-child(3) { transform:translateY(-7px) rotate(-45deg); }
    #nav-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.4); z-index:150; }
    #nav-overlay.show { display:block; }
    #mobile-nav { position:fixed; top:0; right:-260px; width:240px; height:100vh; background:linear-gradient(160deg,#c2510b,#e96a1e); z-index:200; padding:70px 20px 30px; display:flex; flex-direction:column; gap:8px; transition:right 0.3s cubic-bezier(0.4,0,0.2,1); box-shadow:-4px 0 20px rgba(0,0,0,0.2); }
    #mobile-nav.open { right:0; }
    #mobile-nav a { color:#fff; text-decoration:none; padding:12px 16px; border-radius:12px; font-size:1rem; font-weight:600; border:1.5px solid rgba(255,255,255,0.3); transition:background 0.2s; display:flex; align-items:center; gap:10px; }
    #mobile-nav a:hover, #mobile-nav a.active { background:rgba(255,255,255,0.2); }
    #mobile-nav .nav-close { position:absolute; top:16px; right:16px; background:none; border:none; color:#fff; font-size:1.5rem; cursor:pointer; }

    @media(max-width:600px) {
      .guild-name { font-size:1rem; }
      nav { display:none; }
      .hamburger { display:flex; }
    }

    /* ── 主內容 ── */
    main { max-width:700px; margin:0 auto; padding:24px 16px; }
    h1 { text-align:center; color:var(--pink-dark); font-size:1.3rem; margin-bottom:4px; }
    .subtitle { text-align:center; color:var(--text-muted); font-size:0.85rem; margin-bottom:24px; }

    /* ── 卡片 ── */
    .card { background:var(--card-bg); border-radius:var(--radius); padding:18px 20px; margin-bottom:16px; box-shadow:var(--shadow); border:1px solid var(--border); }
    .card-title { font-size:0.85rem; font-weight:700; color:var(--pink-dark); margin-bottom:12px; display:flex; align-items:center; gap:6px; }

    /* ── 表單元素 ── */
    .form-row { display:flex; gap:12px; flex-wrap:wrap; align-items:flex-end; }
    .form-group { display:flex; flex-direction:column; gap:5px; flex:1; min-width:120px; }
    .form-group label { font-size:0.78rem; color:var(--text-muted); font-weight:600; }
    select, input[type=number] { padding:8px 12px; border:1.5px solid var(--pink-mid); border-radius:8px; font-size:0.9rem; background:var(--bg); color:var(--text); outline:none; width:100%; }
    select:focus, input:focus { border-color:var(--pink); }

    /* ── 稱號顯示 ── */
    .title-badges { display:flex; gap:8px; flex-wrap:wrap; margin-top:8px; }
    .title-badge { padding:5px 14px; border-radius:20px; font-size:0.82rem; font-weight:700; cursor:pointer; border:2px solid transparent; transition:all 0.18s; opacity:0.5; }
    .title-badge.selected { opacity:1; transform:scale(1.05); }
    .title-badge:hover { opacity:0.85; }
    .tb-0 { background:#f0f0f0; color:#888; border-color:#ddd; }
    .tb-1 { background:linear-gradient(135deg,#cd7f32,#e8a96a); color:#fff; }
    .tb-2 { background:linear-gradient(135deg,#9e9e9e,#d4d4d4); color:#fff; }
    .tb-3 { background:linear-gradient(135deg,#f4c430,#ffd700); color:#5a4000; }
    .tb-4 { background:linear-gradient(135deg,#9b59b6,#c39bd3); color:#fff; }
    .tb-5 { background:linear-gradient(135deg,#e96a1e,#ff4e8a); color:#fff; }

    /* ── 最高分選擇 ── */
    .max-score-btns { display:flex; gap:8px; flex-wrap:wrap; margin-top:8px; }
    .max-score-btn { padding:6px 14px; border-radius:20px; font-size:0.85rem; font-weight:700; cursor:pointer; border:1.5px solid var(--pink-mid); background:var(--bg); color:var(--pink-dark); transition:all 0.18s; }
    .max-score-btn.active { background:var(--pink); border-color:var(--pink); color:#fff; }

    /* ── 進階加成 ── */
    .bonus-btn { padding:6px 14px; border-radius:20px; font-size:0.82rem; font-weight:600; cursor:pointer; border:1.5px solid var(--pink-mid); background:var(--bg); color:var(--pink-dark); transition:all 0.18s; margin:4px 4px 0 0; }
    .bonus-btn.active { background:var(--pink-light); border-color:var(--pink); }
    .mode-toggle { display:flex; gap:8px; margin-bottom:16px; }
    .mode-btn { flex:1; padding:8px; border-radius:8px; font-size:0.85rem; font-weight:600; cursor:pointer; border:1.5px solid var(--pink-mid); background:var(--bg); color:var(--pink-dark); transition:all 0.18s; }
    .mode-btn.active { background:var(--pink); border-color:var(--pink); color:#fff; }

    /* ── 結果區 ── */
    #result { display:none; }
    .result-header { background:linear-gradient(135deg,#c2510b,#e96a1e); color:#fff; border-radius:var(--radius); padding:16px 20px; margin-bottom:12px; transition:background 0.3s; }
    .result-header .name { font-size:1.1rem; font-weight:700; margin-bottom:6px; }
    .result-header .stats { display:flex; gap:16px; flex-wrap:wrap; font-size:0.85rem; margin-bottom:10px; }
    .result-header .stat { display:flex; align-items:center; gap:4px; color:#fff; font-weight:600; text-shadow:0 1px 2px rgba(0,0,0,0.3); }

    .result-target { background:var(--pink-light); border:1.5px solid var(--border); border-radius:10px; padding:12px 16px; margin-bottom:12px; font-size:0.9rem; color:var(--pink-dark); font-weight:600; }

    .combo-list { display:flex; flex-direction:column; gap:8px; }
    .combo-item { background:var(--card-bg); border:1.5px solid var(--border); border-radius:10px; padding:12px 16px; display:flex; align-items:center; gap:12px; transition:border-color 0.2s; }
    .combo-item:hover { border-color:var(--pink-mid); }
    .combo-rank { width:28px; height:28px; border-radius:50%; background:linear-gradient(135deg,#c2510b,#e96a1e); color:#fff; font-size:0.8rem; font-weight:700; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
    .combo-detail { flex:1; }
    .combo-tasks { font-size:0.9rem; font-weight:600; color:var(--text); }
    .combo-score { font-size:0.82rem; color:var(--text-muted); margin-top:2px; }
    .combo-badge { font-size:0.75rem; padding:2px 8px; border-radius:8px; background:var(--pink-light); color:var(--pink-dark); font-weight:600; flex-shrink:0; }

    .no-result { text-align:center; padding:32px; color:var(--text-muted); font-size:0.95rem; }

    /* ── 稱號進度條 ── */
    .progress-wrap { margin-top:12px; }
    .progress-label { display:flex; justify-content:space-between; font-size:0.82rem; color:#fff; font-weight:700; text-shadow:0 1px 3px rgba(0,0,0,0.4); margin-bottom:6px; }
    .progress-track { background:rgba(0,0,0,0.25); border-radius:6px; height:12px; overflow:hidden; }
    .progress-fill { height:100%; border-radius:6px; background:#fff; box-shadow:0 0 6px rgba(255,255,255,0.7); transition:width 0.6s ease; }

    /* nav-dropdown 由 header.js 統一注入 */
  </style>
</head>
<body>

<div id="site-header"></div>

<main>
  <h1>🏆 競賽計算機</h1>
  <p class="subtitle">計算最短路徑達成目標稱號</p>

  <!-- 成員與設定 -->
  <div class="card">
    <div class="card-title">⚙️ 基本設定</div>
    <div class="form-row">
      <div class="form-group">
        <label>任務上限</label>
        <select id="taskLimit" onchange="refresh()" oninput="refresh()">
          <option value="18">18 個</option>
          <option value="24" selected>24 個</option>
        </select>
      </div>
      <div class="form-group">
        <label>目前競賽積分</label>
        <input type="number" id="currentScore" placeholder="例：1192" min="0" oninput="refresh()" />
      </div>
      <div class="form-group">
        <label>已解任務次數</label>
        <input type="number" id="doneCount" placeholder="例：22" min="0" oninput="refresh()" />
      </div>
    </div>
    <div style="margin-top:14px;">
      <div style="font-size:0.78rem;color:var(--text-muted);font-weight:600;margin-bottom:8px;">最高可接加倍任務分數</div>
      <div class="max-score-btns">
        <button class="max-score-btn" data-score="28" onclick="setMaxScore(28)">28</button>
        <button class="max-score-btn" data-score="42" onclick="setMaxScore(42)">42</button>
        <button class="max-score-btn" data-score="46" onclick="setMaxScore(46)">46</button>
        <button class="max-score-btn active" data-score="50" onclick="setMaxScore(50)">50</button>
        <button class="max-score-btn" data-score="56" onclick="setMaxScore(56)">56</button>
        <button class="max-score-btn" data-score="60" onclick="setMaxScore(60)">60</button>
      </div>
    </div>
    <div id="bonusWrap" style="margin-top:12px;"></div>
  </div>

  <!-- 目標稱號 -->
  <div class="card">
    <div class="card-title">🎯 目標稱號</div>
    <div class="title-badges" id="titleBadges">
      <div class="title-badge tb-1" data-min="500" data-max="699" data-name="青銅花匠" onclick="selectTitle(this)">青銅花匠<br><small>500–699</small></div>
      <div class="title-badge tb-2" data-min="700" data-max="999" data-name="白銀花匠" onclick="selectTitle(this)">白銀花匠<br><small>700–999</small></div>
      <div class="title-badge tb-3" data-min="1000" data-max="1299" data-name="黃金花匠" onclick="selectTitle(this)">黃金花匠<br><small>1000–1299</small></div>
      <div class="title-badge tb-4" data-min="1300" data-max="1399" data-name="大師花匠" onclick="selectTitle(this)">大師花匠<br><small>1300–1399</small></div>
      <div class="title-badge tb-5" data-min="1400" data-max="99999" data-name="王者花匠" onclick="selectTitle(this)">王者花匠<br><small>1400+</small></div>
    </div>
  </div>

  <!-- 計算模式 -->
  <div class="mode-toggle" style="display:none;">
    <button class="mode-btn active" id="modeMax" onclick="setMode('max')">接滿剩餘任務</button>
    <button class="mode-btn" id="modeMin" onclick="setMode('min')">最少任務數達標</button>
  </div>

  <!-- 結果 -->
  <div id="result" style="margin-top:20px;">
    <div class="result-header">
      <div class="stats">
        <div class="stat">&#x1F4CA; 總分：<span id="res-score"></span></div>
        <div class="stat">&#x1F4CB; 任務上限：<span id="res-limit"></span></div>
        <div class="stat">&#x23F3; 剩餘可接：<span id="res-remain"></span></div>
        <div class="stat">&#x1F3AF; 最高可接：<span id="res-max-task"></span></div>
      </div>
      <div class="progress-wrap">
        <div class="progress-label">
          <span id="res-title-label"></span>
          <span id="res-progress-text"></span>
        </div>
        <div class="progress-track"><div class="progress-fill" id="res-progress-fill"></div></div>
      </div>
    </div>
    <div class="result-target" id="res-target"></div>
    <div class="combo-list" id="res-combos"></div>
  </div>
</main>

<script>
// ── 稱號資料 ──
const TITLES = [
  { name:'無稱號',   min:0,    max:499  },
  { name:'青銅花匠', min:500,  max:699  },
  { name:'白銀花匠', min:700,  max:999  },
  { name:'黃金花匠', min:1000, max:1299 },
  { name:'大師花匠', min:1300, max:1399 },
  { name:'王者花匠', min:1400, max:99999},
];

// ── 任務分數（與 BOT 一致）──
const NORMAL_SCORES  = [14, 21, 23, 25, 28, 30];
const DOUBLED_BASE   = [28, 42, 46, 50, 56, 60];
const MAX_SINGLE = 62; // 最高進階加成

let selectedTitleEl = null;
let currentMode = 'max';
let selectedMaxScore = 50;
let selectedBonus = 0;

// ── 依 maxScore 和 bonus 建立可用分數清單（與 BOT 一致）──
function buildAllScores(maxScore, bonus) {
  const doubled = [28, 42, 46, 50].filter(s => s <= maxScore);
  if (maxScore >= 56) {
    if (bonus & 1) doubled.push(57);
    if (bonus & 2) doubled.push(58);
    if (!(bonus & 1) && !(bonus & 2)) doubled.push(56);
  }
  if (maxScore >= 60) {
    if (bonus & 4) doubled.push(61);
    if (bonus & 8) doubled.push(62);
    if (!(bonus & 4) && !(bonus & 8)) doubled.push(60);
  }
  const all = [...new Set([...NORMAL_SCORES, ...doubled])].sort((a,b)=>a-b);
  return all;
}

// ── 核心計算（與 BOT recommend_combinations 一致）──
// 恰好用完 remainingSlots 個任務，找出所有達標組合
function recommendCombinations(currentScore, targetScore, remainingSlots, maxScore, bonus) {
  const need = targetScore - currentScore;
  if (need <= 0) return [];

  const allScores = buildAllScores(maxScore, bonus);
  const seen = new Set();
  const results = [];

  // 枚舉兩種分數的組合 (sa <= sb)，恰好用完 remainingSlots 個任務
  for (let i = 0; i < allScores.length; i++) {
    const sa = allScores[i];
    for (let j = i; j < allScores.length; j++) {
      const sb = allScores[j];
      for (let cb = 0; cb <= remainingSlots; cb++) {
        const ca = remainingSlots - cb;
        const total = ca * sa + cb * sb;
        if (total >= need) {
          let combo;
          if (sa === sb)    combo = { a: sa, ca: ca+cb, b: 0, cb: 0 };
          else if (ca === 0) combo = { a: sb, ca: cb,   b: 0, cb: 0 };
          else if (cb === 0) combo = { a: sa, ca: ca,   b: 0, cb: 0 };
          else               combo = { a: sa, ca,       b: sb, cb };

          const key = `${combo.a},${combo.ca},${combo.b},${combo.cb}`;
          if (!seen.has(key)) {
            seen.add(key);
            results.push({ ...combo, total, finalScore: currentScore + total, taskCount: remainingSlots });
          }
        }
      }
    }
  }

  if (results.length === 0) return null;

  // 排序：最高分任務數最少優先，次要總分最低（與 BOT 一致）
  const topScore = Math.max(...results.flatMap(r => [r.a, r.b].filter(s=>s>0)));

  if (currentMode === 'max') {
    results.sort((x, y) => {
      const xTop = (x.a === topScore ? x.ca : 0) + (x.b === topScore ? x.cb : 0);
      const yTop = (y.a === topScore ? y.ca : 0) + (y.b === topScore ? y.cb : 0);
      return xTop - yTop || x.total - y.total;
    });
  } else {
    // 最少任務數優先 → 這裡所有組合任務數相同（都是 remainingSlots），改為總分最低優先
    results.sort((x, y) => x.total - y.total);
  }

  return results;
}

// ── 最少任務數模式：從 1 個任務開始找最少能達標的組合 ──
function findMinTaskCombos(currentScore, targetScore, remaining, maxScore, bonus) {
  const need = targetScore - currentScore;
  if (need <= 0) return { minCount: 0, combos: [] };

  const allScores = buildAllScores(maxScore, bonus);
  const maxSingle = Math.max(...allScores);

  // 從最少任務數開始找
  for (let n = 1; n <= remaining; n++) {
    // 最多 n 個任務能得的最高分
    if (n * maxSingle < need) continue;

    const seen = new Set();
    const results = [];

    // 枚舉兩種分數的組合，恰好 n 個任務
    for (let i = 0; i < allScores.length; i++) {
      const sa = allScores[i];
      for (let j = i; j < allScores.length; j++) {
        const sb = allScores[j];
        for (let cb = 0; cb <= n; cb++) {
          const ca = n - cb;
          const total = ca * sa + cb * sb;
          if (total >= need) {
            let combo;
            if (sa === sb)     combo = { a: sa, ca: ca+cb, b: 0,  cb: 0 };
            else if (ca === 0) combo = { a: sb, ca: cb,    b: 0,  cb: 0 };
            else if (cb === 0) combo = { a: sa, ca: ca,    b: 0,  cb: 0 };
            else               combo = { a: sa, ca,        b: sb, cb };

            const key = `${combo.a},${combo.ca},${combo.b},${combo.cb}`;
            if (!seen.has(key)) {
              seen.add(key);
              results.push({ ...combo, total, finalScore: currentScore + total, taskCount: n });
            }
          }
        }
      }
    }

    if (results.length > 0) {
      // 排序：最高分任務數最少優先，次要總分最低
      const topScore = Math.max(...results.flatMap(r => [r.a, r.b].filter(s=>s>0)));
      results.sort((x, y) => {
        const xTop = (x.a === topScore ? x.ca : 0) + (x.b === topScore ? x.cb : 0);
        const yTop = (y.a === topScore ? y.ca : 0) + (y.b === topScore ? y.cb : 0);
        return xTop - yTop || x.total - y.total;
      });
      return { minCount: n, combos: results };
    }
  }

  return null; // 無法達標
}

function selectTitle(el) {
  if (el.classList.contains('disabled')) {
    // disabled 稱號也允許選取，refresh() 會處理顯示
    document.querySelectorAll('.title-badge').forEach(b => b.classList.remove('selected'));
    el.classList.add('selected');
    selectedTitleEl = el;
  } else {
    document.querySelectorAll('.title-badge').forEach(b => b.classList.remove('selected'));
    el.classList.add('selected');
    selectedTitleEl = el;
  }
  refresh();
}

// ── 即時更新稱號按鈕狀態（只更新按鈕，不碰結果區）──
function updateTitleBadges() {
  const score = parseInt(document.getElementById('currentScore').value) || 0;
  const done = parseInt(document.getElementById('doneCount').value) || 0;
  const limit = parseInt(document.getElementById('taskLimit').value) || 24;
  const remaining = Math.max(0, limit - done);
  const allScores = buildAllScores(selectedMaxScore, selectedBonus);
  const maxSingle = Math.max(...allScores);
  const maxPossible = score + remaining * maxSingle;

  document.querySelectorAll('.title-badge').forEach(el => {
    const min = parseInt(el.dataset.min);
    const alreadyDone = score >= min;
    const reachable = maxPossible >= min;
    if (!reachable && !alreadyDone) {
      el.classList.add('disabled'); el.style.opacity='0.3'; el.style.cursor='not-allowed';
      el.title = `本期無法達成（最多可得 ${maxPossible} 分）`;
    } else {
      el.classList.remove('disabled'); el.style.opacity=''; el.style.cursor='pointer';
      el.title = alreadyDone ? `已達成（目前 ${score} 分）` : '';
    }
  });
}

function setMode(mode) {
  currentMode = mode;
  document.getElementById('modeMin').classList.toggle('active', mode === 'min');
  document.getElementById('modeMax').classList.toggle('active', mode === 'max');
  // 若已有結果，切換時自動重新計算
  if (document.getElementById('result').style.display === 'block') {
    calculate();
  }
}

// ── 統一刷新：所有輸入變動都呼叫這裡 ──
function refresh() {
  const score = parseInt(document.getElementById('currentScore').value);
  const done  = parseInt(document.getElementById('doneCount').value);
  const limit = parseInt(document.getElementById('taskLimit').value) || 24;

  // 先更新稱號按鈕狀態（不含超過上限判斷）
  updateTitleBadges();

  // 條件不齊全就不計算
  if (isNaN(score) || score < 0) return;
  if (isNaN(done)  || done  < 0) return;

  // 優先判斷：已解次數超過上限
  if (done > limit) {
    const hdr = document.getElementById('result');
    hdr.style.display = 'block';
    document.querySelector('.result-header').className = 'result-header';
    document.getElementById('res-score').textContent = `${score} 分`;
    document.getElementById('res-limit').textContent = `${limit} 個`;
    document.getElementById('res-remain').textContent = `0 個`;
    document.getElementById('res-max-task').textContent = `${selectedMaxScore} 分任務`;
    document.getElementById('res-title-label').textContent = '';
    document.getElementById('res-progress-text').textContent = '';
    document.getElementById('res-progress-fill').style.width = '0%';
    document.querySelector('.progress-wrap').style.display = 'none';
    document.getElementById('res-target').textContent = `❌ 已解任務次數（${done}）超過任務上限（${limit}），請確認輸入`;
    document.getElementById('res-combos').innerHTML = '';
    return;
  }
  document.querySelector('.progress-wrap').style.display = '';

  if (!selectedTitleEl) return;
  calculate();
}

function autoCalculate() { refresh(); }

function setMaxScore(score) {
  selectedMaxScore = score;
  document.querySelectorAll('.max-score-btn').forEach(b => b.classList.toggle('active', parseInt(b.dataset.score) === score));
  if (score < 56) { selectedBonus = 0; renderBonusButtons(); }
  renderBonusButtons();
  refresh();
}

function toggleBonus(bit) {
  selectedBonus ^= (1 << bit);
  renderBonusButtons();
  refresh();
}

function renderBonusButtons() {
  const wrap = document.getElementById('bonusWrap');
  if (selectedMaxScore < 56) { wrap.style.display='none'; return; }
  wrap.style.display='';
  const options = [];
  if (selectedMaxScore >= 56) options.push([0,'56+1（57分）'],[1,'56+2（58分）']);
  if (selectedMaxScore >= 60) options.push([2,'60+1（61分）'],[3,'60+2（62分）']);
  wrap.innerHTML = '<div style="font-size:0.78rem;color:var(--text-muted);font-weight:600;margin-bottom:8px;">進階加成（可複選）</div>' +
    options.map(([bit, label]) => {
      const checked = !!(selectedBonus & (1 << bit));
      return `<button class="bonus-btn${checked?' active':''}" onclick="toggleBonus(${bit})">${checked?'✅':'⬜'} ${label}</button>`;
    }).join('');
}

function getCurrentTitle(score) {
  let t = TITLES[0];
  for (const title of TITLES) { if (score >= title.min) t = title; }
  return t;
}

function calculate() {
  const score = parseInt(document.getElementById('currentScore').value);
  const done  = parseInt(document.getElementById('doneCount').value);
  const limit = parseInt(document.getElementById('taskLimit').value) || 24;

  if (isNaN(score) || score < 0) { alert('請輸入目前競賽積分'); return; }
  if (isNaN(done)  || done  < 0) { alert('請輸入已解任務次數'); return; }
  if (!selectedTitleEl)          { alert('請選擇目標稱號'); return; }
  if (done > limit) {
    const resultEl = document.getElementById('result');
    resultEl.style.display = 'block';
    document.getElementById('res-score').textContent = `${score} 分`;
    document.getElementById('res-limit').textContent = `${limit} 個`;
    document.getElementById('res-remain').textContent = `0 個`;
    document.getElementById('res-max-task').textContent = `${selectedMaxScore} 分任務`;
    document.getElementById('res-title-label').textContent = '';
    document.getElementById('res-progress-text').textContent = '';
    document.getElementById('res-progress-fill').style.width = '0%';
    document.getElementById('res-target').textContent = `⚠️ 已解任務次數（${done}）超過任務上限（${limit}），請確認輸入`;
    document.getElementById('res-combos').innerHTML = '';
    return;
  }

  const remaining = limit - done;
  const targetMin = parseInt(selectedTitleEl.dataset.min);
  const targetMax = parseInt(selectedTitleEl.dataset.max);
  const targetName = selectedTitleEl.dataset.name;

  const currentTitle = getCurrentTitle(score);
  const need = Math.max(0, targetMin - score);
  const allScores = buildAllScores(selectedMaxScore, selectedBonus);
  const maxSingle = Math.max(...allScores);
  const maxPossible = score + remaining * maxSingle;

  // 填入 header（預設正常橘色）
  document.querySelector('.result-header').className = 'result-header';
  document.getElementById('res-score').textContent = `${score} 分`;
  document.getElementById('res-limit').textContent = `${limit} 個`;
  document.getElementById('res-remain').textContent = `${remaining} 個`;
  document.getElementById('res-max-task').textContent = `${selectedMaxScore} 分任務`;

  // 進度條：顯示到目標稱號的進度
  const titleIdx = TITLES.findIndex(t => t.name === currentTitle.name);
  document.getElementById('res-title-label').textContent = `${currentTitle.name} → ${targetName} 還差 ${need} 分`;
  if (score < targetMin) {
    const pct = Math.min(100, Math.round(score / targetMin * 100));
    document.getElementById('res-progress-text').textContent = `${score} / ${targetMin}`;
    document.getElementById('res-progress-fill').style.width = Math.max(pct, 2) + '%';
  } else {
    document.getElementById('res-progress-text').textContent = `${score} 分`;
    document.getElementById('res-progress-fill').style.width = '100%';
  }

  const resultEl = document.getElementById('result');
  resultEl.style.display = 'block';

  if (score >= targetMin) {
    document.querySelector('.progress-wrap').style.display = '';
    document.getElementById('res-target').textContent = `✅ 已達成「${targetName}」！目前 ${score} 分`;
    document.getElementById('res-combos').innerHTML = '';
    return;
  }

  if (maxPossible < targetMin) {
    document.querySelector('.result-header').className = 'result-header';
    document.querySelector('.progress-wrap').style.display = 'none';
    document.getElementById('res-title-label').textContent = '';
    document.getElementById('res-target').textContent = `❌ ${currentTitle.name} → ${targetName} 還差 ${need} 分，本期無法達成`;
    document.getElementById('res-combos').innerHTML =
      `<div class="no-result">😢 本期最多可得 ${maxPossible} 分<br>無法達成「${targetName}」</div>`;
    return;
  }

  document.querySelector('.progress-wrap').style.display = '';

  document.getElementById('res-target').textContent =
    `🎯 目標：${targetName}（還差 ${need} 分，剩餘 ${remaining} 個任務全部接完）`;

  if (remaining === 0) {
    document.getElementById('res-combos').innerHTML = '<div class="no-result">⚠️ 本期任務已達上限</div>';
    return;
  }

  let combos, modeLabel;

  if (currentMode === 'min') {
    // 最少任務數模式
    const result = findMinTaskCombos(score, targetMin, remaining, selectedMaxScore, selectedBonus);
    if (!result) {
      document.getElementById('res-combos').innerHTML =
        `<div class="no-result">😢 找不到合適的組合，建議調整目標</div>`;
      return;
    }
    combos = result.combos;
    document.getElementById('res-target').textContent =
      `🎯 目標：${targetName}（還差 ${need} 分）✨ 最少再接 ${result.minCount} 個任務即可達成！`;
    modeLabel = `最少 ${result.minCount} 個任務`;
  } else {
    // 最高分任務最少優先模式（恰好用完所有剩餘名額）
    combos = recommendCombinations(score, targetMin, remaining, selectedMaxScore, selectedBonus);
    if (!combos || combos.length === 0) {
      document.getElementById('res-combos').innerHTML =
        `<div class="no-result">😢 找不到合適的組合，建議調整目標</div>`;
      return;
    }
    document.getElementById('res-target').textContent =
      `🎯 目標：${targetName}（還差 ${need} 分，接滿 ${remaining} 個任務）`;
    modeLabel = `接滿 ${remaining} 個任務`;
  }

  const top = combos.slice(0, 6);
  document.getElementById('res-combos').innerHTML = top.map((c, i) => {
    let taskDesc = '';
    if (c.b > 0) {
      // 高分放前面
      const [highScore, highCount, lowScore, lowCount] = c.b > c.a
        ? [c.b, c.cb, c.a, c.ca]
        : [c.a, c.ca, c.b, c.cb];
      taskDesc = `${highCount} 個 ${highScore} 分 + ${lowCount} 個 ${lowScore} 分`;
    } else {
      taskDesc = `${c.ca} 個 ${c.a} 分`;
    }

    const inRange = c.finalScore <= targetMax;
    const badge = inRange ? `達成 ${targetName}` : `超出範圍（${c.finalScore} 分）`;
    const badgeStyle = inRange ? '' : 'background:#fff3e0;color:#e65100;';

    return `<div class="combo-item">
      <div class="combo-rank">${i+1}</div>
      <div class="combo-detail">
        <div class="combo-tasks">接 ${taskDesc}</div>
        <div class="combo-score">共 +${c.total} 分 → 總分 ${c.finalScore} 分（${c.taskCount} 個任務）</div>
      </div>
      <div class="combo-badge" style="${badgeStyle}">${badge}</div>
    </div>`;
  }).join('');
}

// ── 初始化 ──
renderBonusButtons();
</script>
<script src="header.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>競賽戰績 - 璀璨</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌸</text></svg>" />
  <script src="config.js"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { font-family:'Segoe UI','Microsoft JhengHei',sans-serif; background:#fff8ef; color:#5b3b1d; min-height:100vh; }
    .container { width:100%; max-width:1200px; margin:0 auto; padding:0 20px; }

    /* Hero */
    .hero {
      background:linear-gradient(160deg,#ffe9b7,#fff7eb);
      padding:50px 0 40px; text-align:center;
      position:relative; overflow:hidden;
    }
    .hero::after {
      content:''; position:absolute; bottom:0; left:0; right:0; height:4px;
      background:linear-gradient(90deg,#c2510b,#e96a1e,#f4a46a,#e96a1e,#c2510b);
    }
    .hero h1 { font-size:2.4rem; color:#a35d00; margin-bottom:10px; }
    .hero p { font-size:1.05rem; color:#8a5e28; }
    .hero-nav { margin-top:18px; }
    .hero-nav a {
      display:inline-block; padding:10px 24px; border-radius:20px;
      background:linear-gradient(135deg,#e96a1e,#ff9d2f); color:#fff;
      text-decoration:none; font-weight:700; font-size:0.9rem;
      box-shadow:0 4px 16px rgba(233,106,30,.3); transition:transform .15s;
    }
    .hero-nav a:hover { transform:translateY(-2px); }

    /* Section */
    .section { padding:44px 0; }
    .section-title { font-size:1.6rem; color:#9a5400; margin-bottom:24px; font-weight:900; }

    /* Period Picker */
    .period-bar {
      display:flex; align-items:center; justify-content:center; gap:14px;
      margin-bottom:10px;
    }
    .period-bar label { font-size:0.95rem; font-weight:700; color:#a35d00; }
    .period-bar select {
      padding:10px 18px; border:2px solid #f4a46a; border-radius:12px;
      font-size:0.95rem; background:#fff; color:#5b3b1d; outline:none; cursor:pointer;
      transition:border-color .2s;
    }
    .period-bar select:focus { border-color:#e96a1e; }

    /* Summary Scroll */
    .summary-scroll {
      background:linear-gradient(160deg,#fff8ef,#ffe9b7);
      border-radius:24px; border:2px solid #f4a46a;
      box-shadow:0 8px 32px rgba(233,106,30,0.1);
      padding:36px 30px; text-align:center;
      position:relative; overflow:hidden;
    }
    .summary-scroll::before {
      content:''; position:absolute; top:0; left:0; right:0; height:5px;
      background:linear-gradient(90deg,#c2510b,#e96a1e,#f4a46a,#e96a1e,#c2510b);
      border-radius:24px 24px 0 0;
    }
    .scroll-title { font-size:1.4rem; font-weight:900; color:#a35d00; margin-bottom:18px; }
    .scroll-line { font-size:1rem; color:#5b3b1d; line-height:1.8; }
    .scroll-highlight { font-size:1.2rem; font-weight:900; color:#e96a1e; }
    .scroll-grade {
      margin-top:16px; display:inline-block;
      background:linear-gradient(135deg,#c2510b,#e96a1e);
      color:#fff; font-weight:900; font-size:1rem;
      padding:10px 28px; border-radius:24px;
      box-shadow:0 4px 16px rgba(233,106,30,.3);
    }

    /* KPI Stats */
    .kpi-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:18px; margin-bottom:10px; }
    .kpi-card {
      background:#fff; border-radius:20px; padding:24px 16px;
      text-align:center; box-shadow:0 5px 20px rgba(0,0,0,.06);
    }
    .kpi-value { font-size:2rem; font-weight:900; color:#5b3b1d; }
    .kpi-label { font-size:0.82rem; color:#a96c18; margin-top:6px; font-weight:600; }

    /* Title Chips */
    .title-chips { display:flex; gap:10px; flex-wrap:wrap; justify-content:center; }
    .title-chip {
      padding:7px 18px; border-radius:24px; font-size:0.85rem; font-weight:700; cursor:pointer;
      transition:transform .15s, box-shadow .15s;
    }
    .title-chip:hover { transform:translateY(-2px); box-shadow:0 4px 12px rgba(0,0,0,.12); }
    .tc-王者花匠 { background:linear-gradient(135deg,#e96a1e,#ff4e8a); color:#fff; }
    .tc-大師花匠 { background:linear-gradient(135deg,#9b59b6,#c39bd3); color:#fff; }
    .tc-黃金花匠 { background:linear-gradient(135deg,#f4c430,#ffd700); color:#5a4000; }
    .tc-白銀花匠 { background:linear-gradient(135deg,#9e9e9e,#d4d4d4); color:#fff; }
    .tc-青銅花匠 { background:linear-gradient(135deg,#cd7f32,#e8a96a); color:#fff; }
    .tc-無稱號 { background:#f0f0f0; color:#888; }

    /* Ranking Box */
    .ranking-box {
      background:#fff; border-radius:24px; padding:0;
      box-shadow:0 5px 20px rgba(0,0,0,.06); overflow:hidden;
    }
    .ranking-header {
      background:linear-gradient(135deg,#c2510b,#e96a1e); color:#fff;
      padding:18px 28px; font-size:1.05rem; font-weight:800;
    }
    .rank-list { padding:0; }
    .rank-item {
      display:flex; align-items:center; gap:14px;
      padding:14px 28px; border-bottom:1px solid #f5ebe0;
      transition:background .15s;
    }
    .rank-item:last-child { border-bottom:none; }
    .rank-item:hover { background:#fff8ef; }
    .rank-num {
      width:34px; height:34px; border-radius:50%;
      display:flex; align-items:center; justify-content:center;
      font-size:0.85rem; font-weight:800; flex-shrink:0;
    }
    .rn-1 { background:linear-gradient(135deg,#f4c430,#ffd700); color:#5a4000; }
    .rn-2 { background:linear-gradient(135deg,#bdbdbd,#e0e0e0); color:#555; }
    .rn-3 { background:linear-gradient(135deg,#cd7f32,#e8a96a); color:#fff; }
    .rn-default { background:#fff3e0; color:#a35d00; }
    .rank-info { flex:1; min-width:0; }
    .rank-name { font-size:0.95rem; font-weight:700; color:#5b3b1d; }
    .rank-role { font-size:0.72rem; padding:2px 8px; border-radius:8px; margin-left:8px; font-weight:600; }
    .role-會長 { background:linear-gradient(135deg,#ff4e8a,#ff8c42); color:#fff; }
    .role-副會長 { background:linear-gradient(135deg,#ff8c00,#ffb347); color:#fff; }
    .role-理事 { background:linear-gradient(135deg,#9b59b6,#c39bd3); color:#fff; }
    .role-菁英 { background:linear-gradient(135deg,#4a90d9,#74b9ff); color:#fff; }
    .role-成員 { background:#e8f5e9; color:#2e7d32; }
    .rank-server { font-size:0.72rem; color:#a96c18; margin-top:2px; }
    .rank-score { font-size:1.1rem; font-weight:900; color:#e96a1e; flex-shrink:0; }

    /* Title Divider */
    .rank-title-divider {
      padding:10px 28px; background:linear-gradient(90deg,#fff8ef,#ffe9b7);
      font-size:0.88rem; font-weight:800; color:#a35d00;
      border-bottom:1px solid #f5ebe0; scroll-margin-top:80px;
    }

    /* Loading / Empty */
    .loading { text-align:center; padding:50px; color:#a96c18; font-size:1rem; }
    .empty-state { text-align:center; padding:50px; color:#a96c18; font-size:1rem; }

    @media(max-width:768px) {
      .kpi-grid { grid-template-columns:1fr 1fr 1fr; gap:10px; }
      .kpi-value { font-size:1.4rem; }
      .hero h1 { font-size:1.7rem; }
      .rank-item { padding:12px 18px; }
      .title-chips { overflow-x:auto; flex-wrap:nowrap; justify-content:flex-start; padding-bottom:4px; }
    }
    @media(max-width:480px) {
      .kpi-grid { grid-template-columns:1fr; }
      .summary-scroll { padding:24px 16px; }
    }
  </style>
</head>
<body>
<div id="site-header"></div>

<!-- Hero -->
<section class="hero">
  <div class="container">
    <h1>🏆 競賽戰績</h1>
    <p>查看每期公會競賽成績</p>
    <div class="hero-nav">
      <a href="contest-dashboard-v2.html">← 返回儀表板</a>
    </div>
  </div>
</section>

<!-- 期數選擇 -->
<section class="section" style="padding-bottom:0;">
  <div class="container">
    <div class="period-bar">
      <label>期數：</label>
      <select id="periodPicker" onchange="loadPeriod()">
        <option value="">載入中...</option>
      </select>
    </div>
  </div>
</section>

<!-- 總結卡片 -->
<section class="section" id="summarySection" style="display:none;">
  <div class="container">
    <div class="summary-scroll">
      <div class="scroll-title">🏆 競賽結果</div>
      <div class="scroll-line">在 <span class="scroll-highlight" id="hMembers">-</span> 名公會成員的共同努力下</div>
      <div class="scroll-line">總獲得 <span class="scroll-highlight" id="hTotal">-</span> 積分</div>
      <div class="scroll-line">位列 <span class="scroll-highlight" id="hRank">-</span></div>
      <div><span class="scroll-grade" id="hGrade">-</span></div>
    </div>
  </div>
</section>

<!-- 統計 KPI -->
<section class="section" id="statsSection" style="display:none;padding-top:0;">
  <div class="container">
    <div class="kpi-grid">
      <div class="kpi-card"><div class="kpi-value" id="statTotal">-</div><div class="kpi-label">公會總分</div></div>
      <div class="kpi-card"><div class="kpi-value" id="statCount">-</div><div class="kpi-label">參賽人數</div></div>
      <div class="kpi-card"><div class="kpi-value" id="statAvg">-</div><div class="kpi-label">平均分數</div></div>
    </div>
  </div>
</section>

<!-- 稱號分布 -->
<section class="section" id="titleSection" style="display:none;padding-top:0;padding-bottom:20px;">
  <div class="container">
    <div class="title-chips" id="titleDist"></div>
  </div>
</section>

<!-- 排名列表 -->
<section class="section" id="rankSection" style="display:none;padding-top:0;">
  <div class="container">
    <div class="ranking-box">
      <div class="ranking-header">📋 成員排名</div>
      <div class="rank-list" id="rankList"></div>
    </div>
  </div>
</section>

<div class="loading" id="loadingState">載入中...</div>
<div class="empty-state" id="emptyState" style="display:none;">尚無競賽資料</div>

<script>
let allData = [];
let periods = [];
let summaryData = [];

async function init() {
  try {
    const res = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/contest!A1:G?key=${API_KEY}`);
    if (!res.ok) throw new Error('讀取失敗');
    const data = await res.json();
    const rows = (data.values || []);
    if (rows.length <= 1) { showEmpty(); return; }

    allData = rows.slice(1).map(r => ({
      period: r[0] || '', server: r[1] || '', nickname: r[2] || '',
      role: r[3] || '', score: Number(r[4]) || 0, title: r[5] || ''
    }));

    try {
      const sRes = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/contest_summary!A1:F?key=${API_KEY}`);
      if (sRes.ok) {
        const sData = await sRes.json();
        const sRows = (sData.values || []).slice(1);
        summaryData = sRows.map(r => ({
          period: r[0] || '', members: r[1] || '', total: r[2] || '',
          rank: r[3] || '', grade: r[4] || ''
        }));
      }
    } catch(e) {}

    periods = [...new Set(allData.map(d => d.period))].sort().reverse();
    const sel = document.getElementById('periodPicker');
    sel.innerHTML = periods.map(p => `<option value="${p}">${p}</option>`).join('');

    document.getElementById('loadingState').style.display = 'none';

    const urlParams = new URLSearchParams(location.search);
    const urlPeriod = urlParams.get('period');
    if (urlPeriod && periods.includes(urlPeriod)) {
      sel.value = urlPeriod;
    }

    loadPeriod();
  } catch(e) {
    document.getElementById('loadingState').textContent = '⚠️ ' + e.message;
  }
}

function loadPeriod() {
  const period = document.getElementById('periodPicker').value;
  if (!period) return;

  const url = new URL(location.href);
  url.searchParams.set('period', period);
  history.replaceState(null, '', url);

  const data = allData.filter(d => d.period === period).sort((a, b) => b.score - a.score);
  if (!data.length) { showEmpty(); return; }

  // 總結
  const summary = summaryData.find(s => s.period === period);
  const summarySection = document.getElementById('summarySection');
  if (summary) {
    summarySection.style.display = '';
    document.getElementById('hMembers').textContent = summary.members;
    document.getElementById('hTotal').textContent = Number(summary.total).toLocaleString();
    document.getElementById('hRank').textContent = summary.rank;
    document.getElementById('hGrade').textContent = summary.grade;
  } else {
    summarySection.style.display = 'none';
  }

  // 統計
  const total = data.reduce((s, d) => s + d.score, 0);
  const count = data.length;
  const avg = Math.round(total / count);

  document.getElementById('statTotal').textContent = total.toLocaleString();
  document.getElementById('statCount').textContent = count + ' 人';
  document.getElementById('statAvg').textContent = avg.toLocaleString();
  document.getElementById('statsSection').style.display = '';

  // 稱號分布
  const TITLES = ['王者花匠','大師花匠','黃金花匠','白銀花匠','青銅花匠','無稱號'];
  const titleCounts = {}; TITLES.forEach(t => titleCounts[t] = 0);
  data.forEach(d => { if (titleCounts[d.title] !== undefined) titleCounts[d.title]++; });

  document.getElementById('titleSection').style.display = '';
  document.getElementById('titleDist').innerHTML = TITLES
    .filter(t => titleCounts[t] > 0)
    .map(t => `<span class="title-chip tc-${t}" onclick="scrollToTitle('${t}')">${t} ${titleCounts[t]} 人</span>`)
    .join('');

  // 排名列表
  document.getElementById('rankSection').style.display = '';
  let lastTitle = '';
  document.getElementById('rankList').innerHTML = data.map((d, i) => {
    let divider = '';
    if (d.title && d.title !== lastTitle) {
      lastTitle = d.title;
      divider = `<div class="rank-title-divider" id="title-${d.title}">🏅 ${d.title}</div>`;
    }
    const rnCls = i===0?'rn-1':i===1?'rn-2':i===2?'rn-3':'rn-default';
    const roleCls = d.role ? `role-${d.role}` : '';
    return divider + `<div class="rank-item">
      <div class="rank-num ${rnCls}">${i + 1}</div>
      <div class="rank-info">
        <div class="rank-name">${d.nickname}<span class="rank-role ${roleCls}">${d.role}</span></div>
        <div class="rank-server">${d.server}</div>
      </div>
      <div class="rank-score">${d.score.toLocaleString()}</div>
    </div>`;
  }).join('');

  document.getElementById('emptyState').style.display = 'none';
}

function scrollToTitle(title) {
  const el = document.getElementById('title-' + title);
  if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function showEmpty() {
  document.getElementById('loadingState').style.display = 'none';
  document.getElementById('summarySection').style.display = 'none';
  document.getElementById('statsSection').style.display = 'none';
  document.getElementById('titleSection').style.display = 'none';
  document.getElementById('rankSection').style.display = 'none';
  document.getElementById('emptyState').style.display = '';
}

init();
</script>
<script src="header.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>[璀璨] Admin 編輯器</title>
  <script src="flowers.js?v=3"></script>
  <script src="members.js?v=3"></script>
  <script>
  // ════════════════════════════════════════════
  //  GitHub 設定區 — 只在本機使用，勿上傳
  // ════════════════════════════════════════════
  const GITHUB_CONFIG = {
    owner:  'yoyochen088',
    repo:   'Garden400117',
    branch: 'main',
    flowersPath: 'flowers.js',
    membersPath: 'members.js'
  };
  </script>
  <style>
    :root {
      --pink:#e96a1e; --pink-light:#fef0e7; --pink-mid:#f4a46a;
      --pink-dark:#c2510b; --bg:#fff8f5; --border:#f8d5b0;
      --radius:10px; --shadow:0 2px 10px rgba(233,106,30,0.10);
    }
    * { box-sizing:border-box; margin:0; padding:0; }
    body { font-family:'Microsoft JhengHei',sans-serif; background:var(--bg); color:#3d1a2e; padding:24px 16px 140px; }
    h1 { text-align:center; color:var(--pink-dark); font-size:1.3rem; margin-bottom:4px; }
    .subtitle { text-align:center; color:#9e6b7e; font-size:0.85rem; margin-bottom:20px; }
    .admin-badge { display:inline-block; background:var(--pink); color:#fff; border-radius:8px; padding:2px 10px; font-size:0.78rem; font-weight:700; margin-left:8px; vertical-align:middle; }

    .section { background:#fff; border-radius:var(--radius); border:1px solid var(--border); box-shadow:var(--shadow); padding:18px 20px; margin-bottom:16px; }
    .section h2 { font-size:1rem; color:var(--pink-dark); margin-bottom:12px; }

    textarea {
      width:100%; font-family:monospace; font-size:0.82rem;
      border:1.5px solid var(--border); border-radius:8px; padding:10px;
      resize:vertical; outline:none; color:#3d1a2e; background:var(--bg);
    }
    textarea:focus { border-color:var(--pink); }

    .btn { padding:9px 18px; border-radius:8px; font-size:0.9rem; font-weight:600; cursor:pointer; border:none; transition:opacity 0.2s; }
    .btn:hover { opacity:0.85; }
    .btn:disabled { opacity:0.5; cursor:not-allowed; }
    .btn-primary { background:var(--pink); color:#fff; }
    .btn-secondary { background:var(--pink-light); color:var(--pink-dark); border:1.5px solid var(--pink-mid); }
    .btn-green { background:#e8f5e9; color:#2e7d32; border:1.5px solid #a5d6a7; }

    .btn-row { display:flex; gap:10px; flex-wrap:wrap; margin-top:12px; }

    .diff-item { background:var(--bg); border:1px solid var(--border); border-radius:8px; padding:10px 12px; margin-bottom:8px; }
    .diff-item .diff-label { font-size:0.82rem; font-weight:700; color:var(--pink-dark); margin-bottom:6px; }
    .diff-item .diff-preview { font-size:0.78rem; color:#666; font-family:monospace; white-space:pre-wrap; max-height:80px; overflow:hidden; }

    .status { padding:10px 14px; border-radius:8px; font-size:0.88rem; font-weight:600; margin-top:10px; display:none; }
    .status.ok { background:#e8f5e9; color:#2e7d32; display:block; }
    .status.err { background:#fce4ec; color:#c2185b; display:block; }
    .status.info { background:#e3f2fd; color:#1565c0; display:block; }

    .bottom-bar {
      position:fixed; bottom:0; left:0; right:0; background:#fff;
      border-top:1px solid var(--border); padding:10px 12px;
      display:flex; gap:8px; justify-content:center; flex-wrap:wrap;
      box-shadow:0 -2px 10px rgba(233,30,140,0.08);
    }
  </style>
</head>
<body>

<h1>🌸 [璀璨] Admin 編輯器 <span class="admin-badge">ADMIN</span></h1>
<p class="subtitle">本機專用，勿上傳到 GitHub</p>

<!-- ══ 貼入差異資料 ══ -->
<div class="section">
  <h2>📥 貼入差異資料</h2>
  <p style="font-size:0.85rem;color:#9e6b7e;margin-bottom:10px;">將成員傳來的資料逐段貼入，可貼多段，系統會自動合併。</p>

  <textarea id="pasteInput" rows="6" placeholder='貼入差異資料（members 或 flowers 陣列）...'></textarea>
  <div class="btn-row">
    <button class="btn btn-secondary" onclick="parsePaste()">✅ 解析並加入佇列</button>
    <button class="btn btn-secondary" onclick="clearQueue()">🗑 清空佇列</button>
  </div>

  <div id="queueList" style="margin-top:12px;"></div>
  <div id="parseStatus" class="status"></div>
</div>

<!-- ══ 預覽合併結果 ══ -->
<div class="section">
  <h2>👁 預覽合併結果</h2>
  <div id="previewArea" style="font-size:0.85rem;color:#9e6b7e;">尚未解析任何資料</div>
</div>

<!-- ══ 推送 ══ -->
<div class="section">
  <h2>☁️ 推送到 GitHub</h2>
  <p style="font-size:0.85rem;color:#9e6b7e;margin-bottom:10px;">確認預覽無誤後推送，Render 約 1 分鐘後自動更新。</p>
  <div class="btn-row">
    <button class="btn btn-primary" id="pushBtn" onclick="pushToGitHub()">☁️ 推送到 GitHub</button>
    <button class="btn btn-secondary" id="downloadBtn" onclick="downloadCurrent()" style="display:none;">💾 下載本機備份</button>
  </div>
  <div id="pushStatus" class="status"></div>
</div>

<div class="bottom-bar">
  <button class="btn btn-secondary" onclick="location.reload()">🔄 重新載入</button>
</div>

<script>
// ── 佇列：收集所有貼入的差異資料 ──
let queue = []; // [{ type: 'members'|'flowers', data: [...] }]

// 目前完整資料（從 flowers.js / members.js 載入）
let currentFlowers = JSON.parse(JSON.stringify(window.FLOWERS || []));
let currentMembers = JSON.parse(JSON.stringify(window.MEMBERS || []));

function parsePaste() {
  const raw = document.getElementById('pasteInput').value.trim();
  const status = document.getElementById('parseStatus');
  if (!raw) { showStatus(status, '請先貼入資料', 'err'); return; }

  try {
    let parsed;
    // 支援 window.MEMBERS = [...]; 或 window.FLOWERS = [...]; 或純 JSON 陣列
    if (raw.startsWith('window.MEMBERS')) {
      const match = raw.match(/window\.MEMBERS\s*=\s*(\[[\s\S]*\]);?/);
      parsed = { type: 'members', data: JSON.parse(match[1]) };
    } else if (raw.startsWith('window.FLOWERS')) {
      const match = raw.match(/window\.FLOWERS\s*=\s*(\[[\s\S]*\]);?/);
      parsed = { type: 'flowers_full', data: JSON.parse(match[1]) };
    } else {
      // 純 JSON 陣列 → 判斷是 members 還是 flowers 差異
      const arr = JSON.parse(raw);
      if (!Array.isArray(arr)) throw new Error('不是陣列格式');
      // 有 gameId 欄位 → members；有 quality 欄位 → flowers diff
      if (arr[0]?.gameId !== undefined) {
        // 有 _removed 欄位 → members diff；否則也是 members diff（新增/修改）
        parsed = { type: 'members_diff', data: arr };
      } else {
        parsed = { type: 'flowers_diff', data: arr };
      }
    }

    queue.push(parsed);
    document.getElementById('pasteInput').value = '';
    showStatus(status, `✅ 已加入佇列（${parsed.type}，${parsed.data.length} 筆）`, 'ok');
    renderQueue();
    renderPreview();
  } catch(e) {
    showStatus(status, '❌ 解析失敗：' + e.message, 'err');
  }
}

function renderQueue() {
  const el = document.getElementById('queueList');
  if (queue.length === 0) { el.innerHTML = ''; return; }
  el.innerHTML = queue.map((q, i) => `
    <div class="diff-item">
      <div class="diff-label">[${i+1}] ${q.type} — ${q.data.length} 筆
        <button onclick="removeQueue(${i})" style="margin-left:8px;background:#fce4ec;color:#c2185b;border:none;border-radius:6px;padding:1px 8px;cursor:pointer;font-size:0.75rem;">移除</button>
      </div>
      <div class="diff-preview">${JSON.stringify(q.data[0]).substring(0,120)}...</div>
    </div>`).join('');
}

function removeQueue(i) {
  queue.splice(i, 1);
  renderQueue();
  renderPreview();
}

function clearQueue() {
  queue = [];
  renderQueue();
  renderPreview();
  document.getElementById('parseStatus').style.display = 'none';
}

function getMerged() {
  let mergedFlowers = JSON.parse(JSON.stringify(currentFlowers));
  let mergedMembers = JSON.parse(JSON.stringify(currentMembers));

  queue.forEach(q => {
    if (q.type === 'members') {
      mergedMembers = q.data;
    } else if (q.type === 'members_diff') {
      // members 差異合併：用 gameId 找對應，更新或新增；_removed 的移除
      q.data.forEach(diff => {
        if (diff._removed) {
          mergedMembers = mergedMembers.filter(m => m.gameId !== diff.gameId);
        } else {
          const idx = mergedMembers.findIndex(m => m.gameId === diff.gameId);
          const { _removed, ...clean } = diff;
          if (idx >= 0) mergedMembers[idx] = { ...mergedMembers[idx], ...clean };
          else mergedMembers.push(clean);
        }
      });
    } else if (q.type === 'flowers_full') {
      mergedFlowers = q.data;
    } else if (q.type === 'flowers_diff') {
      // 差異合併：用 id 找到對應的花，更新 owners
      q.data.forEach(diff => {
        const idx = mergedFlowers.findIndex(f => f.id === diff.id);
        if (idx >= 0) mergedFlowers[idx] = { ...mergedFlowers[idx], ...diff };
        else mergedFlowers.push(diff);
      });
    }
  });

  return { mergedFlowers, mergedMembers };
}

function renderPreview() {
  const el = document.getElementById('previewArea');
  if (queue.length === 0) {
    el.innerHTML = '<span style="color:#9e6b7e;">尚未解析任何資料</span>';
    return;
  }
  const { mergedFlowers, mergedMembers } = getMerged();

  // flowers 變動
  const changedFlowers = mergedFlowers.filter(f => {
    const orig = currentFlowers.find(o => o.id === f.id);
    return !orig || JSON.stringify([...f.owners].sort()) !== JSON.stringify([...(orig.owners||[])].sort());
  });

  // members 變動
  const origMemberMap = {};
  currentMembers.forEach(m => { origMemberMap[m.gameId] = m; });
  const changedMembers = mergedMembers.filter(m => {
    const orig = origMemberMap[m.gameId];
    return !orig || JSON.stringify(orig) !== JSON.stringify(m);
  });
  const currentGameIds = new Set(mergedMembers.map(m => m.gameId));
  const removedMembers = currentMembers.filter(m => !currentGameIds.has(m.gameId));

  let html = '';

  if (changedMembers.length > 0 || removedMembers.length > 0) {
    html += `<div style="margin-bottom:12px;">
      <div style="font-weight:700;color:var(--pink-dark);margin-bottom:6px;">👥 members 變動</div>
      <ul style="padding-left:16px;font-size:0.85rem;line-height:1.8;">
        ${changedMembers.map(m => {
          const orig = origMemberMap[m.gameId];
          return orig
            ? `<li>✏️ ${m.nickname}（${m.gameId}）${orig.nickname !== m.nickname ? `暱稱: ${orig.nickname} → ${m.nickname}` : ''} ${orig.note !== m.note ? `職位: ${orig.note} → ${m.note}` : ''} ${m.left && !orig.left ? '【標記離開】' : ''}</li>`
            : `<li>➕ 新增：${m.nickname}（${m.gameId}）</li>`;
        }).join('')}
        ${removedMembers.map(m => `<li>❌ 刪除：${m.nickname}（${m.gameId}）</li>`).join('')}
      </ul>
    </div>`;
  } else {
    html += `<div style="color:#9e6b7e;margin-bottom:8px;">👥 members 無變動</div>`;
  }

  if (changedFlowers.length > 0) {
    html += `<div>
      <div style="font-weight:700;color:var(--pink-dark);margin-bottom:6px;">🌸 flowers 變動（${changedFlowers.length} 筆）</div>
      <ul style="padding-left:16px;font-size:0.85rem;line-height:1.8;">
        ${changedFlowers.map(f => {
          const orig = currentFlowers.find(o => o.id === f.id);
          const added = f.owners.filter(o => !(orig?.owners||[]).includes(o));
          const removed = (orig?.owners||[]).filter(o => !f.owners.includes(o));
          return `<li>${f.name}
            ${added.length ? `<span style="color:#2e7d32;">+${added.join(', ')}</span>` : ''}
            ${removed.length ? `<span style="color:#c2185b;"> -${removed.join(', ')}</span>` : ''}
          </li>`;
        }).join('')}
      </ul>
    </div>`;
  } else {
    html += `<div style="color:#9e6b7e;">🌸 flowers 無變動</div>`;
  }

  el.innerHTML = html;
}

// ── GitHub 推送 ──
async function pushToGitHub() {
  const token = prompt('請輸入 GitHub Personal Access Token：');
  if (!token || !token.trim()) {
    showStatus(document.getElementById('pushStatus'), '已取消或未輸入 Token', 'err');
    return;
  }
  GITHUB_CONFIG.token = token.trim();
  if (queue.length === 0) {
    showStatus(document.getElementById('pushStatus'), '佇列是空的，請先貼入差異資料', 'err');
    return;
  }

  const { mergedFlowers, mergedMembers } = getMerged();
  const btn = document.getElementById('pushBtn');
  btn.textContent = '⏳ 推送中...';
  btn.disabled = true;

  try {
    await githubPutFile(
      GITHUB_CONFIG.flowersPath,
      `window.FLOWERS = ${JSON.stringify(mergedFlowers, null, 2)};\n`,
      'update flowers.js via admin'
    );
    await githubPutFile(
      GITHUB_CONFIG.membersPath,
      `window.MEMBERS = ${JSON.stringify(mergedMembers, null, 2)};\n`,
      'update members.js via admin'
    );
    showStatus(document.getElementById('pushStatus'), '✅ 推送成功！Render 約 1 分鐘後自動更新。', 'ok');
    // 本機環境才自動下載
    if (window.location.protocol === 'file:') {
      downloadFile('flowers.js', `window.FLOWERS = ${JSON.stringify(mergedFlowers, null, 2)};\n`);
      downloadFile('members.js', `window.MEMBERS = ${JSON.stringify(mergedMembers, null, 2)};\n`);
    }
    queue = [];
    renderQueue();
  } catch(e) {
    showStatus(document.getElementById('pushStatus'), '❌ 推送失敗：' + e.message, 'err');
  } finally {
    btn.textContent = '☁️ 推送到 GitHub';
    btn.disabled = false;
  }
}

async function githubPutFile(path, content, message) {
  const { token, owner, repo, branch } = GITHUB_CONFIG;
  const apiUrl = `https://api.github.com/repos/${owner}/${repo}/contents/${encodeURIComponent(path)}`;
  const getRes = await fetch(apiUrl, {
    headers: { Authorization: `token ${token}`, Accept: 'application/vnd.github.v3+json' }
  });
  let sha;
  if (getRes.ok) sha = (await getRes.json()).sha;

  const body = { message, content: btoa(unescape(encodeURIComponent(content))), branch };
  if (sha) body.sha = sha;

  const putRes = await fetch(apiUrl, {
    method: 'PUT',
    headers: { Authorization: `token ${token}`, Accept: 'application/vnd.github.v3+json', 'Content-Type': 'application/json' },
    body: JSON.stringify(body)
  });
  if (!putRes.ok) { const e = await putRes.json(); throw new Error(e.message || putRes.statusText); }
}

// 本機環境才顯示下載按鈕
if (window.location.protocol === 'file:') {
  document.getElementById('downloadBtn').style.display = 'inline-block';
}

function downloadCurrent() {
  const { mergedFlowers, mergedMembers } = queue.length > 0 ? getMerged() : { mergedFlowers: currentFlowers, mergedMembers: currentMembers };
  downloadFile('flowers.js', `window.FLOWERS = ${JSON.stringify(mergedFlowers, null, 2)};\n`);
  downloadFile('members.js', `window.MEMBERS = ${JSON.stringify(mergedMembers, null, 2)};\n`);
}

function showStatus(el, msg, type) {
  el.textContent = msg;
  el.className = 'status ' + type;
}

function downloadFile(filename, content) {
  const a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([content], { type: 'text/javascript' }));
  a.download = filename;
  a.click();
  URL.revokeObjectURL(a.href);
}
</script>
</body>
</html>

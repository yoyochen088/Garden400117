<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>競賽攻略 - 璀璨</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌸</text></svg>" />
  <style>
    :root {
      --pink:#e96a1e; --pink-light:#fef0e7; --pink-mid:#f4a46a;
      --pink-dark:#c2510b; --bg:#fff8f5; --card-bg:#ffffff;
      --text:#3d1a2e; --text-muted:#9e6b7e; --border:#f8d5b0;
      --shadow:0 2px 12px rgba(233,106,30,0.10); --radius:14px;
    }
    * { box-sizing:border-box; margin:0; padding:0; }
    body { font-family:'Segoe UI','Microsoft JhengHei',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; padding-bottom:40px; }

    /* ── Header ── */
    header { background:linear-gradient(135deg,#c2510b 0%,#e96a1e 60%,#f4a46a 100%); color:#fff; padding:0 20px; display:flex; align-items:center; justify-content:space-between; height:60px; position:sticky; top:0; z-index:100; box-shadow:0 2px 8px rgba(194,81,11,0.3); }
    .guild-name { font-size:1.25rem; font-weight:700; letter-spacing:2px; white-space:nowrap; }
    .guild-name small { font-weight:400; opacity:0.8; font-size:0.7rem; }
    a.guild-name { text-decoration:none; color:inherit; cursor:pointer; }
    nav { display:flex; gap:8px; }
    nav a { color:#fff; text-decoration:none; padding:6px 14px; border-radius:20px; font-size:0.9rem; font-weight:600; transition:background 0.2s; border:1.5px solid rgba(255,255,255,0.5); }
    nav a:hover, nav a.active { background:rgba(255,255,255,0.25); }

    /* ── 漢堡選單 ── */
    .hamburger { display:none; flex-direction:column; gap:5px; cursor:pointer; padding:6px; background:none; border:none; }
    .hamburger span { display:block; width:22px; height:2px; background:#fff; border-radius:2px; transition:all 0.3s; }
    .hamburger.open span:nth-child(1) { transform:translateY(7px) rotate(45deg); }
    .hamburger.open span:nth-child(2) { opacity:0; }
    .hamburger.open span:nth-child(3) { transform:translateY(-7px) rotate(-45deg); }
    #nav-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,0.4); z-index:150; }
    #nav-overlay.show { display:block; }
    #mobile-nav { position:fixed; top:0; right:-260px; width:240px; height:100vh; background:linear-gradient(160deg,#c2510b,#e96a1e); z-index:200; padding:70px 20px 30px; display:flex; flex-direction:column; gap:8px; transition:right 0.3s cubic-bezier(0.4,0,0.2,1); box-shadow:-4px 0 20px rgba(0,0,0,0.2); }
    #mobile-nav.open { right:0; }
    #mobile-nav a { color:#fff; text-decoration:none; padding:12px 16px; border-radius:12px; font-size:1rem; font-weight:600; border:1.5px solid rgba(255,255,255,0.3); transition:background 0.2s; display:flex; align-items:center; gap:10px; }
    #mobile-nav a:hover, #mobile-nav a.active { background:rgba(255,255,255,0.2); }
    #mobile-nav .nav-close { position:absolute; top:16px; right:16px; background:none; border:none; color:#fff; font-size:1.5rem; cursor:pointer; }

    @media(max-width:600px) {
      .guild-name { font-size:1rem; }
      nav { display:none; }
      .hamburger { display:flex; }
    }

    /* ── 主內容 ── */
    main { max-width:900px; margin:0 auto; padding:24px 16px; }
    h1 { text-align:center; color:var(--pink-dark); font-size:1.3rem; margin-bottom:4px; }
    .subtitle { text-align:center; color:var(--text-muted); font-size:0.85rem; margin-bottom:28px; }

    /* ── 圖片排版 ── */
    .guide-grid {
      display:grid;
      grid-template-columns: repeat(2, 1fr);
      gap:16px;
    }
    .guide-item {
      background:var(--card-bg);
      border-radius:var(--radius);
      border:1px solid var(--border);
      box-shadow:var(--shadow);
      overflow:hidden;
      cursor:zoom-in;
      transition:box-shadow 0.2s, transform 0.2s;
    }
    .guide-item:hover {
      box-shadow:0 6px 24px rgba(233,106,30,0.2);
      transform:translateY(-2px);
    }
    .guide-item img {
      width:100%;
      height:auto;
      display:block;
    }

    @media(max-width:600px) {
      .guide-grid { grid-template-columns:1fr; gap:12px; }
    }

    /* ── Lightbox ── */
    #lightbox {
      display:none; position:fixed; inset:0;
      background:rgba(0,0,0,0.9); z-index:999;
      align-items:center; justify-content:center;
    }
    #lightbox.open { display:flex; }
    #lightbox img {
      max-width:95vw; max-height:92vh;
      object-fit:contain; border-radius:8px;
      box-shadow:0 8px 40px rgba(0,0,0,0.5);
    }
    #lightbox-close {
      position:absolute; top:16px; right:20px;
      color:#fff; font-size:2rem; cursor:pointer;
      background:none; border:none; opacity:0.8;
      transition:opacity 0.2s;
    }
    #lightbox-close:hover { opacity:1; }
    #lightbox-prev, #lightbox-next {
      position:absolute; top:50%; transform:translateY(-50%);
      background:rgba(0,0,0,0.4); border:1.5px solid rgba(255,255,255,0.3);
      color:#fff; font-size:1.8rem; cursor:pointer;
      width:44px; height:44px; border-radius:50%;
      display:flex; align-items:center; justify-content:center;
      transition:background 0.2s; user-select:none;
    }
    #lightbox-prev { left:12px; }
    #lightbox-next { right:12px; }
    #lightbox-prev:hover, #lightbox-next:hover { background:rgba(0,0,0,0.65); }
    #lightbox-counter {
      position:absolute; bottom:16px; left:50%; transform:translateX(-50%);
      color:rgba(255,255,255,0.7); font-size:0.85rem;
    }
  </style>
</head>
<body>

<header>
  <a href="index.html" class="guild-name" style="text-decoration:none;color:inherit;">璀璨 <small>[400117]</small></a>
  <nav>
    <a href="index.html">花卉圖鑑</a>
    <a href="index.html#id-page">公會成員</a>
    <a href="flower-showcase.html">個人花展</a>
    <a href="member-editor.html">花卉擁有</a>
    <a href="contest.html">競賽算分</a>
    <a href="guide.html" class="active">競賽攻略</a>
    <a href="editor.html">管理</a>
  </nav>
  <button class="hamburger" id="hamburger" onclick="toggleMobileNav()" aria-label="選單">
    <span></span><span></span><span></span>
  </button>
</header>

<div id="nav-overlay" onclick="closeMobileNav()"></div>
<div id="mobile-nav">
  <button class="nav-close" onclick="closeMobileNav()">✕</button>
  <a href="index.html">🌸 花卉圖鑑</a>
  <a href="index.html#id-page">👥 公會成員</a>
  <a href="flower-showcase.html">🖼️ 個人花展</a>
  <a href="member-editor.html">✅ 花卉擁有</a>
  <a href="contest.html">🏆 競賽算分</a>
  <a href="guide.html" class="active">📖 競賽攻略</a>
  <a href="editor.html">⚙️ 管理</a>
</div>

<main>
  <h1>📖 競賽攻略</h1>
  <p class="subtitle">點擊圖片可放大查看</p>

  <div class="guide-grid">
    <div class="guide-item" onclick="openLightbox(0)">
      <img src="Context/1.png" alt="攻略 1" loading="lazy" />
    </div>
    <div class="guide-item" onclick="openLightbox(1)">
      <img src="Context/2.png" alt="攻略 2" loading="lazy" />
    </div>
    <div class="guide-item" onclick="openLightbox(2)">
      <img src="Context/3.png" alt="攻略 3" loading="lazy" />
    </div>
    <div class="guide-item" onclick="openLightbox(3)">
      <img src="Context/4.png" alt="攻略 4" loading="lazy" />
    </div>
    <div class="guide-item" onclick="openLightbox(4)">
      <img src="Context/5.png" alt="攻略 5" loading="lazy" />
    </div>
    <div class="guide-item" onclick="openLightbox(5)">
      <img src="Context/6.png" alt="攻略 6" loading="lazy" />
    </div>
  </div>
</main>

<!-- Lightbox -->
<div id="lightbox" onclick="closeLightbox()">
  <button id="lightbox-close" onclick="closeLightbox()">✕</button>
  <button id="lightbox-prev" onclick="event.stopPropagation();moveLightbox(-1)">&#8249;</button>
  <img id="lightbox-img" src="" alt="" onclick="event.stopPropagation()" />
  <button id="lightbox-next" onclick="event.stopPropagation();moveLightbox(1)">&#8250;</button>
  <div id="lightbox-counter"></div>
</div>

<script>
const IMAGES = [
  'Context/1.png','Context/2.png','Context/3.png',
  'Context/4.png','Context/5.png','Context/6.png'
];
let currentIdx = 0;

function openLightbox(idx) {
  currentIdx = idx;
  updateLightbox();
  document.getElementById('lightbox').classList.add('open');
}
function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
}
function moveLightbox(dir) {
  currentIdx = (currentIdx + dir + IMAGES.length) % IMAGES.length;
  updateLightbox();
}
function updateLightbox() {
  document.getElementById('lightbox-img').src = IMAGES[currentIdx];
  document.getElementById('lightbox-counter').textContent = `${currentIdx + 1} / ${IMAGES.length}`;
}

document.addEventListener('keydown', e => {
  if (!document.getElementById('lightbox').classList.contains('open')) return;
  if (e.key === 'ArrowLeft')  moveLightbox(-1);
  if (e.key === 'ArrowRight') moveLightbox(1);
  if (e.key === 'Escape')     closeLightbox();
});

function toggleMobileNav() {
  document.getElementById('mobile-nav').classList.toggle('open');
  document.getElementById('nav-overlay').classList.toggle('show');
  document.getElementById('hamburger').classList.toggle('open');
}
function closeMobileNav() {
  document.getElementById('mobile-nav').classList.remove('open');
  document.getElementById('nav-overlay').classList.remove('show');
  document.getElementById('hamburger').classList.remove('open');
}
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>個人資料 - 璀璨</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌸</text></svg>" />
  <style>
    :root {
      --orange:#e96a1e; --orange-light:#fef0e7; --orange-mid:#f4a46a;
      --orange-dark:#c2510b; --bg:#fff8f5; --border:#f8d5b0;
      --shadow:0 2px 12px rgba(233,106,30,.10); --radius:14px;
    }
    * { box-sizing:border-box; margin:0; padding:0; }
    body { font-family:'Segoe UI','Microsoft JhengHei',sans-serif; background:var(--bg); min-height:100vh; display:flex; flex-direction:column; }

    /* Header */
    header { background:linear-gradient(135deg,#c2510b 0%,#e96a1e 60%,#f4a46a 100%); color:#fff; padding:0 20px; display:flex; align-items:center; justify-content:space-between; height:60px; position:sticky; top:0; z-index:100; box-shadow:0 2px 8px rgba(194,81,11,.3); flex-shrink:0; }
    .guild-name { font-size:1.25rem; font-weight:700; letter-spacing:2px; text-decoration:none; color:inherit; white-space:nowrap; }
    .guild-name small { font-weight:400; opacity:.8; font-size:.7rem; }
    nav { display:flex; gap:8px; }
    nav a { color:#fff; text-decoration:none; padding:6px 14px; border-radius:20px; font-size:.9rem; font-weight:600; border:1.5px solid rgba(255,255,255,.5); transition:background .2s; }
    nav a:hover, nav a.active { background:rgba(255,255,255,.25); }
    .hamburger { display:none; flex-direction:column; gap:5px; cursor:pointer; padding:6px; background:none; border:none; }
    .hamburger span { display:block; width:22px; height:2px; background:#fff; border-radius:2px; transition:all .3s; }
    .hamburger.open span:nth-child(1) { transform:translateY(7px) rotate(45deg); }
    .hamburger.open span:nth-child(2) { opacity:0; }
    .hamburger.open span:nth-child(3) { transform:translateY(-7px) rotate(-45deg); }
    #nav-overlay { display:none; position:fixed; inset:0; background:rgba(0,0,0,.4); z-index:150; }
    #nav-overlay.show { display:block; }
    #mobile-nav { position:fixed; top:0; right:-260px; width:240px; height:100vh; background:linear-gradient(160deg,#c2510b,#e96a1e); z-index:200; padding:70px 20px 30px; display:flex; flex-direction:column; gap:8px; transition:right .3s cubic-bezier(.4,0,.2,1); box-shadow:-4px 0 20px rgba(0,0,0,.2); }
    #mobile-nav.open { right:0; }
    #mobile-nav a { color:#fff; text-decoration:none; padding:12px 16px; border-radius:12px; font-size:1rem; font-weight:600; border:1.5px solid rgba(255,255,255,.3); transition:background .2s; display:flex; align-items:center; gap:10px; }
    #mobile-nav a:hover, #mobile-nav a.active { background:rgba(255,255,255,.2); }
    #mobile-nav .nav-close { position:absolute; top:16px; right:16px; background:none; border:none; color:#fff; font-size:1.5rem; cursor:pointer; }
    @media(max-width:600px) { .guild-name { font-size:1rem; } nav { display:none; } .hamburger { display:flex; } }

    /* Tab 列 */
    .tab-bar {
      display:flex; gap:0; background:var(--bg);
      border-bottom:2px solid var(--border);
      padding:0 20px; flex-shrink:0;
    }
    .tab-btn {
      padding:14px 24px; font-size:.95rem; font-weight:700;
      cursor:pointer; border:none; background:none; color:#9e6b7e;
      border-bottom:3px solid transparent; margin-bottom:-2px;
      transition:color .2s, border-color .2s; display:flex; align-items:center; gap:7px;
    }
    .tab-btn:hover { color:var(--orange-dark); }
    .tab-btn.active { color:var(--orange); border-bottom-color:var(--orange); }
    @media(max-width:480px) { .tab-btn { padding:12px 16px; font-size:.88rem; } }

    /* iframe 容器 */
    .frame-wrap { flex:1; position:relative; }
    iframe {
      position:absolute; inset:0;
      width:100%; height:100%;
      border:none; display:none;
      background:var(--bg);
    }
    iframe.active { display:block; }

    /* 載入中遮罩 */
    .loading-mask {
      position:absolute; inset:0;
      background:var(--bg); display:flex; flex-direction:column;
      align-items:center; justify-content:center; gap:14px;
      z-index:10; transition:opacity .3s;
    }
    .loading-mask.hide { opacity:0; pointer-events:none; }
    .spinner { width:36px; height:36px; border:4px solid var(--border); border-top-color:var(--orange); border-radius:50%; animation:spin .7s linear infinite; }
    @keyframes spin { to { transform:rotate(360deg); } }
    .loading-text { font-size:.9rem; color:#9e6b7e; font-weight:600; }
  </style>
</head>
<body>

<div id="site-header"></div>

<!-- Tab 列 -->
<div class="tab-bar">
  <button class="tab-btn active" id="tab-member" onclick="switchTab('member')">✅ 花卉擁有</button>
  <button class="tab-btn" id="tab-showcase" onclick="switchTab('showcase')">🖼️ 個人花展</button>
</div>

<!-- iframe 容器 -->
<div class="frame-wrap">
  <!-- 花卉擁有 -->
  <div class="loading-mask" id="mask-member">
    <div class="spinner"></div>
    <div class="loading-text">載入花卉擁有...</div>
  </div>
  <iframe id="frame-member" src="member-editor.html" title="花卉擁有"
    onload="onFrameLoad('member')"></iframe>

  <!-- 個人花展（懶載入，切換時才設 src）-->
  <div class="loading-mask" id="mask-showcase" style="display:none;">
    <div class="spinner"></div>
    <div class="loading-text">載入個人花展...</div>
  </div>
  <iframe id="frame-showcase" src="" title="個人花展"
    onload="onFrameLoad('showcase')"></iframe>
</div>

<script>
let loaded = { member: false, showcase: false };
let current = 'member';

function switchTab(tab) {
  if (current === tab) return;
  current = tab;

  // tab 按鈕樣式
  document.getElementById('tab-member').classList.toggle('active', tab === 'member');
  document.getElementById('tab-showcase').classList.toggle('active', tab === 'showcase');

  // iframe 顯示切換
  document.getElementById('frame-member').classList.toggle('active', tab === 'member');
  document.getElementById('frame-showcase').classList.toggle('active', tab === 'showcase');

  // 個人花展懶載入：第一次切換才設 src
  if (tab === 'showcase') {
    const f = document.getElementById('frame-showcase');
    if (!f.src || f.src === window.location.href) {
      document.getElementById('mask-showcase').style.display = 'flex';
      f.src = 'flower-showcase.html';
    }
  }

  // 顯示對應遮罩（若尚未載入完成）
  const mask = document.getElementById(`mask-${tab}`);
  if (!loaded[tab]) {
    mask.style.display = 'flex';
    mask.classList.remove('hide');
  }
}

function onFrameLoad(tab) {
  loaded[tab] = true;
  const mask = document.getElementById(`mask-${tab}`);
  mask.classList.add('hide');
  setTimeout(() => { mask.style.display = 'none'; }, 300);

  // 隱藏 iframe 內的 header 和 nav（避免雙層導覽）
  try {
    const doc = document.getElementById(`frame-${tab}`).contentDocument;
    const style = doc.createElement('style');
    style.textContent = 'header, #nav-overlay, #mobile-nav { display:none !important; } body { padding-top:0 !important; }';
    doc.head.appendChild(style);
  } catch(e) { /* 跨域時忽略 */ }
}

// 初始化：花卉擁有預設顯示
document.getElementById('frame-member').classList.add('active');
</script>
<script src="header.js"></script>
</body>
</html>

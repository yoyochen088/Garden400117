<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>個人花展</title>
  <link rel="stylesheet" href="style.css" />
  <script src="config.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <style>
    /* 頁面頂部公會資訊 */
    .page-header {
      text-align: right;
      padding: 8px 16px 0;
      color: #c2185b;
      font-size: 0.82rem;
      font-weight: 600;
      letter-spacing: 1px;
    }
    .page-header .guild { font-size: 1rem; }

    /* 模糊搜尋下拉 */
    .search-wrapper { position: relative; }
    .suggest-list {
      position: absolute;
      top: calc(100% + 4px);
      left: 0;
      right: 0;
      background: #fff;
      border: 1.5px solid #f48fb1;
      border-radius: 12px;
      box-shadow: 0 4px 16px rgba(233,30,140,0.12);
      z-index: 100;
      max-height: 220px;
      overflow-y: auto;
    }
    .suggest-item {
      padding: 10px 16px;
      cursor: pointer;
      font-size: 0.9rem;
      border-bottom: 1px solid #fce4ec;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .suggest-item:last-child { border-bottom: none; }
    .suggest-item:hover { background: #fce4ec; }
    .suggest-nick { font-weight: 600; color: #c2185b; }
    .suggest-id { font-size: 0.75rem; color: #9e6b7e; }
    .suggest-role { font-size: 0.72rem; background: #fce4ec; color: #c2185b; padding: 1px 6px; border-radius: 8px; }
  </style>
</head>
<body>

<!-- 公會資訊 -->
<div class="page-header">
  <div class="guild">♡璀璨♡</div>
  <div>400117</div>
</div>

<!-- 載入中 -->
<div id="loading" class="loading">
  <div class="loading-spinner"></div><br>載入資料中...
</div>

<!-- 搜尋列 -->
<div id="search-area" style="display:none;">
  <div class="search-bar">
    <div class="search-wrapper">
      <input id="searchInput" type="text" placeholder="輸入成員暱稱（模糊搜尋）..."
        oninput="onSearchInput()" onkeydown="onSearchKey(event)"
        autocomplete="off" />
      <div class="suggest-list" id="suggestList" style="display:none;"></div>
    </div>
    <button class="btn btn-primary" onclick="searchSelected()">🔍 查詢</button>
  </div>
</div>

<!-- 花展卡片（截圖區域）-->
<div id="showcase-card" style="display:none;">
  <div class="user-header">
    <div class="user-avatar" id="user-initial">?</div>
    <div class="user-info">
      <div class="user-name" id="user-name"></div>
      <div class="user-stats">
        <div id="user-gameid" style="color:#9e6b7e;font-size:0.78rem;"></div>
        <div id="user-total" style="font-size:0.82rem;color:#c2185b;font-weight:600;margin-top:2px;"></div>
      </div>
    </div>
    <div class="guild-badge">♡璀璨♡<br><span style="font-size:0.7rem;opacity:0.85;">400117</span></div>
  </div>
  <div id="quality-sections"></div>
</div>

<!-- 底部浮動按鈕 -->
<div class="fab-bar">
  <button class="btn btn-secondary" onclick="history.back()">← 返回</button>
  <button class="btn btn-primary" id="downloadBtn" style="display:none;" onclick="downloadImage()">📥 下載圖片</button>
</div>

<script src="flower-showcase.js"></script>
</body>
</html>

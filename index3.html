// ?€?€ è¼‰ه…¥è³‡و? ?€?€
async function loadFromSheets() {
  const { apiKey, sheetId, ranges } = SHEET_CONFIG;
  const rangeParam = ranges.map(r => `ranges=${encodeURIComponent(r)}`).join('&');
  const url = `https://sheets.googleapis.com/v4/spreadsheets/${sheetId}/values:batchGet?${rangeParam}&key=${apiKey}`;
  try {
    const res = await fetch(url);
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    const [flowersSheet, membersSheet, ownershipSheet] = data.valueRanges;

    const fHeaders = flowersSheet.values[0];
    FLOWERS = flowersSheet.values.slice(1).map(row => {
      const f = {};
      fHeaders.forEach((h, i) => { f[h.toLowerCase()] = row[i] || ''; });
      f.id = Number(f.id); f.score = Number(f.score); f.order = Number(f.order) || 999;
      f.owners = [];
      return f;
    });

    const mHeaders = membersSheet.values[0];
    MEMBERS = membersSheet.values.slice(1).map(row => {
      const m = {};
      mHeaders.forEach((h, i) => { m[h.toLowerCase()] = row[i] || ''; });
      m.gameId   = m.gameid || m.gameId || '';
      m.nickname = m.nickname || '';
      m.note     = m.note || '?گه“،';
      m.left     = (m.left || '').toLowerCase() === 'true';
      return m;
    }).filter(m => !m.left);

    const oHeaders = ownershipSheet.values[0];
    OWNERSHIP = ownershipSheet.values.slice(1).map(row => {
      const o = {};
      oHeaders.forEach((h, i) => { o[h.toLowerCase()] = row[i] || ''; });
      return o;
    });

    const flowerMap = {};
    FLOWERS.forEach(f => { flowerMap[f.id] = f; });
    OWNERSHIP.forEach(o => {
      const gameId = o.gameid || o.gameId || Object.values(o)[0] || '';
      const fid    = Number(o.flowerid || o.flowerId || Object.values(o)[1] || '');
      if (flowerMap[fid] && gameId) flowerMap[fid].owners.push(gameId);
    });

    return true;
  } catch(e) {
    return false;
  }
}

function buildGameIdMap() {
  const map = {};
  // ?ھه??¥هœ¨?·و??،ï?left !== trueï¼?
  MEMBERS.forEach(m => {
    if (m.gameId && !m.left) map[m.gameId] = { nick: m.nickname || m.gameId, role: m.note || '?گه“،' };
  });
  return map;
}

function applyFilters() {
  const gameIdMap   = buildGameIdMap();
  // ?ھé،¯ç¤؛هœ¨?·و??،ï?left ?گه“،?´وژ¥?ژو؟¾??
  const ownerDisplay = id => gameIdMap[id] ? gameIdMap[id].nick : null;

    return matchQ
      && (!activeQTab || f.quality === activeQTab)
      && (!score  || String(f.score) === score)

  });

  if (sort === 'score_asc')  list.sort((a,b) => a.score - b.score);
  if (sort === 'score_desc') list.sort((a,b) => b.score - a.score);
  if (sort === 'pop_asc')    list.sort((a,b) => a.owners.length - b.owners.length);
  if (sort === 'pop_desc')   list.sort((a,b) => b.owners.length - a.owners.length);

// ?€?€ ?¸ه?è¨ˆو•¸?•ç•« ?€?€
function animateCount(el, target) {
  const start = parseInt(el.textContent) || 0;
  if (start === target) return;
  const dur = Math.min(600, Math.abs(target - start) * 8);
  const step = (target - start) / (dur / 16);
  let cur = start;
  const tick = () => {
    cur += step;
    const done = step > 0 ? cur >= target : cur <= target;
    el.textContent = done ? target : Math.round(cur);
    if (!done) requestAnimationFrame(tick);
  };
  requestAnimationFrame(tick);
}

// ?€?€ و¸²و??±ه?ï¼ˆهگ«?پè³ھ?†ç? + stagger ?•ç•«ï¼‰â??€
function renderFlowers(list, ownerDisplay, ownerRole) {
  const countEl = document.getElementById('resultCount');

    countEl.innerHTML = '?±و‰¾??<span>0</span> ç¨®èٹ±';

  animateCount(countSpan, list.length);

  const grid = document.getElementById('flowerGrid');

  // و±؛ه??¯هگ¦?†ç?ï¼ˆç„،?پè³ھç¯©éپ¸?‚ه?çµ„ï?
  const grouped = !activeQTab;
  let html = '';

    const byQ = {};

      group.forEach(f => {
        html += buildCard(f, ownerDisplay, ownerRole, globalIdx++);

  } else {
    html = '<div class="flower-grid">';
    list.forEach(f => { html += buildCard(f, ownerDisplay, ownerRole, globalIdx++); });
    html += '</div>';
  }

  grid.innerHTML = html;
}

// ?€?€ ç²’ه??¹و? ?€?€
const PARTICLE_COLORS = {

    const px = Math.round(Math.cos(angle) * dist);
    const py = Math.round(Math.sin(angle) * dist);
    const color = colors[Math.floor(Math.random() * colors.length)];
    const delay = Math.random() * 0.3;
    const startX = 20 + Math.random() * 60; // % of card width
    const startY = 20 + Math.random() * 60;
    p.style.cssText = `
      width:${size}px; height:${size}px;
      background:${color};
      left:${startX}%; top:${startY}%;
      --px:${px}px; --py:${py}px;
      animation-delay:${delay}s;
      box-shadow:0 0 4px ${color};
    `;
    container.appendChild(p);
  }
}

// ?€?€ 13. Lightbox ç¸®ه????€?€
function renderLightboxThumbs() {
  const strip = document.getElementById('lightbox-thumbs');
  strip.innerHTML = currentList.map((f, i) => {
    if (!f.img) return '';
    return `<img class="lb-thumb${i===lightboxIdx?' active':''}" src="${f.img}" alt="${f.name}" loading="lazy" onclick="jumpLightbox(${i});event.stopPropagation()">`;
  }).join('');
}

function jumpLightbox(idx) {
  if (!currentList[idx] || !currentList[idx].img) return;
  lightboxIdx = idx;
  showLightboxItem();
  updateThumbActive();
}

function updateThumbActive() {
  document.querySelectorAll('.lb-thumb').forEach((el, i) => {
    el.classList.toggle('active', i === lightboxIdx);
  });
  // ?²ه??°ç•¶?چç¸®??
  const strip = document.getElementById('lightbox-thumbs');
  const active = strip.querySelector('.lb-thumb.active');
  if (active) active.scrollIntoView({ behavior:'smooth', block:'nearest', inline:'center' });
}

// ?€?€ Lightbox ?€?€
function openLightboxByIdx(idx) {
  if (!currentList[idx] || !currentList[idx].img) return;
  lightboxIdx = idx;
  showLightboxItem();
  renderLightboxThumbs();
  document.getElementById('lightbox').classList.add('open');
}

function showLightboxItem() {
  const f = currentList[lightboxIdx];
  if (!f) return;
  const imgEl = document.getElementById('lightbox-img');
  imgEl.style.opacity = '0';
  imgEl.style.width = '';
  imgEl.style.height = '';
  imgEl.src = f.img || '';
  imgEl.alt = f.name || '';
  document.getElementById('lightbox-name').textContent = f.name || '';

  // ?چç½®ç؟»è??€??
  document.getElementById('lightbox-tilt-wrap').classList.remove('flipped');

  // ه،«ه…¥?Œé‌¢è³‡è?
  const gameIdMap = buildGameIdMap();
  const ownerNames = (f.owners || []).map(id => gameIdMap[id] ? gameIdMap[id].nick : null).filter(Boolean);
  document.getElementById('lb-back-name').textContent = f.name || '';
  document.getElementById('lb-back-meta').innerHTML = `
    <span class="lb-back-badge">${f.quality || ''}</span>
    <span class="lb-back-badge">â­?${f.score || 0}</span>
    <span class="lb-back-badge">${f.obtain || ''}</span>`;
  document.getElementById('lb-back-owners').innerHTML = ownerNames.length
    ? ownerNames.map(n => `<span class="lb-back-owner-tag">${n}</span>`).join('')
    : '<span class="lb-back-no-owner">ه°ڑç„،ن؛؛و???/span>';
  // ?Œé‌¢?Œو™¯ï¼ڑç”¨و­?‌¢?–ç?و¨،ç??چé£½??
  const back = document.getElementById('lightbox-back');
  back.className = `lb-back-${f.quality || '??}`;
  const backBg = document.getElementById('lightbox-back-bg');
  if (f.img) backBg.style.backgroundImage = `url('${f.img.replace(/'/g,"\\'")}')`;
  else backBg.style.backgroundImage = 'none';

  imgEl.onload = () => {
    const targetW = Math.min(370, window.innerWidth * 0.88);
    const ratio = imgEl.naturalHeight / imgEl.naturalWidth;
    imgEl.style.width  = Math.round(targetW) + 'px';
    imgEl.style.height = Math.round(targetW * ratio) + 'px';
    imgEl.style.opacity = '1';
  };
  document.getElementById('lightbox-prev').style.opacity = lightboxIdx > 0 ? '0.7' : '0.2';
  document.getElementById('lightbox-next').style.opacity = lightboxIdx < currentList.length - 1 ? '0.7' : '0.2';
}

function toggleLightboxFlip(e) {
  // ن¸چو??ھه·¦?³ç®­?­é???
  if (e.target.id === 'lightbox-prev' || e.target.id === 'lightbox-next') return;
  e.stopPropagation();
  document.getElementById('lightbox-tilt-wrap').classList.toggle('flipped');
}

// ?‹و? touch ç؟»è?
(function initFlipTouch() {
  const wrap = document.getElementById('lightbox-tilt-wrap');
  let touchMoved = false;
  wrap.addEventListener('touchstart', () => { touchMoved = false; }, { passive:true });
  wrap.addEventListener('touchmove',  () => { touchMoved = true;  }, { passive:true });
  wrap.addEventListener('touchend', e => {
    if (touchMoved) return; // و»‘ه?ن¸چè§¸?¼ç؟»è½?
    if (e.target.id === 'lightbox-prev' || e.target.id === 'lightbox-next') return;
    e.preventDefault();
    wrap.classList.toggle('flipped');
  });
})();

function shiftLightbox(dir) {
  const next = lightboxIdx + dir;
  if (next < 0 || next >= currentList.length) return;
  let i = next;
  while (i >= 0 && i < currentList.length && !currentList[i].img) i += dir;
  if (i < 0 || i >= currentList.length) return;
  lightboxIdx = i;
  showLightboxItem();
  updateThumbActive();
}

function closeLightbox() {
  document.getElementById('lightbox').classList.remove('open');
  document.getElementById('lightbox-img').src = '';
  const wrap = document.getElementById('lightbox-tilt-wrap');
  wrap.classList.remove('flipped');
  wrap.style.transform = '';
}

// ?€?€ ?±هچ، 3D tilt ?€?€
(function initCardTilt() {
  const MAX_TILT = 12;
  document.addEventListener('mousemove', e => {
    const card = e.target.closest('.flower-card');
    if (!card) return;
    // ?œو­¢?¥ه ´?•ç•«ï¼Œè? inline transform ?ںو?
    card.style.animation = 'none';
    const rect = card.getBoundingClientRect();
    const cx = rect.left + rect.width  / 2;
    const cy = rect.top  + rect.height / 2;
    const dx = (e.clientX - cx) / (rect.width  / 2);
    const dy = (e.clientY - cy) / (rect.height / 2);
    const rotY =  dx * MAX_TILT;
    const rotX = -dy * MAX_TILT;
    card.style.transform = `perspective(600px) rotateX(${rotX}deg) rotateY(${rotY}deg)`;
  });
  document.addEventListener('mouseout', e => {
    const card = e.target.closest('.flower-card');
    if (card && !card.contains(e.relatedTarget)) {
      card.style.transform = '';
    }
  });
})();

function handleLightboxClick(e) {
  if (e.target === document.getElementById('lightbox')) closeLightbox();
}

document.addEventListener('keydown', e => {
  if (!document.getElementById('lightbox').classList.contains('open')) return;
  if (e.key === 'Escape')      closeLightbox();
  if (e.key === 'ArrowLeft')   shiftLightbox(-1);
  if (e.key === 'ArrowRight')  shiftLightbox(1);
});

// ?€?€ 14. è§¸وژ§و»‘ه?ï¼ˆو?و©ںï? ?€?€
(function initTouchSwipe() {
  const lb = document.getElementById('lightbox');
  let touchStartX = 0, touchStartY = 0;
  lb.addEventListener('touchstart', e => {
    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
  }, { passive:true });
  lb.addEventListener('touchend', e => {
    const dx = e.changedTouches[0].clientX - touchStartX;
    const dy = e.changedTouches[0].clientY - touchStartY;
    if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 40) {
      shiftLightbox(dx < 0 ? 1 : -1);
    }
  }, { passive:true });
})();

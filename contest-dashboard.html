<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>競賽儀表板 - 璀璨</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌸</text></svg>" />
  <script src="config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
  <style>
    :root { --orange:#e96a1e; --orange-light:#fef0e7; --orange-mid:#f4a46a; --orange-dark:#c2510b; --bg:#fff8f5; --card-bg:#fff; --text:#3d1a2e; --text-muted:#9e6b7e; --border:#f8d5b0; --shadow:0 2px 12px rgba(233,106,30,.10); --radius:14px; }
    * { box-sizing:border-box; margin:0; padding:0; }
    body { font-family:'Segoe UI','Microsoft JhengHei',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; padding-bottom:40px; }
    main { max-width:1100px; margin:0 auto; padding:24px 16px; }
    .page-header { display:flex; align-items:center; justify-content:space-between; margin-bottom:24px; flex-wrap:wrap; gap:12px; }
    .page-title { font-size:1.4rem; font-weight:900; color:var(--orange-dark); }
    .page-subtitle { font-size:0.82rem; color:var(--text-muted); }
    .btn-link { padding:8px 18px; border-radius:20px; font-size:0.85rem; font-weight:700; background:var(--orange); color:#fff; text-decoration:none; box-shadow:0 3px 12px rgba(233,106,30,.3); transition:transform .15s; display:inline-block; }
    .btn-link:hover { transform:translateY(-2px); }
    .stats-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:14px; margin-bottom:24px; }
    .stat-box { background:var(--card-bg); border-radius:var(--radius); border:1px solid var(--border); box-shadow:var(--shadow); padding:20px; }
    .stat-box .sv { font-size:1.8rem; font-weight:900; color:var(--text); }
    .stat-box .sl { font-size:0.78rem; color:var(--text-muted); margin-top:4px; }
    .mid-grid { display:grid; grid-template-columns:2fr 1fr; gap:16px; margin-bottom:24px; }
    .card { background:var(--card-bg); border-radius:var(--radius); border:1px solid var(--border); box-shadow:var(--shadow); padding:20px; margin-bottom:16px; }
    .card-title { font-size:0.9rem; font-weight:700; color:var(--orange-dark); margin-bottom:14px; display:flex; align-items:center; gap:8px; }
    .diff-chip { padding:6px 16px; border-radius:20px; font-size:0.82rem; font-weight:700; display:inline-flex; align-items:center; gap:4px; }
    .diff-up { background:#e8f5e9; color:#2e7d32; }
    .diff-down { background:#fce4ec; color:#c62828; }
    .diff-same { background:#f5f5f5; color:#888; }
    .mvp-card { padding:14px 18px; border-radius:12px; margin-bottom:10px; }
    .mvp-card .mc-label { font-size:0.72rem; color:var(--text-muted); font-weight:600; margin-bottom:4px; }
    .mvp-card .mc-name { font-size:1.1rem; font-weight:800; color:var(--text); }
    .mvp-card .mc-score { font-size:0.9rem; font-weight:700; }
    .mvp-1 { background:linear-gradient(135deg,#fff8f0,#fef0e7); border:1px solid #f8d5b0; }
    .mvp-1 .mc-score { color:var(--orange); }
    .mvp-2 { background:linear-gradient(135deg,#f0fff4,#e8f5e9); border:1px solid #a5d6a7; }
    .mvp-2 .mc-score { color:#2e7d32; }
    .mvp-3 { background:linear-gradient(135deg,#f3e5f5,#ede7f6); border:1px solid #ce93d8; }
    .mvp-3 .mc-score { color:#7b1fa2; }
    .rank-table { width:100%; border-collapse:collapse; font-size:0.88rem; }
    .rank-table thead tr { background:linear-gradient(135deg,#c2510b,#e96a1e); color:#fff; }
    .rank-table th { padding:10px 14px; text-align:left; font-weight:600; }
    .rank-table td { padding:9px 14px; border-bottom:1px solid var(--border); }
    .rank-table tbody tr:hover { background:var(--orange-light); }
    .rank-more { text-align:center; padding:14px; }
    .rank-more .btn-link { display:inline-block; }
    .bottom-grid { display:grid; grid-template-columns:1fr 1fr; gap:16px; }
    .history-stats { display:grid; grid-template-columns:1fr 1fr; gap:14px; }
    .hs-item .hs-value { font-size:1.3rem; font-weight:900; color:var(--text); }
    .hs-item .hs-label { font-size:0.72rem; color:var(--text-muted); margin-top:2px; }
    .title-bars { display:flex; flex-direction:column; gap:10px; }
    .tb-row { display:flex; align-items:center; gap:10px; }
    .tb-label { font-size:0.78rem; font-weight:600; width:70px; flex-shrink:0; }
    .tb-bar-bg { flex:1; background:#f0e8e0; border-radius:4px; height:10px; overflow:hidden; }
    .tb-bar-fill { height:100%; border-radius:4px; transition:width .6s; }
    .tb-count { font-size:0.75rem; color:var(--text-muted); width:40px; text-align:right; flex-shrink:0; }
    .tb-王者花匠 { background:linear-gradient(90deg,#e96a1e,#ff4e8a); }
    .tb-大師花匠 { background:linear-gradient(90deg,#9b59b6,#c39bd3); }
    .tb-黃金花匠 { background:linear-gradient(90deg,#f4c430,#ffd700); }
    .tb-白銀花匠 { background:linear-gradient(90deg,#9e9e9e,#d4d4d4); }
    .tb-青銅花匠 { background:linear-gradient(90deg,#cd7f32,#e8a96a); }
    .tb-無稱號 { background:#ddd; }
    .loading { text-align:center; padding:40px; color:var(--text-muted); }
    .chart-wrap { position:relative; height:220px; }
    @media(max-width:768px) { .stats-grid { grid-template-columns:repeat(2,1fr); } .mid-grid { grid-template-columns:1fr; } .bottom-grid { grid-template-columns:1fr; } }
    @media(max-width:480px) { .stat-box .sv { font-size:1.4rem; } }
  </style>
</head>
<body>
<div id="site-header"></div>
<main>
  <div class="page-header">
    <div><div class="page-title">公會數據儀表板</div><div class="page-subtitle" id="periodLabel">載入中...</div></div>
    <a href="contest-history.html" id="rankMoreLink" class="btn-link">📋 歷史戰績</a>
  </div>
  <div class="stats-grid">
    <div class="stat-box"><div class="sv" id="dTotal">-</div><div class="sl">公會總分</div></div>
    <div class="stat-box"><div class="sv" id="dRank">-</div><div class="sl">公會排名</div></div>
    <div class="stat-box"><div class="sv" id="dParticipation">-</div><div class="sl">參賽人數</div></div>
    <div class="stat-box"><div class="sv" id="dAvg">-</div><div class="sl">平均分數</div></div>
  </div>

  <!-- 趨勢圖 + 與上期差異 -->
  <div class="mid-grid">
    <div class="card">
      <div class="card-title">📈 公會總分趨勢</div>
      <div class="chart-wrap"><canvas id="chartTotal"></canvas></div>
    </div>
    <div class="card">
      <div class="card-title">📊 與上期比較</div>
      <div id="diffSection"><div class="loading">資料累積中</div></div>
    </div>
  </div>

  <!-- 排名走勢 + 本期亮點 -->
  <div class="mid-grid">
    <div class="card">
      <div class="card-title">📉 排名走勢（越高越好）</div>
      <div class="chart-wrap"><canvas id="chartRank"></canvas></div>
    </div>
    <div class="card">
      <div class="card-title">⭐ 本期亮點</div>
      <div class="mvp-card mvp-1"><div class="mc-label">🥇 本期 MVP</div><div class="mc-name" id="mvpName">-</div><div class="mc-score" id="mvpScore">-</div></div>
      <div class="mvp-card mvp-2"><div class="mc-label">📈 進步王</div><div class="mc-name" id="progressName">-</div><div class="mc-score" id="progressScore">資料累積中</div></div>
      <div class="mvp-card mvp-3"><div class="mc-label">🚀 潛力成員</div><div class="mc-name" id="potentialName">-</div><div class="mc-score" id="potentialScore">資料累積中</div></div>
    </div>
  </div>

  <!-- 排行榜 -->
  <div class="card">
    <div class="card-title">🏅 本期排行榜 TOP 5</div>
    <table class="rank-table">
      <thead><tr><th>排名</th><th>暱稱</th><th>職位</th><th>分數</th></tr></thead>
      <tbody id="rankBody"><tr><td colspan="4" class="loading">載入中...</td></tr></tbody>
    </table>
    <div class="rank-more"><a href="contest-history.html" id="rankMoreLink2" class="btn-link" style="font-size:0.85rem;padding:8px 20px;">📋 查看完整排名 →</a></div>
  </div>

  <!-- 公會歷史 + 稱號分布 -->
  <div class="bottom-grid">
    <div class="card">
      <div class="card-title">📊 公會歷史</div>
      <div class="history-stats">
        <div class="hs-item"><div class="hs-value" id="hsHighest">-</div><div class="hs-label">歷史最高分</div></div>
        <div class="hs-item"><div class="hs-value" id="hsBestRank">-</div><div class="hs-label">最佳排名</div></div>
        <div class="hs-item"><div class="hs-value" id="hsAvg">-</div><div class="hs-label">平均總分</div></div>
        <div class="hs-item"><div class="hs-value" id="hsPeriods">-</div><div class="hs-label">參賽期數</div></div>
      </div>
    </div>
    <div class="card">
      <div class="card-title">🎖 稱號分布</div>
      <div class="title-bars" id="titleBars"><div class="loading">載入中...</div></div>
    </div>
  </div>
</main>

<script>
const cnNumMap = {'一':1,'二':2,'三':3,'四':4,'五':5,'六':6,'七':7,'八':8,'九':9,'十':10};
function extractRankNum(r) {
  const s = String(r);
  const n = s.match(/第(\d+)/); if (n) return Number(n[1]);
  const c = s.match(/第([一二三四五六七八九十]+)/); if (c) return cnNumMap[c[1]] || null;
  return null;
}

async function init() {
  try {
    const cRes = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/contest!A1:G?key=${API_KEY}`);
    const cData = await cRes.json();
    const allRecords = (cData.values||[]).slice(1).map(r=>({period:r[0]||'',nickname:r[2]||'',role:r[3]||'',score:Number(r[4])||0,title:r[5]||''}));

    let summaries = [];
    try { const s=await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/contest_summary!A1:F?key=${API_KEY}`); if(s.ok){const d=await s.json(); summaries=(d.values||[]).slice(1).map(r=>({period:r[0]||'',members:r[1]||'',total:r[2]||'',rank:r[3]||'',grade:r[4]||''}));} } catch(e){}

    if (!allRecords.length) { document.getElementById('periodLabel').textContent='尚無資料'; return; }

    const periods = [...new Set(allRecords.map(r=>r.period))].sort();
    const latestPeriod = periods[periods.length-1];
    const latestData = allRecords.filter(r=>r.period===latestPeriod).sort((a,b)=>b.score-a.score);
    const latestSummary = summaries.find(s=>s.period===latestPeriod);

    document.getElementById('periodLabel').textContent = latestPeriod + ' 期';
    document.getElementById('rankMoreLink').href = 'contest-history.html?period=' + latestPeriod;
    document.getElementById('rankMoreLink2').href = 'contest-history.html?period=' + latestPeriod;

    // 統計
    const total = latestSummary ? Number(latestSummary.total) : latestData.reduce((s,d)=>s+d.score,0);
    const rank = latestSummary ? latestSummary.rank : '-';
    const count = latestSummary ? latestSummary.members : latestData.length;
    const avg = latestData.length ? Math.round(latestData.reduce((s,d)=>s+d.score,0)/latestData.length) : 0;
    document.getElementById('dTotal').textContent = total.toLocaleString();
    document.getElementById('dRank').textContent = rank;
    document.getElementById('dParticipation').textContent = count + ' 人';
    document.getElementById('dAvg').textContent = avg;

    // MVP
    if (latestData.length) { document.getElementById('mvpName').textContent=latestData[0].nickname; document.getElementById('mvpScore').textContent=latestData[0].score+' 分'; }

    // 進步王 + 與上期差異
    if (periods.length >= 2) {
      const prev = periods[periods.length-2];
      const prevData = allRecords.filter(r=>r.period===prev);
      const prevMap = {}; prevData.forEach(d=>{prevMap[d.nickname]=d.score;});
      let maxP=-Infinity,pM=null;
      latestData.forEach(d=>{ if(prevMap[d.nickname]!==undefined){const diff=d.score-prevMap[d.nickname]; if(diff>maxP){maxP=diff;pM=d;}} });
      if(pM&&maxP>0){document.getElementById('progressName').textContent=pM.nickname; document.getElementById('progressScore').textContent='+'+maxP+' 分';}

      const prevSummary = summaries.find(s=>s.period===prev);
      const prevTotal = prevSummary ? Number(prevSummary.total) : prevData.reduce((s,d)=>s+d.score,0);
      const prevAvg = prevData.length ? Math.round(prevData.reduce((s,d)=>s+d.score,0)/prevData.length) : 0;
      const tDiff = total - prevTotal, aDiff = avg - prevAvg;
      const currRN = extractRankNum(rank), prevRN = extractRankNum(prevSummary?prevSummary.rank:'');
      const rDiff = (currRN&&prevRN) ? prevRN-currRN : null;

      document.getElementById('diffSection').innerHTML = `
        <div style="display:flex;flex-direction:column;gap:10px;">
          <div class="diff-chip ${tDiff>=0?'diff-up':'diff-down'}">${tDiff>=0?'▲':'▼'} 總分 ${tDiff>=0?'+':''}${tDiff.toLocaleString()}</div>
          <div class="diff-chip ${rDiff!==null?(rDiff>0?'diff-up':rDiff<0?'diff-down':'diff-same'):'diff-same'}">${rDiff>0?'▲':rDiff<0?'▼':'—'} 排名 ${rDiff!==null?(rDiff>0?'+'+rDiff:rDiff===0?'持平':rDiff):'-'}</div>
          <div class="diff-chip ${aDiff>=0?'diff-up':'diff-down'}">${aDiff>=0?'▲':'▼'} 均分 ${aDiff>=0?'+':''}${aDiff}</div>
        </div>`;
    }

    // 潛力成員
    if (periods.length >= 3) {
      const last3=periods.slice(-3); const sp={};
      last3.forEach(p=>{sp[p]={};});
      allRecords.filter(r=>last3.includes(r.period)).forEach(r=>{sp[r.period][r.nickname]=r.score;});
      let best=null,bestG=0;
      [...new Set(allRecords.map(r=>r.nickname))].forEach(n=>{
        const s0=sp[last3[0]]?.[n],s1=sp[last3[1]]?.[n],s2=sp[last3[2]]?.[n];
        if(s0&&s1&&s2&&s2>s1&&s1>s0){const g=s2-s0;if(g>bestG){bestG=g;best=n;}}
      });
      if(best){document.getElementById('potentialName').textContent=best; document.getElementById('potentialScore').textContent='連3期成長 +'+bestG+' 分';}
    }

    // TOP 5
    document.getElementById('rankBody').innerHTML = latestData.slice(0,5).map((d,i)=>`<tr><td>${i+1}</td><td>${d.nickname}</td><td>${d.role}</td><td style="font-weight:700;color:var(--orange);">${d.score}</td></tr>`).join('');

    // 稱號分布
    const TITLES=['王者花匠','大師花匠','黃金花匠','白銀花匠','青銅花匠','無稱號'];
    const tc={};TITLES.forEach(t=>tc[t]=0); latestData.forEach(d=>{if(tc[d.title]!==undefined)tc[d.title]++;});
    const mx=Math.max(...Object.values(tc),1);
    document.getElementById('titleBars').innerHTML=TITLES.map(t=>`<div class="tb-row"><span class="tb-label">${t}</span><div class="tb-bar-bg"><div class="tb-bar-fill tb-${t}" style="width:${Math.round(tc[t]/mx*100)}%"></div></div><span class="tb-count">${tc[t]}人</span></div>`).join('');

    // 公會歷史
    if(summaries.length){
      const tots=summaries.map(s=>Number(s.total)).filter(n=>n>0);
      document.getElementById('hsHighest').textContent=tots.length?Math.max(...tots).toLocaleString():'-';
      document.getElementById('hsAvg').textContent=tots.length?Math.round(tots.reduce((a,b)=>a+b,0)/tots.length).toLocaleString():'-';
      document.getElementById('hsPeriods').textContent=summaries.length;
      document.getElementById('hsBestRank').textContent=summaries.map(s=>s.rank).filter(Boolean)[0]||'-';
    }

    // Chart.js 總分趨勢
    if (summaries.length >= 2) {
      const cd = periods.slice(-7).map(p=>{const s=summaries.find(x=>x.period===p);return{period:p,total:s?Number(s.total):0};}).filter(d=>d.total>0);
      if (cd.length>=2) {
        new Chart(document.getElementById('chartTotal'),{type:'line',data:{labels:cd.map(d=>d.period.slice(5)),datasets:[{label:'總分',data:cd.map(d=>d.total),borderColor:'#e96a1e',backgroundColor:'rgba(233,106,30,0.1)',fill:true,tension:0.3,pointRadius:5,pointBackgroundColor:'#e96a1e'}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{beginAtZero:false,ticks:{callback:v=>v.toLocaleString()}},x:{grid:{display:false}}}}});
      }
    }

    // Chart.js 排名走勢
    if (summaries.length >= 2) {
      const rd = periods.slice(-7).map(p=>{const s=summaries.find(x=>x.period===p);return{period:p,rank:s?extractRankNum(s.rank):null};}).filter(d=>d.rank!==null);
      if (rd.length>=2) {
        new Chart(document.getElementById('chartRank'),{type:'line',data:{labels:rd.map(d=>d.period.slice(5)),datasets:[{label:'排名',data:rd.map(d=>d.rank),borderColor:'#4a90d9',backgroundColor:'rgba(74,144,217,0.1)',fill:true,tension:0.3,pointRadius:5,pointBackgroundColor:'#4a90d9'}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{reverse:true,min:1,ticks:{stepSize:1,callback:v=>'#'+v}},x:{grid:{display:false}}}}});
      }
    }

  } catch(e) { document.getElementById('periodLabel').textContent='⚠️ '+e.message; }
}
init();
</script>
<script src="header.js"></script>
</body>
</html>

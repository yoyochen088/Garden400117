<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>公會競賽戰報 - 璀璨</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌸</text></svg>" />
  <script src="config.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family:'Segoe UI','Microsoft JhengHei',sans-serif;
      background:linear-gradient(180deg,#fffaf3 0%,#fff5e6 100%);
      color:#4a3520; min-height:100vh;
    }
    .container { max-width:1100px; margin:0 auto; padding:0 16px; }

    /* ===== HERO ===== */
    .hero {
      padding:36px 20px 28px;
      background:linear-gradient(180deg,#fff8ed,#ffefd4);
      border-bottom:3px solid #f0c866;
      position:relative;
      display:flex; align-items:center; justify-content:center; gap:20px; flex-wrap:wrap;
    }
    .hero-content { text-align:center; }
    .hero-link {
      display:inline-flex; align-items:center; gap:6px;
      padding:8px 18px; border-radius:20px;
      background:linear-gradient(135deg,#e96a1e,#f4a46a); color:#fff;
      text-decoration:none; font-weight:700; font-size:0.85rem;
      box-shadow:0 3px 12px rgba(233,106,30,.25); transition:transform .15s;
      position:absolute; right:calc((100% - 1100px)/2 + 16px); bottom:14px;
    }
    .hero-link:hover { transform:translateY(-2px); }
    .hero h1 {
      font-size:2.2rem; font-weight:900; color:#a35d00;
      margin-bottom:6px;
    }
    .hero .period-badge {
      display:inline-block; color:#a08050; font-weight:600; font-size:0.88rem;
    }

    /* ===== KPI ROW ===== */
    .kpi-row {
      display:grid; grid-template-columns:repeat(4,1fr); gap:16px;
      position:relative; z-index:2;
    }
    .kpi-card {
      background:#fff; border-radius:18px; padding:22px 14px;
      text-align:center; box-shadow:0 4px 20px rgba(180,120,40,.08);
      border:1.5px solid #f5deb3;
    }
    .kpi-icon { font-size:1.6rem; margin-bottom:6px; }
    .kpi-label { font-size:0.78rem; color:#a08050; font-weight:600; margin-bottom:4px; }
    .kpi-value { font-size:1.9rem; font-weight:900; color:#4a3520; }

    /* ===== SECTION ===== */
    .section { padding:20px 0; }
    .section-title {
      font-size:1.1rem; font-weight:800; color:#8b5a00;
      margin-bottom:16px; display:flex; align-items:center; gap:8px;
    }
    .section-title::before { content:''; width:4px; height:18px; background:#e96a1e; border-radius:2px; }

    /* ===== CARD ===== */
    .card {
      background:#fff; border-radius:18px; padding:22px;
      box-shadow:0 4px 20px rgba(180,120,40,.06);
      border:1px solid #f5deb3;
    }

    /* ===== MID GRID: Row1 趨勢+比較, Row2 排名+亮點 ===== */
    .row-grid {
      display:grid; grid-template-columns:1.5fr 1fr; gap:16px; margin-bottom:16px;
    }
    .row-grid > .card { display:flex; flex-direction:column; }

    /* 與上期比較 — 卡片格式 */
    .compare-list { display:flex; flex-direction:column; gap:10px; }
    .compare-item {
      display:flex; align-items:center; gap:10px; padding:10px 12px;
      background:#fffbf5; border-radius:12px; border:1px solid #f5deb3;
    }
    .compare-icon { font-size:1.2rem; flex-shrink:0; }
    .compare-info { flex:1; display:flex; align-items:baseline; gap:8px; }
    .compare-label { font-size:0.82rem; color:#a08050; font-weight:600; white-space:nowrap; }
    .compare-value { font-size:1.1rem; font-weight:900; }
    .diff-badge { font-weight:900; font-size:1.1rem; }
    .diff-up { color:#2e7d32; }
    .diff-down { color:#c62828; }
    .diff-same { color:#888; }

    /* 亮點 — 色塊風格 */
    .highlight-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:14px; }
    .highlight-card {
      background:#fff; border-radius:18px; padding:22px;
      box-shadow:0 4px 20px rgba(180,120,40,.06); border:1px solid #f5deb3;
    }
    .highlight-list { display:flex; flex-direction:column; gap:12px; }
    .hl-item {
      padding:14px 16px; border-radius:14px;
    }
    .hl-mvp { background:#fff3e0; border:1.5px solid #f4a46a; }
    .hl-progress { background:#e8f5e9; border:1.5px solid #a5d6a7; }
    .hl-potential { background:#f3e5f5; border:1.5px solid #ce93d8; }
    .hl-top { display:flex; align-items:center; gap:6px; margin-bottom:6px; }
    .hl-icon { font-size:1.1rem; }
    .hl-label { font-size:0.8rem; color:#8b5a00; font-weight:600; }
    .hl-name { font-size:1.3rem; font-weight:900; color:#4a3520; }
    .hl-score { font-size:1rem; font-weight:800; color:#e96a1e; margin-top:2px; }

    /* ===== BOTTOM GRID: TOP5 左大 + 右側上下 ===== */
    .bottom-grid {
      display:grid; grid-template-columns:1.5fr 1fr; gap:16px;
      align-items:stretch;
    }
    .bottom-right { display:flex; flex-direction:column; gap:16px; }

    /* TOP 5 */
    .top5-podium { display:flex; justify-content:center; align-items:flex-end; gap:16px; margin-bottom:12px; padding:12px 0; }
    .podium-item { text-align:center; }
    .podium-avatar {
      border-radius:50%; background:#fff3e0; display:flex; align-items:center; justify-content:center;
      margin:0 auto 6px; border:3px solid #f0c866;
    }
    .podium-1 .podium-avatar { width:80px; height:80px; font-size:3rem; border-color:#ffd700; box-shadow:0 6px 20px rgba(255,215,0,.35); }
    .podium-2 .podium-avatar { width:62px; height:62px; font-size:2.2rem; border-color:#c0c0c0; box-shadow:0 4px 14px rgba(192,192,192,.3); }
    .podium-3 .podium-avatar { width:54px; height:54px; font-size:1.8rem; border-color:#cd7f32; box-shadow:0 4px 12px rgba(205,127,50,.25); }
    .podium-1 .podium-name { font-size:1rem; font-weight:900; }
    .podium-2 .podium-name { font-size:0.85rem; font-weight:700; }
    .podium-3 .podium-name { font-size:0.8rem; font-weight:700; }
    .podium-name { color:#4a3520; margin-top:4px; }
    .podium-1 .podium-score { font-size:1rem; font-weight:900; color:#e96a1e; }
    .podium-2 .podium-score { font-size:0.85rem; font-weight:800; color:#8b5a00; }
    .podium-3 .podium-score { font-size:0.8rem; font-weight:700; color:#8b5a00; }
    .top5-rest { border-top:1px solid #f5deb3; padding-top:8px; }
    .rest-item { display:flex; align-items:center; padding:6px 4px; font-size:0.92rem; gap:12px; }
    .rest-rank { font-weight:700; color:#a08050; width:20px; flex-shrink:0; }
    .rest-name { flex:1; font-weight:700; color:#4a3520; }
    .rest-role { font-size:0.7rem; padding:2px 7px; border-radius:8px; font-weight:600; margin-left:10px; }
    .rr-會長 { background:linear-gradient(135deg,#ff4e8a,#ff8c42); color:#fff; }
    .rr-副會長 { background:linear-gradient(135deg,#ff8c00,#ffb347); color:#fff; }
    .rr-理事 { background:linear-gradient(135deg,#9b59b6,#c39bd3); color:#fff; }
    .rr-菁英 { background:linear-gradient(135deg,#4a90d9,#74b9ff); color:#fff; }
    .rr-成員 { background:#e8f5e9; color:#2e7d32; }
    .rest-title { font-size:0.75rem; padding:3px 10px; border-radius:10px; font-weight:700; white-space:nowrap; flex-shrink:0; margin-left:8px; }
    .rt-王者花匠 { background:linear-gradient(135deg,#e96a1e,#ff4e8a); color:#fff; }
    .rt-大師花匠 { background:linear-gradient(135deg,#9b59b6,#c39bd3); color:#fff; }
    .rt-黃金花匠 { background:linear-gradient(135deg,#f4c430,#ffd700); color:#5a4000; }
    .rt-白銀花匠 { background:linear-gradient(135deg,#9e9e9e,#d4d4d4); color:#fff; }
    .rt-青銅花匠 { background:linear-gradient(135deg,#cd7f32,#e8a96a); color:#fff; }
    .rt-無稱號 { background:#f0f0f0; color:#888; }
    .rest-score { font-weight:900; color:#e96a1e; font-size:1.05rem; flex-shrink:0; white-space:nowrap; margin-left:8px; }
    .rest-score-top { font-weight:900; color:#e96a1e; font-size:1.1rem; flex-shrink:0; white-space:nowrap; margin-left:8px; }
    .view-more {
      display:inline-block; margin-top:12px;
      background:linear-gradient(135deg,#e96a1e,#f4a46a); color:#fff;
      padding:8px 18px; border-radius:14px; font-size:0.8rem; font-weight:700;
      text-decoration:none; transition:transform .15s;
    }
    .view-more:hover { transform:translateY(-2px); }

    /* 公會傳奇紀錄 */
    .legend-grid { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    .legend-item { text-align:center; padding:14px 8px; background:#fffbf5; border-radius:12px; border:1px solid #f5deb3; }
    .legend-label { font-size:0.72rem; color:#a08050; font-weight:600; }
    .legend-value { font-size:1.3rem; font-weight:900; color:#4a3520; margin-top:4px; }

    /* 稱號分布 */
    .title-section { display:flex; align-items:center; gap:16px; }
    .title-chart-wrap { width:130px; height:130px; flex-shrink:0; position:relative; }
    .title-center {
      position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
      text-align:center; font-size:0.75rem; color:#a08050;
    }
    .title-center strong { display:block; font-size:1.1rem; color:#4a3520; }
    .title-list { flex:1; display:flex; flex-direction:column; gap:4px; }
    .title-row { display:flex; align-items:center; gap:8px; font-size:0.8rem; }
    .title-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
    .title-name { flex:1; color:#5b3b1d; }
    .title-count { font-weight:700; color:#4a3520; }

    /* chart */
    .chart-wrap { position:relative; flex:1; min-height:160px; }

    /* loading */
    .loading { text-align:center; padding:40px; color:#a08050; }

    /* ===== RESPONSIVE ===== */
    @media(max-width:900px) {
      .kpi-row { grid-template-columns:repeat(2,1fr); }
      .row-grid { grid-template-columns:1fr; }
      .highlight-grid { grid-template-columns:1fr; }
      .bottom-grid { grid-template-columns:1fr; }
    }
    @media(max-width:480px) {
      .kpi-row { grid-template-columns:1fr 1fr; gap:10px; }
      .kpi-value { font-size:1.4rem; }
      .hero h1 { font-size:1.6rem; }
    }
  </style>
</head>
<body>
<div id="site-header"></div>

<!-- HERO -->
<section class="hero">
  <div class="hero-content">
    <h1>本期公會競賽戰報</h1>
    <span class="period-badge" id="periodBadge">載入中...</span>
  </div>
  <a href="contest-history-v2.html" class="hero-link">📋 歷史戰績</a>
</section>

<!-- KPI -->
<section class="section" style="padding-top:16px;">
  <div class="container">
    <div class="kpi-row">
      <div class="kpi-card"><div class="kpi-icon">🏆</div><div class="kpi-label">公會總分</div><div class="kpi-value" id="kpiTotal">-</div></div>
      <div class="kpi-card"><div class="kpi-icon">🎖️</div><div class="kpi-label">公會排名</div><div class="kpi-value" id="kpiRank">-</div></div>
      <div class="kpi-card"><div class="kpi-icon">👥</div><div class="kpi-label">參賽人數</div><div class="kpi-value" id="kpiCount">-</div></div>
      <div class="kpi-card"><div class="kpi-icon">📊</div><div class="kpi-label">平均分數</div><div class="kpi-value" id="kpiAvg">-</div></div>
    </div>
  </div>
</section>

<!-- Row 1: 總分趨勢 + 與上期比較 -->
<section class="section">
  <div class="container">
    <div class="row-grid">
      <div class="card">
        <div class="section-title">公會總分趨勢</div>
        <div class="chart-wrap"><canvas id="chartTotal"></canvas></div>
      </div>
      <div class="card">
        <div class="section-title">與上期比較</div>
        <div class="compare-list" id="compareInline">
          <div class="compare-item"><div class="compare-icon">📊</div><div class="compare-info"><div class="compare-label">總分增減</div><div class="compare-value">-</div></div></div>
          <div class="compare-item"><div class="compare-icon">🎖️</div><div class="compare-info"><div class="compare-label">排名增減</div><div class="compare-value">-</div></div></div>
          <div class="compare-item"><div class="compare-icon">📈</div><div class="compare-info"><div class="compare-label">均分增減</div><div class="compare-value">-</div></div></div>
        </div>
      </div>
    </div>
  </div>
</section>

<!-- Row 2: 排名走勢 (獨立一行扁的) -->
<section class="section" style="padding-top:0;">
  <div class="container">
    <div class="card">
      <div class="section-title">排名走勢</div>
      <div class="chart-wrap" style="min-height:120px;max-height:140px;"><canvas id="chartRank"></canvas></div>
    </div>
  </div>
</section>

<!-- Row 3: 本期亮點 (三格) -->
<section class="section" style="padding-top:0;">
  <div class="container">
    <div class="highlight-card">
      <div class="section-title">本期亮點</div>
      <div class="highlight-grid">
        <div class="hl-item hl-mvp">
          <div class="hl-top"><span class="hl-icon">👑</span><span class="hl-label">本期 MVP</span></div>
          <div class="hl-name" id="mvpName">-</div>
          <div class="hl-score" id="mvpScore">-</div>
        </div>
        <div class="hl-item hl-progress">
          <div class="hl-top"><span class="hl-icon">🚀</span><span class="hl-label">進步王</span></div>
          <div class="hl-name" id="progressName">-</div>
          <div class="hl-score" id="progressScore">資料累積中</div>
        </div>
        <div class="hl-item hl-potential">
          <div class="hl-top"><span class="hl-icon">🌱</span><span class="hl-label">潛力成員</span></div>
          <div class="hl-name" id="potentialName">-</div>
          <div class="hl-score" id="potentialScore">資料累積中</div>
        </div>
      </div>
    </div>
  </div>
</section>

<!-- TOP5 (左大) + 傳奇紀錄 / 稱號分布 (右上下) -->
<section class="section">
  <div class="container">
    <div class="bottom-grid">
      <!-- TOP 5 (左) -->
      <div class="card">
        <div class="section-title">本期排行榜 TOP 5</div>
        <div id="top5Podium" class="top5-podium"></div>
        <div id="top5Rest" class="top5-rest"></div>
        <div style="text-align:center;"><a href="contest-history-v2.html" id="rankMoreLink" class="view-more">查看完整排行榜 →</a></div>
      </div>
      <!-- 右側上下 -->
      <div class="bottom-right">
        <div class="card">
          <div class="section-title">公會傳奇紀錄</div>
          <div class="legend-grid">
            <div class="legend-item"><div class="legend-label">歷史最高分</div><div class="legend-value" id="hsHighest">-</div></div>
            <div class="legend-item"><div class="legend-label">最佳排名</div><div class="legend-value" id="hsBestRank">-</div></div>
            <div class="legend-item"><div class="legend-label">平均總分</div><div class="legend-value" id="hsAvg">-</div></div>
            <div class="legend-item"><div class="legend-label">參賽期數</div><div class="legend-value" id="hsPeriods">-</div></div>
          </div>
        </div>
        <div class="card">
          <div class="section-title">稱號分布</div>
          <div class="title-section">
            <div class="title-chart-wrap">
              <canvas id="chartDonut"></canvas>
              <div class="title-center"><strong id="donutTotal">-</strong>人</div>
            </div>
            <div class="title-list" id="titleList"></div>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>

<div class="loading" id="loadingState">載入中...</div>

<script>
const cnNumMap = {'一':1,'二':2,'三':3,'四':4,'五':5,'六':6,'七':7,'八':8,'九':9,'十':10};
function extractRankNum(r) {
  const s = String(r);
  const n = s.match(/第(\d+)/); if (n) return Number(n[1]);
  const c = s.match(/第([一二三四五六七八九十]+)/); if (c) return cnNumMap[c[1]] || null;
  return null;
}

const TITLES = ['王者花匠','大師花匠','黃金花匠','白銀花匠','青銅花匠','無稱號'];
const TITLE_COLORS = ['#e96a1e','#9b59b6','#f4c430','#9e9e9e','#cd7f32','#ddd'];

async function init() {
  try {
    const cRes = await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/contest!A1:G?key=${API_KEY}`);
    const cData = await cRes.json();
    const allRecords = (cData.values||[]).slice(1).map(r=>({period:r[0]||'',nickname:r[2]||'',role:r[3]||'',score:Number(r[4])||0,title:r[5]||''}));

    let summaries = [];
    try { const s=await fetch(`https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/contest_summary!A1:F?key=${API_KEY}`); if(s.ok){const d=await s.json(); summaries=(d.values||[]).slice(1).map(r=>({period:r[0]||'',members:r[1]||'',total:r[2]||'',rank:r[3]||'',grade:r[4]||''}));} } catch(e){}

    if (!allRecords.length) { document.getElementById('loadingState').textContent='尚無資料'; return; }
    document.getElementById('loadingState').style.display = 'none';

    const periods = [...new Set(allRecords.map(r=>r.period))].sort();
    const latestPeriod = periods[periods.length-1];
    const latestData = allRecords.filter(r=>r.period===latestPeriod).sort((a,b)=>b.score-a.score);
    const latestSummary = summaries.find(s=>s.period===latestPeriod);

    // Hero
    document.getElementById('periodBadge').textContent = latestPeriod + ' 競賽成果';
    document.getElementById('rankMoreLink').href = 'contest-history-v2.html?period=' + latestPeriod;

    // KPI
    const total = latestSummary ? Number(latestSummary.total) : latestData.reduce((s,d)=>s+d.score,0);
    const rank = latestSummary ? latestSummary.rank : '-';
    const count = latestSummary ? latestSummary.members : latestData.length;
    const avg = latestData.length ? Math.round(latestData.reduce((s,d)=>s+d.score,0)/latestData.length) : 0;
    document.getElementById('kpiTotal').textContent = total.toLocaleString();
    document.getElementById('kpiRank').textContent = rank;
    document.getElementById('kpiCount').textContent = count + ' 人';
    document.getElementById('kpiAvg').textContent = avg.toLocaleString();

    // MVP
    if (latestData.length) {
      document.getElementById('mvpName').textContent = latestData[0].nickname;
      document.getElementById('mvpScore').textContent = latestData[0].score.toLocaleString() + ' 分';
    }

    // 進步王
    if (periods.length >= 2) {
      const prev = periods[periods.length-2];
      const prevData = allRecords.filter(r=>r.period===prev);
      const prevMap = {}; prevData.forEach(d=>{prevMap[d.nickname]=d.score;});
      let maxP=-Infinity,pM=null;
      latestData.forEach(d=>{ if(prevMap[d.nickname]!==undefined){const diff=d.score-prevMap[d.nickname]; if(diff>maxP){maxP=diff;pM=d;}} });
      if(pM&&maxP>0) {
        document.getElementById('progressName').textContent = pM.nickname;
        document.getElementById('progressScore').textContent = '+' + maxP + ' 分';
      }

      // 與上期比較
      const prevSummary = summaries.find(s=>s.period===prev);
      const prevTotal = prevSummary ? Number(prevSummary.total) : prevData.reduce((s,d)=>s+d.score,0);
      const prevAvg = prevData.length ? Math.round(prevData.reduce((s,d)=>s+d.score,0)/prevData.length) : 0;
      const tDiff = total - prevTotal, aDiff = avg - prevAvg;
      const currRN = extractRankNum(rank), prevRN = extractRankNum(prevSummary?prevSummary.rank:'');
      const rDiff = (currRN&&prevRN) ? prevRN-currRN : null;

      document.getElementById('compareInline').innerHTML = `
          <div class="compare-item"><div class="compare-icon">📊</div><div class="compare-info"><div class="compare-label">總分增減</div><div class="compare-value"><span class="diff-badge ${tDiff>=0?'diff-up':'diff-down'}">${tDiff>=0?'+':''}${tDiff.toLocaleString()} ${tDiff>=0?'↑':'↓'}</span></div></div></div>
          <div class="compare-item"><div class="compare-icon">🎖️</div><div class="compare-info"><div class="compare-label">排名增減</div><div class="compare-value"><span class="diff-badge ${rDiff!==null?(rDiff>0?'diff-up':rDiff<0?'diff-down':'diff-same'):'diff-same'}">${rDiff>0?'+'+rDiff+' ↑':rDiff===0?'持平':rDiff!==null?rDiff+' ↓':'—'}</span></div></div></div>
          <div class="compare-item"><div class="compare-icon">📈</div><div class="compare-info"><div class="compare-label">均分增減</div><div class="compare-value"><span class="diff-badge ${aDiff>=0?'diff-up':'diff-down'}">${aDiff>=0?'+':''}${aDiff} ${aDiff>=0?'↑':'↓'}</span></div></div></div>
      `;
    }

    // 潛力成員
    if (periods.length >= 3) {
      const last3=periods.slice(-3); const sp={};
      last3.forEach(p=>{sp[p]={};});
      allRecords.filter(r=>last3.includes(r.period)).forEach(r=>{sp[r.period][r.nickname]=r.score;});
      let best=null,bestG=0;
      [...new Set(allRecords.map(r=>r.nickname))].forEach(n=>{
        const s0=sp[last3[0]]?.[n],s1=sp[last3[1]]?.[n],s2=sp[last3[2]]?.[n];
        if(s0&&s1&&s2&&s2>s1&&s1>s0){const g=s2-s0;if(g>bestG){bestG=g;best=n;}}
      });
      if(best) {
        document.getElementById('potentialName').textContent = best;
        document.getElementById('potentialScore').textContent = '連3期成長 +' + bestG + ' 分';
      }
    }

    // TOP 5 - Podium (前三) + Rest (4-5)
    const top5 = latestData.slice(0,5);
    const medals = ['🥇','🥈','🥉'];
    const podiumCls = ['podium-1','podium-2','podium-3'];
    // 顯示順序：2,1,3（銀、金、銅）
    const podiumOrder = [1,0,2].filter(i=>top5[i]).map(i=>({d:top5[i],rank:i}));
    document.getElementById('top5Podium').innerHTML = podiumOrder.map(({d,rank}) => {
      return `<div class="podium-item ${podiumCls[rank]}">
        <div class="podium-avatar">${medals[rank]}</div>
        <div class="podium-name">${d.nickname}</div>
        <div class="podium-score">${d.score.toLocaleString()}</div>
      </div>`;
    }).join('');

    document.getElementById('top5Rest').innerHTML = top5.map((d,i) => {
      const titleCls = d.title ? `rt-${d.title}` : '';
      const titleBadge = d.title ? `<span class="rest-title ${titleCls}">${d.title}</span>` : '';
      const roleBadge = d.role ? `<span class="rest-role rr-${d.role}">${d.role}</span>` : '';
      const scoreCls = i < 3 ? 'rest-score-top' : 'rest-score';
      return `<div class="rest-item"><span class="rest-rank">${i+1}</span><span class="rest-name">${d.nickname}${roleBadge}</span>${titleBadge}<span class="${scoreCls}">${d.score.toLocaleString()}</span></div>`;
    }).join('');

    // 稱號分布
    const tc={}; TITLES.forEach(t=>tc[t]=0);
    latestData.forEach(d=>{ if(tc[d.title]!==undefined) tc[d.title]++; });
    const donutData = TITLES.map(t=>tc[t]);
    document.getElementById('donutTotal').textContent = latestData.length;

    new Chart(document.getElementById('chartDonut'), {
      type:'doughnut',
      data:{ labels:TITLES, datasets:[{ data:donutData, backgroundColor:TITLE_COLORS, borderWidth:2, borderColor:'#fff' }] },
      options:{ responsive:true, maintainAspectRatio:false, cutout:'65%', plugins:{ legend:{display:false} } }
    });

    document.getElementById('titleList').innerHTML = TITLES.filter(t=>tc[t]>0).map((t,i) => {
      const pct = latestData.length ? Math.round(tc[t]/latestData.length*100) : 0;
      return `<div class="title-row"><span class="title-dot" style="background:${TITLE_COLORS[TITLES.indexOf(t)]}"></span><span class="title-name">${t}</span><span class="title-count">${tc[t]}人 (${pct}%)</span></div>`;
    }).join('');

    // 公會傳奇紀錄
    if (summaries.length) {
      const tots=summaries.map(s=>Number(s.total)).filter(n=>n>0);
      document.getElementById('hsHighest').textContent = tots.length ? Math.max(...tots).toLocaleString() : '-';
      document.getElementById('hsAvg').textContent = tots.length ? Math.round(tots.reduce((a,b)=>a+b,0)/tots.length).toLocaleString() : '-';
      document.getElementById('hsPeriods').textContent = summaries.length + ' 期';
      const rankNums = summaries.map(s=>extractRankNum(s.rank)).filter(n=>n!==null);
      if (rankNums.length) {
        const bestRN = Math.min(...rankNums);
        const bestEntry = summaries.find(s=>extractRankNum(s.rank)===bestRN);
        document.getElementById('hsBestRank').textContent = bestEntry ? bestEntry.rank : '第'+bestRN+'名';
      }
    }

    // 總分趨勢圖
    if (summaries.length >= 2) {
      const cd = periods.slice(-6).map(p=>{const s=summaries.find(x=>x.period===p);return{period:p,total:s?Number(s.total):0};}).filter(d=>d.total>0);
      if (cd.length>=2) {
        new Chart(document.getElementById('chartTotal'),{
          type:'line',
          data:{labels:cd.map(d=>d.period.slice(5)),datasets:[{data:cd.map(d=>d.total),borderColor:'#e96a1e',backgroundColor:'rgba(233,106,30,0.06)',fill:true,tension:0.35,pointRadius:5,pointBackgroundColor:'#e96a1e',pointBorderColor:'#fff',pointBorderWidth:2}]},
          options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>ctx.parsed.y.toLocaleString()}}},scales:{y:{beginAtZero:false,ticks:{callback:v=>(v/1000)+'K'},grid:{color:'#f5ebe0'}},x:{grid:{display:false}}}}
        });
      }
    }

    // 排名走勢圖
    if (summaries.length >= 2) {
      const rd = periods.slice(-6).map(p=>{const s=summaries.find(x=>x.period===p);return{period:p,rank:s?extractRankNum(s.rank):null};}).filter(d=>d.rank!==null);
      if (rd.length>=2) {
        new Chart(document.getElementById('chartRank'),{
          type:'line',
          data:{labels:rd.map(d=>d.period.slice(5)),datasets:[{data:rd.map(d=>d.rank),borderColor:'#4a90d9',backgroundColor:'rgba(74,144,217,0.06)',fill:true,tension:0.35,pointRadius:5,pointBackgroundColor:'#4a90d9',pointBorderColor:'#fff',pointBorderWidth:2}]},
          options:{responsive:true,maintainAspectRatio:false,layout:{padding:{top:10,bottom:10}},plugins:{legend:{display:false}},scales:{y:{reverse:true,min:0,max:Math.max(...rd.map(d=>d.rank))+1,ticks:{stepSize:1,callback:v=>v===0?'':'#'+v},grid:{color:'#f5ebe0'}},x:{grid:{display:false}}}}
        });
      }
    }

  } catch(e) { document.getElementById('loadingState').textContent='⚠️ '+e.message; }
}
init();
</script>
<script src="header.js"></script>
</body>
</html>

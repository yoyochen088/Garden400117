<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>成員管理 [測試版]</title>
  <script>
  const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxFNC3q4JJFdxLnlQ2M2OgD8qVTIXrN1tZ6Y6rZQiUs2ku-Es9DkbWrlr-XT_3Rsgfu4Q/exec';
  const SHEET_ID = '1hKW9-wVYfZAjP4YIGJY6ngK8cFWuhDn1OxGvPnHLGDg';
  const API_KEY  = 'AIzaSyALI8OL0bN4yg4PTV3q_hwIsdrkkpcJ0Tg';
  </script>
  <style>
    :root {
      --pink:#e96a1e; --pink-light:#fef0e7; --pink-mid:#f4a46a;
      --pink-dark:#c2510b; --bg:#fff8f5; --border:#f8d5b0;
      --radius:10px; --shadow:0 2px 10px rgba(233,106,30,0.10);
    }
    * { box-sizing:border-box; margin:0; padding:0; }
    body { font-family:'Microsoft JhengHei',sans-serif; background:var(--bg); color:#3d1a2e; padding:24px 16px 100px; }
    h1 { text-align:center; color:var(--pink-dark); font-size:1.3rem; margin-bottom:4px; }
    .subtitle { text-align:center; color:#9e6b7e; font-size:0.85rem; margin-bottom:16px; }
    .card { background:#fff; border-radius:var(--radius); border:1px solid var(--border); box-shadow:var(--shadow); padding:14px 16px; margin-bottom:10px; }
    .member-row { display:grid; grid-template-columns:1fr 1fr 1fr auto; gap:10px; align-items:center; }
    .label { font-size:0.75rem; color:#9e6b7e; margin-bottom:3px; }
    input, select { padding:7px 10px; border:1.5px solid var(--pink-mid); border-radius:7px; font-size:0.9rem; background:var(--bg); color:#3d1a2e; outline:none; width:100%; }
    input:focus, select:focus { border-color:var(--pink); }
    .btn-remove { background:#fff3e0; color:#e65100; border:1.5px solid #ffcc80; border-radius:7px; padding:7px 12px; cursor:pointer; font-size:0.85rem; font-weight:600; white-space:nowrap; }
    .btn-remove:hover { background:#ffe0b2; }
    .btn-add { display:flex; align-items:center; gap:6px; padding:9px 18px; background:var(--pink-light); color:var(--pink-dark); border:1.5px dashed var(--pink-mid); border-radius:var(--radius); font-size:0.92rem; font-weight:600; cursor:pointer; width:100%; justify-content:center; transition:background 0.2s; margin-top:4px; }
    .btn-add:hover { background:var(--pink-mid); color:#fff; }
    .loading { text-align:center; padding:40px; color:#9e6b7e; }
    .empty { text-align:center; padding:30px; color:#9e6b7e; font-size:0.9rem; }
    .bottom-bar { position:fixed; bottom:0; left:0; right:0; background:#fff; border-top:1px solid var(--border); padding:10px 12px; display:flex; gap:8px; justify-content:center; flex-wrap:wrap; box-shadow:0 -2px 10px rgba(233,106,30,0.08); }
    .btn { padding:9px 18px; border-radius:8px; font-size:0.9rem; font-weight:600; cursor:pointer; border:none; transition:opacity 0.2s; }
    .btn:hover { opacity:0.85; }
    .btn:disabled { opacity:0.5; cursor:not-allowed; }
    @media(max-width:600px) { .member-row { grid-template-columns:1fr 1fr; } }
  </style>
</head>
<body>
<h1>👥 成員管理</h1>
<p class="subtitle">資料直接從 Google Sheet 讀取與更新</p>

<div id="memberList"><div class="loading">載入中...</div></div>
<button class="btn-add" onclick="addMember()">＋ 新增成員</button>

<div class="bottom-bar">
  <button class="btn" style="background:#e96a1e;color:#fff;" onclick="loadMembers()">🔄 重新載入</button>
  <button class="btn" style="background:#34a853;color:#fff;" id="saveBtn" onclick="saveAll()">💾 儲存</button>
</div>

<script>
// members：從 Sheet 讀取的在職成員
// removed：本次操作中被移除的（按儲存才寫入 Sheet）
// added：本次新增的
let members = [];
let removed = [];
let added = [];

async function loadMembers() {
  document.getElementById('memberList').innerHTML = '<div class="loading">載入中...</div>';
  removed = [];
  added = [];
  try {
    const url = `https://sheets.googleapis.com/v4/spreadsheets/${SHEET_ID}/values/members!A1:D?key=${API_KEY}`;
    const res = await fetch(url);
    const data = await res.json();
    const rows = (data.values || []).slice(1);
    console.log('rows from sheet:', rows.length, rows.slice(0,2));
    // 只顯示在職（left 欄為空或不存在）
    members = rows
      .filter(r => r[3] !== 'true')
      .map(r => ({ gameId: r[0]||'', nickname: r[1]||'', note: r[2]||'成員' }));
    console.log('active members:', members.length);
    renderList();
  } catch(e) {
    document.getElementById('memberList').innerHTML = `<div class="empty">❌ 載入失敗：${e.message}</div>`;
  }
}

function renderList() {
  const all = [...members, ...added];
  const el = document.getElementById('memberList');
  if (all.length === 0) {
    el.innerHTML = '<div class="empty">尚無成員</div>';
    return;
  }
  el.innerHTML = all.map((m, i) => {
    const isAdded = i >= members.length;
    return `
    <div class="card">
      <div class="member-row">
        <div><div class="label">遊戲 ID</div>
          <input value="${m.gameId}" oninput="update(${isAdded?1:0},${isAdded?i-members.length:i},'gameId',this.value)" placeholder="遊戲 ID" />
        </div>
        <div><div class="label">暱稱</div>
          <input value="${m.nickname}" oninput="update(${isAdded?1:0},${isAdded?i-members.length:i},'nickname',this.value)" placeholder="暱稱" />
        </div>
        <div><div class="label">職位</div>
          <select onchange="update(${isAdded?1:0},${isAdded?i-members.length:i},'note',this.value)">
            ${["會長","副會長","理事","菁英","成員"].map(r=>`<option ${m.note===r?'selected':''}>${r}</option>`).join('')}
          </select>
        </div>
        <div>
          <button class="btn-remove" onclick="removeMember(${isAdded?1:0},${isAdded?i-members.length:i},'${m.nickname||m.gameId}')">移除</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

function update(type, i, field, value) {
  if (type === 1) added[i][field] = value;
  else members[i][field] = value;
}

function addMember() {
  added.push({ gameId: '', nickname: '', note: '成員' });
  renderList();
}

function removeMember(type, i, name) {
  if (type === 1) {
    added.splice(i, 1);
  } else {
    const [m] = members.splice(i, 1);
    removed.push(m);
  }
  renderList();
}

async function saveAll() {
  const btn = document.getElementById('saveBtn');
  btn.textContent = '⏳ 儲存中...'; btn.disabled = true;
  try {
    const tasks = [];
    // 新增的成員
    added.filter(m => m.gameId.trim()).forEach(m =>
      tasks.push(callScript({ action: 'updateMember', gameId: m.gameId.trim(), nickname: m.nickname, note: m.note, left: false }))
    );
    // 修改的在職成員
    members.forEach(m =>
      tasks.push(callScript({ action: 'updateMember', gameId: m.gameId, nickname: m.nickname, note: m.note, left: false }))
    );
    // 移除的成員（標記 left=true）
    console.log('removed:', removed.map(m => m.gameId));
    removed.forEach(m =>
      tasks.push(callScript({ action: 'deleteMember', gameId: m.gameId }))
    );
    await Promise.all(tasks);
    await new Promise(r => setTimeout(r, 1500));
    alert(`✅ 儲存完成！`);
    loadMembers();
  } catch(e) {
    alert('❌ 儲存失敗：' + e.message);
  } finally {
    btn.textContent = '💾 儲存'; btn.disabled = false;
  }
}

async function callScript(data) {
  try {
    await fetch(APPS_SCRIPT_URL, {
      method: 'POST',
      body: JSON.stringify(data)
    });
  } catch(e) {
    // CORS 錯誤時 fallback 到 GET
    const params = encodeURIComponent(JSON.stringify(data));
    await fetch(`${APPS_SCRIPT_URL}?data=${params}`, { mode: 'no-cors' });
  }
  return { ok: true };
}

loadMembers();
</script>
</body>
</html>
